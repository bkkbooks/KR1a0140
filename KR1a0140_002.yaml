body:
  text: 周易傳註卷二通州學正李塨撰上經乾下坤上泰小往大來吉亨彖曰泰小往大來吉亨則是天地交而萬物通也上下交而其志同也内陽而外隂内健而外順内君子而外小人君子道長小人道消也小者坤隂也大者乾陽也乾坤往來而否泰成焉泰則小往居外大來居内者也夫天上地下定位也然而其氣相交必天道下濟地道上行然後爲泰今則天地交而其中之萬物通矣上下交而其志同矣體則内陽而外隂德則内健而外順人事則内君子而外小人其斯爲君子道長小人道消之時乎不吉而且亨乎此之往來通乾坤三畫言也下卦爲内故曰來上卦爲外故曰往又上卦曰進曰上行下卦曰下曰復項安世曰彖一以重卦相交爲義于隂陽无抑揚也二以卦體内外爲義于隂陽有抑揚矣三以六爻消長爲義則更喜陽而惡隂矣大抵諸卦皆具數義不可以一說盡如小畜柔得位而上下應統論六爻五陽一隂也健而巽又以兩卦言剛中而志行又以九二九五兩爻言象曰天地交泰后以財成天地之道輔相天地之宜以左右民裁成輔相以左右民此聖人之贊天地而成泰也然則天地本相交也而又有交天地者故人參天地曰三才財通裁財成使其道无過不及也輔相助之也初九拔茅茹以其彚征吉象曰拔茅征吉志在外也爻變巽爲茅虞翻訓茹曰根初在下根之象彙類也三陽同體而進是拔茅而其根牽連引起其類矣吉何疑焉仲氏易曰初陽征而交隂則志在外陽志在外隂志在内一曰中心願一曰中以行願所謂志同也九二包荒用馮河不遐遺朋亡得尚于中行象曰包荒得尚于中行以光大也九二爲卦主合三陽而得中則儼一天矣夫三隂地也地曰荒猶四方之稱四荒也而二能以廣大之量包之二居互兌之初河也乃乾健之德足以馮之馮河徒歩過河然且逺邇一體中外大公三隂雖遐而不遺志在并包三陽並征而非比朋黨盡去而與六五正應得尚于中行矣淺義曰尚如尚公主之尚故六五曰歸妹葢天道之高明廣大固如此也九三无平不陂无往不復艱貞无咎勿恤其孚于食有福象曰无往不復天地際也以三陽之終交三隂之始此正往來消息之㑹所謂天地際也際則承平而泰者无有平而不陂也孔安國曰澤障曰陂隂往而消者无有往而不復也泰之不終泰數也而君子于此則一以人事持之乾乾然勞心危行謹守正度可无咎矣然而艱危保泰或多過憂恤憂也曰此隂之翩翩以來爲吾孚者終非吾族也則又以嫌疑而生事端即此憂泰者致不泰矣尚得日用飲食從容有福乎兌口爲食又必勿之六四翩翩不富以其隣不戒以孚象曰翩翩不富皆失實也不戒以孚中心願也翩翩飛貌言六四率三隂羣飛而下交也陽實隂虗三隂皆失實則不富矣故其翩翩也欲以乾隣上下卦隣也之實濟坤隂之虗是其心願交于陽不待兌口之戒而以孚焉坎位爲孚君子道長小人道消之時小人自然仰命君子其象如此小畜九五富而用其隣也此不富而用其隣也六五帝乙歸妹以祉元吉象曰以祉元吉中以行願也二五俱得中而相應則婚姻矣乃二四同功爲兌三五同功爲震歸妹卦也則有帝乙歸妹之象焉是居中而行其所願隂交陽之最正者其得禄也不大吉耶陽貨曰祉禄也朱晦庵曰妹少女也上六城復于隍勿用師自邑告命貞吝象曰城復于隍其命亂也泰極則否象生焉城築土也坤爲土上在上城象隍城下溝去土者也虞翻曰无水稱隍有水稱池今坤當外盡而坎位上形坎窞象隍則向取隍之土以爲之城兹復傾城之土以塡之隍此正平之陂而往之復也當此之時惟有振奮自強修我甲兵如諸葛亮出師所謂今不伐賊王業亦亾者可以復興可以後敗乃上六才柔氣盡自禁止曰兵凶戰危斷斷勿用而僅僅與其邑人以文告相固結不知上不能振民将誰從故象言命雖正亦羞吝難行而孔子直斷曰是亂命耳城復于隍正以是也坤下乾上否之匪人不利君子貞大往小來彖曰否之匪人不利君子貞大往小來則是天地不交而萬物不通也上下不交而天下无邦也内隂而外陽内柔而外剛内小人而外君子小人道長君子道消也否時之匪人尚利君子貞乎滔滔者天下皆是故曰无邦内柔而外剛所謂色厲而内荏也象曰天地不交否君子以儉德辟難不可榮以禄月令曰天氣上騰地氣下降天地不通否象也儉約也有財而不輕用爲儉君子之貶藏其德似之不可榮以禄者却禄之哲在我也玩辭曰辟難不與害交也不可榮以禄不與利交也世固有假辟禍之名以保榮利者故聖人兼言之然否時而禄難即隨矣初六拔茅茹以其彚貞吉亨象曰拔茅貞吉志在君也爻變震爲蕃亦有茅茹之象初雖隂類而安于爲下以與上應則拔茅茹以其彚雖與泰初同而不征也但守正耳正者何志不在彚而在君吉亨之道也乾爲君六二包承小人吉大人否亨象曰大人否亨不亂羣也六二之隂小人也而得中得正其所包藏者乃欲承順乎五也五居乾中爲大人小人承之不其吉乎然大人與大人爲羣肯以其承而亂哉不亂故否亦惟不亂故亨也遯九爻辭正與此反六三包羞象曰包羞位不當也此小人之最无頼者不中不正其所爲者皆可羞者也而胥包之九四有命无咎疇離祉象曰有命无咎志行也此復泰之始也乾剛在上雖與下不交而九五有命巽爲命令九四承以濟否則大人有羣其志得行㣲特一身无咎三陽之儔且共麗此祉矣九五休否大人吉其亡其亡繫于苞桑象曰大人之吉位正當也否從此休矣休未至于傾而稍息焉故曰前者大人否今大人吉矣然而安危之機間不容髮雖否運初轉泰期将開而國家存亡政未可定也故嘗念曰其亡乎其亡乎繫于苞桑乎仲氏易按苞叢生木枝細不能繫物故陸贄奏議有云邦國之杌􅑾緜緜連連若苞桑綴旒幸而不殊者屢矣葢九五有中正之德而當尊位故如此其不忘危亡也是能休否者也紫巖易傳曰巽柔木爲苞桑繩直爲繫上九傾否先否後喜象曰否終則傾何可長也天下豈可長否哉否極則傾傾者倒也如鼎之顛趾出否也否倒則成泰矣上九傾否時矣故先否後喜變兌爲悦喜象彖言匪人不利君子爻則惟六三可羞初二象則應上四五上象則幹否不同若此者葢彖戒君子使避小人象則教小人使近君子又勉君子使挽小人皆聖人之情也皆是也離下乾上同人于野亨利涉大川利君子貞彖曰同人柔得位得中而應乎乾曰同人同人曰同人于野亨利涉大川乾行也文明以健中正而應君子正也惟君子爲能通天下之志離之二爻坤也得正位得中道而應乾五則内而文明外而剛健中正以相應合所謂二人同心其利斷金同心之言其臭如蘭是君子同之正者也故曰同人且同人曰同人于野亨利渉大川豈二隂之所克哉惟五乾中直之德行故能如此夫偏邪相同即其甘如醴與天下之志无與也中正相同則一二人之志即天下人之志矣此同人也不且有以通天下之志乎二地道野象正義曰野者廣逺之處言同人之无私也上卦坎位川象乾行利渉之象象曰天與火同人君子以類族辨物王註曰天體在上而火炎上同人之象也蘇軾曰同人以不同爲同初九同人于門无咎象曰出門同人又誰咎也初九變則下卦爲艮艮爲門而比六二是出門即與二相同矣以陽承隂卑以自牧又誰咎是同人之近而易者六二同人于宗吝象曰同人于宗吝道也宗主也胡瑗口義五居君主之位六二應而同之是同人于宗矣然衆皆欲同二而二乃獨與五應則衆思敗之故九三之伏莽九四之乘墉羣梗于中其道不吝乎吝者出入艱難也此所以必須乾行之師也九三伏戎于莽升其高陵三歲不興象曰伏戎于莽敵剛也三歲不興安行也九三妒二五之相同也以離之戎兵竊效坎伏離伏坎而在巽之莽間巽爲木且以巽股升變艮之高陵三變二四互艮艮之上盡爲高陵将與九五爲敵然而烏能敵哉雖歴爻數之盡以至三歲亦不能興則惟巽順以安行耳九四乘其墉弗克攻吉象曰乘其墉義弗克也其吉則困而反則也九四與九三同道亦妒二五之相同也見九三敵五遂乘九三之墉來註離中虗外圍墉象欲與共事然身居五下而仰攻之不惟勢弗克義亦豈克哉若不能攻而困變爲坎之法則反于則斯合于義吉也九五同人先號咷而後笑大師克相遇象曰同人之先以中直也大師相遇言相克也仲氏易曰五之所同二也而二以一隂乘承與比皆陽焉能遽遇哉夫先反側而後友樂闗雎之義也同人亦然有升陵者乘墉者是必用乾行之甲虞氏易乾為甲借離應之兵而出剛金以克之始遇耳故象曰相遇言相克也則師克之後不惟二遇三四亦遇矣是同人而通天下之志也按五應離火火无定體易例凡遇離則皆有笑咷之象如離不鼓缶而歌則大耋之嗟中孚爲大離或鼓或罷或泣或歌旅上卦離先笑後號咷類故舊説號咷笑皆離火之聲非无謂也虞翻曰同人旁通師卦故稱師陽大故曰大師陽動而直故曰中直彖曰同人于野乾行也言其廣逺而无私也而爻乃用大師者葢非賢奸並包之爲无私而能好能惡之爲无私也上九同人于郊无悔象曰同人于郊志未得也此出世之人攜手同行以爲朋者如長沮桀溺之流于國内之咷笑師戎不問也逺處郊外侣烟友霞尚何過悔而孔子原之曰彼視滔滔天下豈遂无志者但未得耳同人之道或近或逺或易或難或中正或不中正且因而妒忌因而戈矛者皆有之善交者必類其族辨其物中正以應勿間伏戎乃可以通天下之志友道如斯之不易也作易者其有憂患乎乾下離上大有元亨彖曰大有柔得尊位大中而上下應之曰大有其德剛健而文明應乎天而時行是以元亨卦六五一柔得尊位大中而上而上九下而初二三四胥應之是陽之大皆爲所有矣故曰大有于以觀其德内既剛健外復文明上應乎天而尚賢以時行于下其大通也庸更加一辭哉象曰火在天上大有君子以遏惡揚善順天休命火在天上輝煌四照大有之象遏惡揚善順天休命大有之事初九无交害匪咎艱則无咎象曰大有初九无交害也初九居下而大有上離爲戈兵容有害之者然陽剛不肯上比而上又无其應則无交于害矣是安于爲下者也故匪咎雖然可不艱哉苟自艱難其志則无咎不然易心一生咎可免耶九二大車以載有攸往无咎象曰大車以載積中不敗也豐年多黍多稌曰大有今居下乾之中當互乾之始剛德積實誠大有矣爻變大坎二至五爲大坎爲大車而離牛載而前之行健以徃應于五多多益善敗于何有二五相應之卦多于初四三上九三公用亨亨左傳作享古通用于天子小人弗克象曰公用亨于天子小人害也六爻初當爲民二當爲士爲臣三當爲貴臣宋衷曰三公位四當爲近臣五當爲君上當爲倦勤之君明農之臣與高尚之賢則九三有公象焉以陽居陽上承六五出大有之積食之以互兌之口是用亨獻之禮于天子也但變兌爲容悦爲小或流于小人者有之小人則祇以貽害而已豈能使天子受其亨哉害即初九无交害之害葢富貴利逹害即寓焉九四匪其彭无咎象曰匪其彭无咎明辨晳也韻㑹因彭音旁多也四則下陽之多至此而極一隂能有衆陽而又恐以衆陽逼一隂也九四以陽處隂且能知懼則雖彭而不以爲彭焉此則近而不偪滿而不溢非得離火之明辨而能晳何以有此仲氏易六五厥孚交如威如吉象曰厥孚交如信以𤼵志也威如之吉易而无備也柔之能有剛夫豈徒哉柔順得中出其離照之孚以親下剛若與之相交者然将天下向往之志自我發之矣光武之待馬援笑語簡易而真天子之威已行隴蜀故曰朕于天下亦欲以柔道治之六隂虛故易而无備五剛位且變而之乾左氏所謂同復于父敬如君所乾爲君爲父者也故威如上九自天祐之吉无不利象曰大有上吉自天祐也祐助也繫辭釋此爻曰助信助順助尚賢葢六五之孚信也易而无備順也交下之剛尚賢也上九一剛在卦之上則天也天之祐之也必矣葢乾爲大卽賢也尚賢卽有大故自天祐之統觀全卦五陽之大皆隂有也分觀各爻則每爻有一大有象焉初宜以艱而逺害二當積載而應五三戒私小四勿滿覆五簡易而尚賢乃獲天祐序卦曰有大者不可以盈此之謂也艮下坤上謙亨君子有終仲氏易曰山形一何高而居乎地中謙也謙則必亨是以君子有終也君子三剛也三終象也艮者萬物成終之卦也是以君子之剛處内卦之終而又當成終之盡則有終矣象曰謙亨天道下濟而光明地道卑而上行天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也謙之亨何也九三天道也九乾爻天也而其氣下濟居于内卦著其光明坤地道也坤道本卑然進而居于外卦其氣上行曰下濟曰卑謙也曰光明曰上行則亨矣而况天道盈則必消虛則必長是虧盈而益謙也地道築而高則風雨剝之坎而下則流水注之是變盈而流謙也高明之家鬼瞰其室汝唯不伐明神依之是天地中之鬼神虞翻以三爲神四爲鬼害盈而福謙也人卽不争亦惡驕亢人卽好高亦喜謙謹是人道惡盈而好謙也美哉謙乎退然若不勝衣而德愈尊闇然不敢自著而體益光卑以自牧而萬民服之莫可踰者此君子之所以有終也紫巖易傳曰九三以陽處艮上爲尊爲光在坤下爲卑艮山爲不可踰象曰地中有山謙君子以裒多益寡稱物平施裒聚也又減也卦體本坤而得乾一爻爲謙是損乾之盈虞氏易乾爲盈益坤之寡雜卦小畜寡也指坤爻言裒多益寡之象即虧盈益謙之象也君子效之所以稱物平施也初六謙謙君子用涉大川吉象曰謙謙君子卑以自牧也山在地中謙也初爲山之足又謙也仲氏易謙之又謙卑以自養非君子乎即用渉坎水之川而尚憂風波乎吉矣張湛虗曰雖有大險遇謙則平利涉者宜乎涉也用涉者用之涉也六二鳴謙貞吉象曰鳴謙貞吉中心得也六二居中得正上承九三中心相得坎爲心象非有矯强不覺鳴號其謙以示之矣不貞而吉乎淺義曰艮取聲音象山鳴谷應之義也震爲善鳴是以小過震艮合有飛鳥遺音之象謙似小過故上下皆有鳴象承九三有隂陽相得象九三勞謙君子有終吉象曰勞謙君子萬民服也九三以一陽居互坎之中坎爲勞卦勞民勸相而功成不居萬民悦服謙斯至矣彖所謂君子有終者以此此卦主也隂爲民六四无不利撝謙象曰无不利撝謙不違則也撝手指麾也六四之謙柔而得正不待問而知无不利矣艮爲手四下比之則指撝皆謙見王註淺義曰謙德見諸威儀舉動也又安有違坎之法則者耶六五不富以其隣利用侵伐无不利象曰利用侵伐征不服也六五雖尊而隂虗不富然與三之君子同體互體而居是隣也用隣之實益我之虗所謂裒多益寡也則不富猶富也如有瞷其不富而􅏌然不服者則偕九三之震動出離兵爻變爲離以侵伐之虗心用人以征不服不惟利且无不利是居尊之謙也若宋人稱臣稱姪豈謙也哉上六鳴謙利用行師征邑國象曰鳴謙志未得也可用行師征邑國也上六與九三其志本當相應坎爲志但謙主善下而上六以柔而居上則與九三有不能急相得者人心得意則鳴不得意亦鳴故上鳴號其謙以相示焉然謙德雖未大孚于人而自鳴其謙則驕兵之敗可免矣坤爲邑爲國若有迷亂坤又爲迷爲亂則用地水之師以征之卦上坤互坎有師象尚可利耳坤下震上豫利建侯行師豫樂也國語司空季子曰坤母也震長男也母老子彊故曰豫其繇曰利建侯行師居樂出威之謂也葢以居樂坤内故利建坤國之侯出威震外故利行長子之師彖曰豫剛應而志行順以動豫豫順以動故天地如之而况建侯行師乎天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉九四一剛而上下五隂應之侯果說其志以行无枉无仵用順以動不其豫乎夫豫之順以動也雖天之行健地之勢坤不過如此剛柔天地也而况建侯行師有何勿利不觀天地之日月一无愆過四時一无差忒乎是天地之順以動也不觀聖人之刑罰清而衆民順服于下乎是聖人之順以動也然則豫之時義豈不大矣哉易言時義大者五卦豫隨姤遯旅言其時之義甚大而宜玩也言時用大者三卦睽蹇坎言其時之用所關甚大也言時大者四卦解革頤大過則言其時所關之大也皆言時者六十四卦時而已矣象曰雷岀地奮豫先王以作樂崇德殷薦之上帝以配祖考雷岀地奮𤼵而匉訇豫樂之象作殷盛之樂昭崇功德以薦于神豫樂之事配上帝以祖者冬至郊祀也配以考者季秋明堂祀也初六鳴豫凶象曰初六鳴豫志窮凶也初六之豫豈不鄙哉身居卑賤遇九四尊富居上卦陽實則富稍一借手便沾沾得志在九四本震尚不自鳴而遙借震勢者反鼓舞歌呼色飛聲王嗚呼負販之子偶附人輿遂若登天已樂極而窮矣欲不凶得乎六二介于石不終日貞吉象曰不終日貞吉以中正也介說文云分疆也故物两間爲介守兩間之介而不移亦爲介二居中而得坤之正位乃介守艮山之初是介于石也艮爲石且下卦離位純隂則見離爲日而二當中離象未竟仲氏易是與衆同處豫地而見幾而作不俟終日者也豫不肯終其日乃豫矣故貞吉六三盱豫悔遲有悔象曰盱豫有悔位不當也盱張目也六三位不中正而張位離之目上視九四之豫仲氏易而動心焉妄矣其速悔之若悔遲則徒有悔而已希望不已必䘮身名豈有及哉九四由豫大有得勿疑朋盍簪象曰由豫大有得志大行也九四一陽爲衆隂之師是衆人之豫皆由乎四也四之志不大行而有得乎雖互坎爲疑而互艮止之曰勿疑也夫西南得朋五隂皆朋也而合而括乎此矣盍合也簪筓也以一陽括衆隂而貫乎其中殆如簪之括髮然矣漢上易傳曰互體之變有六如豫之九四四以上震四以下艮合上下坎震有伏巽艮有伏兌坎有伏離六體也變而化之則无窮矣此不必盡用解經而亦不可不知者六五貞疾恒不死象曰六五貞疾乘剛也恒不死中未亡也六五居尊位似主豫者然以柔而乘九四之剛臲卼不安則正有疾但位居于五中道未亡而震爲反生善病而恒不死夫病以死爲憂今不死矣則雖疾乎亦何弗豫乎周平以後之君似之上六㝠豫成有渝无咎象曰㝠豫在上何可長也來註㝠幽也暗也上六以隂柔居豫之極昏㝠于豫者也夫豫樂雖成曷可長哉苟以動體而變爲離則㝠㝠者将昭昭矣是樂極而有渝變矣咎尚可免也一豫也而分觀之則一狐駕虎威而豫一介止而豫一覬覦而豫一溥樂于人而豫一得不死而豫一沉溺而豫聖人之寫象盡態極妍乃爾國語母老子強曰豫按此卦以一母而有三男小畜以一父而有三女革鼎三女而父在中蒙屯三男而母在中渙三男而上有長女噬嗑三男而上有中女節三男而下有少女豐三女而上有長男井三女而上有中男旅三女而下有少男三男之卦各聚三男三女之卦各聚三女亦觀象之一端也震下兌上隨元亨利貞无咎彖曰隨剛來而下柔動而說隨大亨貞无咎而天下隨時隨時之義大矣哉隨與比同人不同比親附也同人志相同也隨則不必甚親不必皆志相同而以時相隨者也乾剛爻來居初而下于坤之二柔卦震動而喜悦皆隨之象也必其德能乘時大通以正如九五之正中孚嘉則隨无咎過而天下皆隨其時矣天下隨時可以建功可以布業其義豈不大哉按本義疏卦變隨卦本困二來居初又本噬嗑上來居五又本未濟二來居初上來居五仲氏易疏推易本否初上相易又本咸初三相易又本益四上相易夫乾坤之道三人行則損一人一人行則得其友言致一也今雜然相交相易豈一時諸卦皆來耶抑此時此一卦來移時彼一卦來耶象曰澤中有雷隨君子以嚮晦入宴息雷藏澤中隨時休息崔憬曰雷陽氣亦謂龍也故震爲雷爲龍兌正秋也雷至秋而收聲君子以之亦隨時之一義也初九官有渝貞吉出門交有功象曰官有渝從正吉也出門交有功不失也初九正所謂剛來而下柔也震爲長男官也來註而不恃其剛而下柔渝也隂陽相從正而吉矣是以出艮之門互艮爲門闕而即交與四同功之二故四亦曰明功不失其歡也不失即交也交少也隨之爲道惟視其人之有功耳母論其人攜我而進隨之即其人置我而前亦隨之故曰不失六二係小子失丈夫象曰係小子弗兼與也六二則有所失矣一意隨之六三隂爲小艮爲小子初九陽爲丈夫六二以手拘係乎三艮爲手之小子自失初九之丈夫矣葢惟一是從无兩岐而趨者一身不得兼與隨之道也六三係丈夫失小子隨有求得利居貞象曰係丈夫志舍下也六三亦有所失矣志在隨上自舍其下以巽繩係九四之丈夫而係我之六二雖與我同爲小子而失之焉此其隨也巽爲近利市三倍有求而得固非意外但因而爲佞則非矣惟利居貞耳九四隨有獲貞凶有孚在道以明何咎象曰隨有獲其義凶也有孚在道明功也九四親承九五隨之得正者也貞即正也初交二三係三而三係四則四不惟獲三並獲初二矣求求上也獲獲下也然高明人指豐盛難居雖貞而義不亦凶乎若能溢大坎之孚信二至上爲大坎與二同功繫辭曰二四同功遂通于震塗則在道路之人皆明其功乃獲下以隨五非私獲而竊據也凶可免矣何咎九五孚于嘉吉象曰孚于嘉吉位正中也嘉善也九四以親近而隨因孚其善矣即初之交二二之係三三之係四皆欲隨乎五也疎逺有善亦勿疑貮葢位居正中惟善是信所謂大亨利貞而天下隨時也上六拘係之乃從維之王用亨享通于西山象曰拘係之上窮也隨至上六如紂于文王拘而係之羑里之囚是也文王乃内文明而外柔順不敢違其意以從維之下互爲巽而體復倒巽有巽繩維係象而用亨祀于西山以求神祐此豈尋常之隨從哉故曰上六之拘係窮極時也隨之象又有如此者王以爻言即指九五兌西方卦下連艮山故爲西山即岐山也文王以岐山爲太王興周之地不得于紂必嘗亨之與帝乙有歸妹事易兩用之正同初交二而二失之二係三而三失之三係四有得而戒以貞四隨五有獲而憂其凶五隨上而上窮隨之險阻如此然凡卦皆有險阻乾有亢謙有不服他卦可知乾坤知之聖人亦知之佛老知而去之聖人知而處之平之異端吾儒之分也巽下艮上蠱元亨利涉大川先甲三日後甲三日彖曰蠱剛上而柔下巽而止蠱蠱元亨而天下治也利涉大川往有事也先甲三日後甲三日終則有始天行也蠱壊也器不用則壊春秋傳曰皿蟲爲蠱人不事事亦壊盧氏曰蠱不事事也夫剛居上爲艮則亢而情不下通柔居下爲巽則卑而情難上達且下巽而諂上止而惰宜其壊也然而不事則蠱而蠱必有事序卦曰蠱者事也從此事其所不事不元亨而天下治乎故大坎爲川自一至五爲大坎宜往而事其事以涉之焉且以卦觀之三與五同功爲震震東方之卦也甲也馬融說甲十幹之始即造事之始乃以爻計之一爻爲一日三陽爲震主爻數至初先甲三日初接上九之蠱而幹之是有始也數至五後甲三日五正値上九之蠱是終也天行終則有始往而有事不亦宜乎象曰山下有風蠱君子以振民育德物久敗朽而蟲蛀曰蠱蟲生于風故風中蟲也山下有風正春秋醫和所言女惑男風落山謂之蠱者君子鑒風以振民不使人蠱也鑒山以育德正義不使已蠱也初六幹父之蠱有子考无咎厲終吉象曰幹父之蠱意承考也陽爲父爲考見易雅上九一陽高據于上而艮止无爲有父亡而考之象焉檀弓父亡稱考則下之五爻皆其子矣此而有遺事則非他之蠱父之蠱也蠱非一朝夕之積也故原之于父父蠱子可以不幹耶初六以柔處剛而性善入不承其迹而承以意所謂從治不從亂也改父之道雖事不順若厲者而意實甚順也鄭康成說是幸哉其有子矣在父則有蠱而在考則无咎矣終吉何疑或謂酒誥父存亦稱考不必卒也不知父在子不得自專故論語曰觀其志父没乃觀其行子而幹蠱知父卒矣至幹母蠱而曰不可貞知母存矣九二幹母之蠱不可貞象曰幹母之蠱得中道也言父則必有母父蠱母亦蠱所謂蠱矣特是婦人之性難可直挽此而曰吾必以正行之則非中道矣委曲斡旋以幹其蠱惟九二得之九三幹父之蠱小有悔无大咎象曰幹父之蠱終无咎也九三以剛居剛而爲震始能幹父之蠱者也特恐剛動少過以致小有貽悔然能幹蠱安有大咎耶六四裕父之蠱徃見吝象曰裕父之蠱往未得也裕者㳫㳫也六四以隂處隂當兌折之終爲艮止之始見有蠱而㳫㳫然未得幹術以此而往必見羞吝矣六五幹父之蠱用譽象曰幹父用譽承以德也六五得尊位行大中其幹蠱也所謂貽父以令名者也則以譽承之實以德承之矣艮爲言有譽象初六六五皆以剛行柔故爲幹父蠱九二以柔行剛故幹母蠱九三以剛行剛故幹父蠱而有悔六四以柔行柔故裕父蠱而見吝上九不事王侯高尚其事象曰不事王侯志可則也上九則正所謂蠱矣然而身在蠱上已居卦外雖下五爻有幹蠱之王之侯五爲王三四爲公侯皆不事之而南山北海高尚其事任世之蠱壊而莫幹者也然其不降之志亦可以廉頑立懦此又處蠱極者之一象也兌下坤上臨元亨利貞至于八月有凶彖曰臨剛浸而長說而順剛中而應大亨以正天之道也至于八月有凶消不久也一陽來復爲復三陽交隂爲泰臨二陽上進已過于復則隂退順可以相感未至于泰則隂尚盛未即相交其于隂也有臨之象焉至其地而将爲曰臨事如臨官臨朝之類故雜卦曰臨觀之義或與或求言陽與隂也二陽漸浸而長以臨乎隂内說而外順二剛得中而五柔相應大亨以正非行健之天道乎雖然有長則必有消試取臨一反觀之則觀卦也就卦畫取象臨卦象夏正十二月爲二陽之月以至正月三陽二月四陽三月五陽四月六陽五月一隂六月二隂七月三陰八月四隂十二月象十二卦漢儒說正合觀卦自十二月至八月計數亦八歴月已隂長而陽消矣凶矣而爲時豈久也哉聖人于陽長而即畏其消如此乾坤交而生六子六子合而生萬物自然之理明載聖經朱漢上易傳六十四卦相生圖謂乾坤一交而爲姤復再交而爲遯臨三交而爲否泰以變諸卦是古聖之作六十四卦也先有乾坤二六畫卦乃以乾坤交而爲姤復六卦再以姤復六卦變而爲師比等五十六卦則是乾坤生姤復六卦非乾坤生震巽六子五十六卦爲姤復六卦所變非六十四卦爲乾坤六子所重也盡背聖言矣而可乎即以再交臨卦觀之謂臨六畫有震象則可謂臨是重坤卦兩陽來交則不可葢隂陽致一兩陽不可以交隂兩隂不可以交陽也象曰澤上有地臨君子以敎思无窮容保民无疆地臨澤上臨之象也君子用兌之口以敎思无窮法坤之厚以容保民无疆臨之道也地臨澤上大象别取之象也或據此解爻辭謂上卦亦臨下則陽臨隂隂又臨陽雜而亂矣初九咸臨貞吉象曰咸臨貞吉志行正也初九陽居陽位則其臨隂也感而使應志之所行正矣吉矣咸彖曰感也九二咸臨吉无不利象曰咸臨吉无不利未順命也九二有剛中之德而與四隂隣其感臨也更切于初矣是何者以四隂在上未即合而順命故初感之此更感之初之感僅行其志而此之感必獲其利矣未順命者終可順命之辭六三甘臨无攸利旣憂之无咎象曰甘臨位不當也旣憂之咎不長也六三卽隂也何能臨隂然以與二陽同體遂欲出其兌悦甘言甘貌以臨上隂豈有利焉是必變而爲乾如九三之惕若是能憂之矣則與二陽同德而无咎矣六三兌隂正八月之凶也故必變而憂之乃无咎六四至臨无咎象曰至臨无咎位當也六四在外卦爲隂初而與下之初九相應則陽感以臨之而隂卽至于所臨是安于柔位從陽者也无咎也六五知臨大君之宜吉象曰大君之宜行中之謂也六五居坤中地道光明九二感以臨之而六五卽知之是知其咸臨也此道也大君以之賢才感于下而君卽知于上取善而用中誰曰不宜五君位故言大君上六敦臨吉无咎象曰敦臨之吉志在内也敦厚也而有重遲之意焉玩辭衛風頓丘卽敦丘賈誼賦莫邪爲頓漢書芒刃不頓頓卽通鈍故敦者遲鈍也上六與初二皆不相應臨至此亦敦矣然而吉无咎也陽旣浸長隂終順從上六之志在于下之二陽而无他矣故再進則泰三隂翩翩來矣玩辭曰臨上卦四最在先與下卦至相逼故爲至臨上最在後與下卦隔四隂故爲敦臨坤下巽上觀盥而不薦有孚顒若仲氏易曰古无四聲平上去同用故漢易无音註後人分觀爲平去二音非也彖曰大觀在上順而巽中正以觀天下觀盥而不薦有孚顒若下觀而化也觀天之神道而四時不忒聖人以神道設敎而天下服矣仲氏易曰觀爲大艮而三五同功又爲互艮艮者門闕之象故曰觀春秋傳所稱兩觀是也第朝有觀廟亦有觀皆門旁雙闕而是卦下坤上巽以地上之木而巋然高峙謂之鬼門鄭康成曰艮爲鬼㝠門鬼門者宗廟也然觀有兩義以門闕爲樓觀之事則以上觀下三輔黄圖云登之可以逺觀而往往懸法以示垂象則又爲天下人所觀孫炎曰宫門雙闕懸法象使人觀之謂之魏象故在朝在廟皆有觀象而此取宗廟則上之與下皆将于是乎觀禮卽以祼薦大禮觀之盥祼灌通字謂酌鬯降神也有籍曰薦時祭則春薦韭秋薦黍榖梁傳註无牲而祭曰薦薦而加牲曰祭大祭則薦牲薦酒薦幣薦璧皆謂之薦以艮手搴巽茅祼鬯薦藉兩皆有象毋論灌薦相仍不可缺一而卽當祼初斯時尚不薦也而相信之至卽巳秩然其可觀如所謂上顒顒爾雅顒顒君德也下顒顒者廣韻顒顒仰也况旣薦乎葢聖人觀天以設敎彼四時不忒天之神道運之也而鬼神之道可以知矣故聖人制郊禮以祀天神而民知敬天制社禮以祀地祗而民知報地制禘嘗之禮以祀祖宗而民知木本水源以衛君父所謂下觀而化也是順而巽中正以觀示天下者也許酉山曰自宋儒以理訓天謂心中自有天則貫天人之學絶泛指造化之迹爲鬼神則格幽明之學絶其所關豈淺鮮哉象曰風行地上觀先王以省方觀民設敎來註觀民者觀民俗也如陳詩以觀民風納價以觀好惡而示之敎也風行地上有歴覽周遍之象初六童觀小人无咎君子吝象曰初六童觀小人道也艮爲少男初則尤穉矣是童也仲氏易童之觀所見幾何苟名爲大人君子者而若此不其吝乎六二闚觀利女貞象曰闚觀女貞亦可醜也大艮而包互艮象似重門且坤爲闔戸此重門又闔者也乃隂位隂爻有女之象六二以女子之目加之闔門之郄非闚觀乎仲氏易此惟利女子之貞耳彼何人斯竟同婦女可醜矣六二可應九五而乃醜者以下觀上不利于逺故初觀甚𣺌二觀尚隔三觀漸近四乃觀光易道隨時不爲典要非應比得位諸義所可盡也六三觀我生進退象曰觀我生進退未失道也六三居人位而應上九與賓王者相比是抱道之人也處下體之極則可進居下體之下又可退孔疏故自觀其身之進退生漢人訓性正義訓我身所動出以酌道而行之安有失耶六四觀國之光利用賓于王象曰觀國之光尚賓也六四在人位而親承九五互艮爲山變乾爲天有山之材照之以天光于是乎居坤國之上故曰觀國之光利用賓于王左傳是九五之所尚也九五王也謂之賓者古者朝覲之臣則賓禮之賢能之士則賓興之九五觀我生君子无咎象曰觀我生觀民也觀我生者自觀其身也然身何以觀觀民之從違厚薄而身可知矣此誠大觀在上之君子也无咎決矣上九觀其生君子无咎象曰觀其生志未平也下之上觀皆觀五也上亦下觀五之生其指五言知其爲君子无咎也然高自位置不肯爲用故曰志未平如伯夷之觀文武徐洪客之觀唐太宗皆有不平之志焉然不平而亦知其君子无咎觀至是極矣一隂姤二隂遯三隂否而四隂卦反無凶辭者四隂之凶已見于臨卦矣然易道陽少爲君隂多爲民九五當位上九服之下之四隂自然仰觀而順故曰觀易道固无窮也震下離上噬嗑亨利用獄彖曰頤中有物曰噬嗑噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也噬齧也嗑合也卦上下兩剛中三柔與頤卦象同周易輯聞曰中三隂象頤中之齒而九四一爻間之是頤中有物也必噬之而嗑則亨矣天下之事決斷梗塞始得和合固類如是何者觀其卦位則剛柔各分不噬何嗑觀其卦德則下動而上明觀其卦象則雷動電照合而成章可以噬嗑觀其卦本則坤畫之柔得乾中位而上行居五雖以隂居陽殊不當位而柔以行剛爻柔位剛出離日之明以爲震雷之決用獄何弗利焉周易集解曰獄必斷而後合正噬嗑事也仲氏易曰賁與此反對而不名噬嗑以此離開震動上噬下嗑若賁則艮止離開不能合矣象曰雷電噬嗑先王以明罰勅法電明罰雷勅法利用獄也初九屨校滅趾无咎象曰屨校滅趾不行也震爲足初亦爲足趾象也趾足指也一陽橫亙于下如桎梏則有屨乎校而滅没其趾之象焉如是則震行者不得行矣不行則小懲而大誡過惡不作故无咎按前當艮止亦有不行象周官掌囚下罪桎桎足械也械亦曰校初上兩陽似校而束全卦亦噬嗑象六二噬膚滅鼻无咎象曰噬膚滅鼻乘剛也二三與五噬物者也然在上下二剛之中亦有物象骨陽類肉隂類則隂爻皆肉象也六二互艮爲膚見李鼎祥集解膚者革也禮所謂膚鼎是也艮又爲鼻而正直所噬之膚有噬膚没鼻之象焉噬之深之象也曹操歡笑至以頭没杯案中即此滅字意葢下乘初剛而齧柔物六二以柔居柔膚亦柔物故爲力之易如此何咎六三噬腊肉遇毒小吝无咎象曰遇毒位不當也艮初爲膚三在膚内爲肉而上有離日㷬之則腊肉也周禮腊人掌田獸之腊全體而乾之也五行志曰厚味腊毒則以柔才而居剛位位不得當所遇多艱逢其毒者固亦有之然非我所致雖小吝而无咎矣九四噬乾胏得金矢利艱貞吉象曰利艱貞吉未光也剛爻象胏肉之帶骨者而離爲乾乾亦音干卦則爲乾胏噬之亦云艱矣且乾之金離本乾卦坎之堅木合爲金矢而忽得之何其可駭苟以居離之初離火未光艱難而守貞焉則吉矣此爻正頤中物也故噬之而有警戒如此王肅云金矢所以獲野獸故食之而得金矢六五噬乾肉得黃金貞厲无咎象曰貞厲无咎得當也六五爻柔則非乾胏也而乾肉矣乾肉噬之固非異事乃得坤五之中爲黃變乾爲金忽而得焉雖噬彼合此本无偏邪而兼金忽錫亦殊危厲然无咎也以其柔而居中得噬嗑之當故噬之而有意外之獲焉彖言不當位謂非正位也此言當謂其當中也漢韓嫣以黃金丸彈雀時人語曰若饑寒逐金丸是肉中亦有黃金事然易象本虗設以待天下之无窮不必株求也上九何校滅耳凶象曰何校滅耳聰不明也上九一陽橫亘于上亦象校而坎耳在下則荷校而滅其耳矣耳本主聰而今聽之不明矣屢校无咎何校卽凶者初起可悛終成難挽也何荷通噬嗑者斷物也初九斷之于始以遏其萌六二乘剛而斷乃易爲力六三位不當則斷物而遇毒九四未光則斷物而遇警六五柔得中而上行正有斷物之德位者也而亦貞厲至于上九又嚴之于終以懲其成焉斷物之非漫然也祛欲之學除奸之政尚其力諸離下艮上賁亨小利有攸往彖曰賁亨柔來而文剛故亨分剛上而文柔故小利有攸往天文也文明以止人文也觀乎天文以察時變觀乎人文以化成天下賁者飾也鄭康成王肅皆曰黃白色也而以本卦乾坤互易觀之上卦坤之上柔來居下卦乾中爲離文飾剛道嘉美亨通故亨分下卦乾之中一畫上而居坤之上爲艮以上飾柔道故柔者小也亦利有攸往物相雜謂之文隂陽交錯此天道自然之文也人法離之明艮之止文明以止則三千三百不踰其則所謂節文是也人文也是以君子觀乎天文則時變可察而敬授人時之法立矣觀乎人文則安上治民莫過于禮而化成天下矣賁之所關爲何如者朱子本義謂卦變一自旣濟來夫旣濟剛柔之分甚矣又何以分剛而文柔乎若李挺之卦變反對圖謂爲坤卦而下生三陽夫三隂三陽之卦如豐賁旣未濟等安分乾坤况與彖辭不合彖曰柔來而文剛明指下卦爲乾剛明指二之一柔分剛上而文柔明指上卦爲坤柔明指上之一剛今曰坤卦而生三陽則彖辭何以解象曰山下有火賁君子以明庻政无敢折獄賁文也黻黼文章曲折畢析以明庻政固其所也然用之折獄則虞流于刻覈縁飾矣故後世言刻深者曰深文鍛煉者曰文致法曰文網弄法曰舞文訂詁皆此意也无敢也初九賁其趾舍車而徒象曰舍車而徒義弗乘也二柔來文初三之剛初可受其賁矣而初九以剛居下性安孤介以爲在下爲趾居民位當徒行惟自賁其趾是歩是趨雖應有坎車而弗乘焉此豈矜屨緉之華忘安輿之適哉義固然也仲氏易六二賁其須象曰賁其須與上興也侯果曰自三至六有頤象二在頤下須之象在頤曰須在口曰髭在頰曰髯上无其應而三亦无應故上承于三與之相比而賁其須焉雖俱无應可相與而興起也上下卦之上也九三賁如濡如永貞吉象曰永貞之吉終莫之陵也九三爲二所賁而又處六四之下隂陽相錯賁如也且坎水潤之其賁也文采鮮澤濡如也詩云六轡如濡然濡不可過旣未濟之濡首濡尾皆濡而過也受物之飾恐爲物溺訂詁惟永其貞則吉矣亦何得陵之哉六四賁如皤如白馬翰如匪宼婚媾象曰六四當位疑也匪宼婚媾終无尤也六四得上九之文亦賁如也賁爲黃白色而變巽獨爲白色則又皤如而乃下之九三爲互震主震爲馬馵足爲的顙白馬也則翰如鄭康成曰翰白也馬白曰翰夫四與三同道隂陽爻位剛柔相當則翰如來迎皤如于歸亦将有之然而疑也正應在初似不可失特是初九高義弗乘而三之翰如非宼而興戎也坎爲寇檀弓戎事乘翰男先于女陽爻爲男隂爻爲女同歸賁如實婚媾也則雖似有尤而終何尤焉九三在四隂之下而同賁似有陵者而永貞則終莫之陵六四比于三陽之上而同賁似有尤者而婚媾則終无尤六五賁于丘園束帛戔戔吝終吉象曰六五之吉有喜也艮山之半爲丘果蓏爲園艮爲果蓏處士所居也而忽有加以文采者坤爲帛艮本坤卦而變巽之繩束之戔戔來聘虞仲翔曰巽爲帛以艮手斷巽故戔戔則戔戔者斷帛而束之之貌也說文訓戔爲賊意亦同張衡東京賦所謂聘丘園之耿介旅束帛之戔戔是也六五于此如伊尹之初聘囂囂三聘幡然則其初不无吝惜不行之意隂爲吝嗇然无此一吝有辱丘園矣向俱誤解然而弓旌到門究亦可喜吉矣上九白賁无咎象曰白賁无咎上得志也賁本黒黃白雜色孔子言也見呂覽家語至上九則賁極返淳而純然一白矣雜卦曰賁无色也文本于質以化成天下所謂分剛上而文柔者如此何咎之有大離有志象柔來而文剛則剛不妄動而亨故初舍車三永貞剛上文柔則柔能攸往而利故四婚媾五有喜初以文自治者也二㑹友以文者也三文有光澤四文得配耦五文逺賁六文返質而賁成矣坤下艮上剝不利有攸往彖曰剝剝也柔變剛也不利有攸往小人長也順而止之觀象也君子尚消息盈虛天行也五隂進而剝陽欲使陽亦變隂陽尚安往惟觀玩卦象法坤之順艮之止順而止之勿激怒小人而緩止其勢可也豈惟人道抑亦天行有消有息有盈有虗造化固然今陽之消而虛隂之息而盈獨非天行耶然消者安必不息盈者安必不虛不亦有天行耶君子亦尚此道以順之而已象曰山附于地剝上以厚下安宅剝象上削山尖峻故有削剝之象而下厚坤土廣厚山之所以安也葢卦之凶者别取其吉以爲義觀此與明夷可見矣人君无用隂剝陽之理則當自剝以厚下君子无用闇傷明之事則當自晦以莅衆也艮體一陽上覆宅舍也卽上九之象廬也下有三坤土愈厚則宅愈安矣初六剝牀以足蔑貞凶象曰剝牀以足以滅下也一陽橫亙于上有似乎牀初六之隂尚在牀下而欲剝之則剝以足矣夫隂邪陽正剝牀之下卽剝正也剝正則凶廣韻曰剝削也王弼云蔑猶削也荀九家易本蔑卽作滅凶者隂陽俱凶災也六二剝牀以辨蔑貞凶象曰剝牀以辨未有與也足上稱辨謂近膝之下屈則相近伸則相逺有分辨也康成說而牀梐在笫足之間亦謂之辨崔憬說六二進于初則剝牀以辨矣夫二爲五應與也今五陽巳剝則二无陽之與矣不與陽而與剝陽者類是亦滅陽者矣其凶也視之初可耳與卽艮卦不相與也之與六三剝之无咎象曰剝之无咎失上下也仲氏易曰三則有與矣第其所與者則卽其所剝者夫祗此區區一陽下爲我應而尚忍剝之然而與者三所獨剝者衆所同也衆皆欲剝吾何獨不剝則亦曰剝之而已初不言其所剝者何物也牀也廬也且不言我之所以剝之者何所以也以足也以辨也以膚也一若爲衆所持而隂應之而陽棄之者夫如是則何咎矣上下四隂皆以獨有與而失之此卽坤之以䘮朋爲安貞也六四剝牀以膚凶象曰剝牀以膚切近災也牀之有薦席猶獸之有皮毛也崔憬說故謂之膚剝牀以此則逼乎上矣不切近哉凶也六五貫魚以宫人寵无不利象曰以宫人寵終无尤也六五亦隂而不剝矣六五得中但見五隂排連駢頭而進有似乎貫魚者然夫魚本隂類乃以艮手牽變巽之繩而貫之将何以哉魚隂類宮人亦隂類而上下一貫一若后以夫人嬪婦御妻以次當夕如貫魚之有序者葢以宮人寵矣夫以天行言羣隂卽欲盡剝陽剛而時有未可能不趑趄故止蔑爲寵以人事言一陽雖孤而高峙于上隂類中有智計者率倡其衆以承其寵未嘗不利此正隂之猶可止而陽當順而止之者也故曰終无尤上九碩果不食君子得輿小人剝廬象曰君子得輿民所載也小人剝廬終不可用也此一陽也必致于剝而時尚未剝則于此有危微之幾焉試觀艮之果蓏至剛而碩碩大也實也祗此碩果懸之于衆隂之上而羣欲食之而不能食可謂幸矣然而禍福得失之數皆藴于此侵假君子居此則以坤爲大輿而我乘其上而得之小人際此則以艮爲門闕而我居其下而必欲剝之仲氏易夫得輿則厚下安宅坤衆載之上下俱利若小人剝廬其術安可用耶始以爲廬據已上惟恐不剝而不知陽廬一摧變偶則剝穿矣已将安庇茫茫宇宙容身无所隂詭之術尚安用哉故于剝之初而卽斷其凶也震下坤上復亨出入无疾朋來无咎反復其道七日來復利有攸往彖曰復亨剛反動而以順行漢魏以剛反至順行七字句是以出入无疾朋來无咎反復其道七日來復天行也利有攸往剛長也復其見天地之心乎復則亨矣以反易觀之乾陽窮剝于艮之上而反生于震之下下爲震行上爲坤順是反動而以順行也則陽自出而入出卽往入卽來復于无疾王弼曰疾卽病也復生故无疾雖坤朋尚來同類爲朋坤西南得朋是也初自内視之故曰來而順以行之則无咎夫一隂一陽道也今陽反而復于道自剝盡爲坤剝上一爻歴坤六爻共得七爻一爻當一日七日而來復按七日有以月言者謂自五月姤一隂生至十一月冬至一陽生共七月爲七日然序卦傳明曰剝窮上反下故受之以復則反動自剝爻論得七非從姤卦論也至以分卦直日法解七日緯文穿鑿更不足信天行消息盈虛之自然也然則與剝反觀剝順而止此順而行矣剝小人長此剛長矣小人長故不利攸往剛長故利有攸往矣夫復者反動卽反生也生生之謂易六十四卦皆生也天地之大德曰生天心祗一生也而可見者莫過于一陽之初生无往不復有斷必續爲物不貳乾知大始復不其見天地之心乎七日來復天道也卽以一歳觀之季秋後剝陽殆盡木落地氷中歴六候陽氣伏藏而後冬至一陽生諸生蕩蕩動也卽復也故芸始生荔挺出七候卽七日矣朱子卦變圖復剝臨觀等互相往來仲氏易謂其雜亂也宗朱升十辟卦變圖以復剝等十辟卦爲聚卦祗可易爲他卦不受他卦易謂十卦彖傳内並无剛柔往來諸辭可証然復卦明曰七日來復剛反何嘗无剛柔往來辭耶則聚卦與易分卦受易之說不必泥矣象曰雷在地中復先王以至日閉關商旅不行后不省方雷在地中陽微而未𤼵宜安静以飬之程伊川說至日震一陽象初九不遠復无祇悔元吉象曰不遠之復以修身也七日而來復是不遠之復也祇但也悔者變之機今已變而復于陽矣豈但悔哉顔子有不善未嘗不知是悔也知之未嘗復行是不遠復也未嘗復行則不但知而悔矣以之修身大吉之道也玩辭曰悔與復不同復則改之不但悔也祗能悔而不能改不足與言復矣坎之祗旣平祗義同此六二休復吉象曰休復之吉以下仁也不逺之復卽克已復禮也卽以復天地生物之心也所謂仁也六二比于初而托庇之則下附于仁而休乎復矣豈不吉哉說文人依木旁曰休六三頻復厲无咎象曰頻復之厲義无咎也仲氏易曰頻者連也三與初復相連同爲一體陽旣漸進則他日自連類而進而此時未能也時旣未能則三位多凶而震終成恐于此不能无惕厲之事然帝出乎震卦值冬春之交陽氣見地正行陽令者震動恪恭之際也其厲義也何咎焉舊解頓復爲忽得忽失則此爻忽復忽剝矣有此象乎六四中行獨復象曰中行獨復以從道也四與初相應初之不逺復仁也卽道也仲氏易曰復之四剝之三也復之四應初剝之三應上也故五隂上下各二而四居其中謂之中行胡雲峰說同猶剝之五隂上下各二而三居其中謂之失上下也獨此時四固非復而嗣此而復則又将不止于四而曰獨復者吾敢言復哉吾獨有一復道者彖曰反復其道與我爲應而我與之爲從也六五敦復无悔象曰敦復无悔中以自考也敦者遲鈍也五與初相隔四爻嗣復至此亦敦矣然而无悔者五居中位徐徐省察以求其合也向秀曰考察也自考卽視履考祥之考考其善不善也舊註敦復作至誠无僞解則元吉矣豈但无悔哉且每爻皆謂陽爻已復則二卽臨三即泰四卽大壯五卽夬未有此象也上六迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征象曰迷復之凶反君道也上處坤極爲迷與初之一陽𣺌不相涉是迷于復之道矣乾爲君坤迷則盡反乎君道矣上卦坎位純爻則見今以純坤加坎位之上而坎之災眚无不畢𤼵坎之宼盗弓輪无不畢出是以行師之衆而值坤先之迷不大敗乎仲氏易見坤國而不見乾君非以其國君凶乎雖至十年猶坤隂之數也焉克征哉震下乾上无妄元亨利貞其匪正有眚不利有攸往彖曰无妄剛自外來而為主于内動而健剛中而應大亨以正天之命也其匪正有眚不利有攸往无妄之往何之矣天命不佑行矣哉卦與大畜反易大畜上卦之艮剛自外來居下卦爲震之主于内則居者剛健下震動而上乾健則行者剛健九五剛中二以柔中應之則剛健有與大通而以正天之命人者固如此也若其不正如卦之上九者則證父攘羊者也乃恃其无妄而􅏌然直往往将何之上卦坎位爲多眚必有之矣天命不助雖欲行行乎哉魯論曰君子貞而不諒葢鑒此也象曰天下雷行物與胡旦王畿焦竑何楷皆以此句无妄先王以茂時育萬物與從也應也天下雷聲震行物莫不震起而應之一无詐妄者也茂盛也對時者如春犧牲勿用牝夏勿伐大木之類茂對時者對時之政畢舉也所以育萬物也是法天之雷行物與也初九无妄往吉象曰无妄之往得志也初九卽彖傳之所謂剛自外來而爲主于内者剛爻居剛位以正者也于此震動而往得其志矣此无妄之最吉者六二不耕穫不菑畬則利有攸往象曰不耕穫未富也有益爲耒耜虞氏說以下卦震三五互卦巽爲益震爲稼田一歲治爲菑三歲治爲畬但互艮爲止将有過恃其中正以爲无妄者曰吾命弗餒自有秋獲何事作爲不知人事旣亾天佑安至不耕不穫坐致虗耗隂爻隂位故末富豈无妄而大亨者哉則必急爲震之攸往而後利耳坊記子曰不耕穫不菑畬凶可爲此証六三无妄之災或繫之牛行人之得邑人之災象曰行人得牛邑人災也震本坤卦爲牛爲國邑巾二爻人位或以艮手牽巽繩而繫之牛此于邑人未嘗有害也而无如行人之得之也震爲動爲大塗行人象而或者尋覓无所曰吾向固繫之邑也繫之邑則求之邑于是捕詰之煩紛然而至矣夫邑人安居自謂與人无患與世无争何嘗有妄而橫被災禍天下之李代桃僵者豈少哉六三處人位而微下故致如此九四可貞无咎象曰可貞无咎固有之也九四以陽居隂位亦非正然有乾剛之德則可貞而无咎矣何者四與初敵應初之剛自外來四之剛其固有也九五无妄之疾勿藥有喜象曰无妄之藥不可試也九五居坎位坎爲疾偶爾違和亦所時有但天下惟虗則邪輳之重煩藥餌虞氏曰巽木艮石爲藥若九五陽剛得位卽有疾乃无妄之疾也陽剛則中實疾不能入得位則善攝疾将自瘳勿藥而有喜矣若輕以藥試之則无病服藥藥即爲疾乃以妄治不妄也豈可哉上九无妄行有眚无攸利象曰无妄之行窮之災也上九所處不正陽亢而窮乃下應震足謂我本无妄何不可行則彖之所謂有眚不利攸往卽此已故雜卦曰无妄災也後儒以无妄爲極品而聖人乃曰匪正有眚无妄何之六爻惟初九吉九四无咎六二則无妄而不富六三則无妄而致災九五則无妄而有疾上九則无妄而有眚是无妄固有道矣宋明儒者如司馬君實變新法而過朱晦庵門人欲殺陳同甫明之東林黨人偏而激亢以致禍及家國孔子所謂无妄災也不亦驗哉乾下艮上大畜利貞不家食吉利涉大川彖曰大畜剛健篤實輝光日新其德剛上而尚賢能止健大正也不家食吉養賢也利涉大川應乎天也大畜者大爲小所畜也天下之大者莫大于乾乃以三乾藏艮山之内乾欲行而艮止之則艮雖有陽而亦總畜之艮止之間一若以兩隂而畜四陽者則大畜矣仲氏易大畜而不利于大正乎乃以卦觀之乾有剛健之德焉艮有篤實之德焉虞氏易以山之材而照之以天光左傳乾艮有輝光之德焉又内卦離位爻純則見而三至上爲大離則其德復日新而不已焉况卦乾剛一畫高居上九陽剛君子爲賢是尚乎賢也故卦艮止能止健不使剛鋭而躁剛過而折是大正也将見畜止者且通爲畜養互兌爲口艮爲宮闕李鼎祥説養賢廟廊不徒家食吉矣雖兌爲大川而四五中空有舟象九三攸往而荷天衢是應乎天矣渉之有何弗利象曰天在山中大畜君子以多識前言往行以畜其德天爲積氣而山磅礴蔽虧四畔環合若将藴天其中而有之者大畜象也訂詁初九有厲利已象曰有厲利已不犯災也初九與六四應初陽欲進而四止之是厲也往必有災大離伏大坎爲災則不如巳之爲利矣九二輿說輹象曰輿說輹中无尤也變坎爲輪有輿象互兌毁折則脱其輹矣説脱通是爲六五所畜止而安于中也中又何尤按輹者車之鉤心夾軸之物盧氏説不行故脱之與小畜脱輻不同脱輻則車毁脱輹但且不行而已九三良馬逐利艱貞曰閑輿衛利有攸往象曰利有攸往上合志也九三爲下卦之終畜之至而値震行将以乾之良馬而追逐乎而尚勿驟也必利艱其心意貞其作爲曰此馬所駕之輿所防之衛其閑之哉閑之哉夫如是三與上皆陽皆賢中外合志利有攸往矣按震爲警衛虞氏説考工記車有六等之數戈也人也殳也㦸也矛也軫也皆衛名趙汝楳曰他卦隂陽應爲得此則爲畜他卦隂陽敵爲不胥與此則爲合六四童牛之牿元吉象曰六四元吉有喜也六四畜初者也初爲童易雅下卦離位爲牛是童牛也童牛之角何觸而六四卽以艮之堅木爲楅而橫施其首焉是止之于豫者也大吉之道也可喜甚矣侯果曰牿楅也兌冇喜象六五豶豕之牙吉象曰六五之吉有慶也説文豶豕劇豕去勢之豕也六五與九二應變坎爲豕以陽居隂變則奪其陽爲豶豕豕躁多突豶豕性亦和矣不牙何傷而六五必加以牙焉陸農師埤雅云牙􅍻也海岱之間以􅍻繫豕曰牙賦曰置牙擺牲是也艮堅木牙象所謂无故而不敢忽者有慶之道也上九何天之衢亨象曰何天之衢道大行也畜極而大通矣彖之所謂不家食而利涉川彖傳所謂尚賢九三所謂閑輿衛而上合志皆其時也仲氏易夫艮爲路上爲天位是天衢也天衢者天道也上九之賢毅然以身荷之登天闕而開艮路豈非吾道大行之㑹哉大畜義與小畜相反小人之柔似易制而實隂藏其奸故卦多危辭君子之剛似難馴而實樂循于道故卦多喜辭所以爲持世御物訓也爻與无妄相反无妄恃健而進易至于災故卦戒其攸往大畜剛而能止則得其時雜卦曰大畜時也故爻慶其大行所以爲檢身養心訓也震下艮上頤貞吉觀頤自求口實鄭康成曰頤口車之名正字通曰一曰輔車一曰牙車一曰頷車兩頰曰輔仲氏易曰初九象下車上九象上車緝聞曰中四隂齒象震動于下艮止于上口車動而止嚼物以養人故謂之頤頤養也項安世曰頤上止下動故象頤小過上動下止故象杵臼彖曰頤貞吉養正則吉也觀頤觀其所養也自求口實觀其自養也天地養萬物聖人養賢以及萬民頤之時大矣哉頤養必以正乃吉故頤象噬嗑而中虛无物物卽口中之實任其自取惟觀其所養之得失觀其自求口實之得失而正不正可見矣且以所養推之天地所養者萬物也聖人所養者由賢以及萬民也清寜化育神聖經綸頤之時豈不大哉口食不但膏梁卽功名富貴也翟𤣥曰天上地初也萬物象隂也虞翻曰艮爲賢坤隂爲民象曰山下有雷頤君子以愼言語節飲食山止于上而下有雷動頤口之象也言語口出飲食口入故君子以慎與節養之初九舍爾靈龜觀我朶頤凶象曰觀我朶頤亦不足貴也卦象大離爲龜而初又早具離明之照是靈龜也仲氏易靈龜宜自珍矣乃震動求食舍爾靈龜爾指初而觀上九之頤從上垂下朶朶然者説文朶樹木垂朶朶也則輕内重外將淪卑賤雖初陽本貴亦何足貴哉此處士貪卑如有明陳繼儒之流是也玩辭曰上九爲卦之主故稱我六二顚頤拂經于丘頤征凶象曰六二征凶行失類也乾爲首初九乾爻在六二下漢上說而六二仰首舉頤而向上有似乎倒其頤者然顚倒也且仰首而經癢仲氏易曰近頤之口下通于吭所謂經也莊于緣督爲經熊經鳥伸是也漢書以經死爲絶吭正以經卽吭也又若有抑騷之者然朱升曰摩拂卽抑騷也于以望食于上九之丘頤上處高又艮爲丘故曰丘頤則初之于上觀之而此幾以身赴之矣上旣非其比又非其應失其類矣不亦凶乎此居下位而援上者以居震中故徑往而行六三拂頤征凶十年勿用无攸利象曰十年勿用道大悖也六二猶但拂經也六三則震動之極且若拂其頤矣所謂道逢麯車口流涎者也則于養正之道愈大悖矣雖與上爲正應而卑惡躁醜必爲上所棄卽至坤數之盡爲十年猶勿用焉凶其甚矣又何利哉六四顚頤吉虎視耽耽其欲逐逐无咎象曰顚頤之吉上施光也六四與初相應初乾爻爲首亦仰首舉頤而向上地四爻上卦地位承乎天求立功也非苟食也吉矣艮象爲虎耽耽然視近而志逺說文耽耽視近志逺也其兼弱攻昧之欲逐而又逐卽逐鹿之逐固无過者功成受禄上九自𤼵大離之光而恩施榮耀矣上而太公下而耿弇似之六五拂經居貞吉不可涉大川象曰居貞之吉順以從上也六五居中而柔不當位亦有求口實而拂經之象焉而仰承上九不敢縱逸以順爲正固可迪吉惟是才弱德小若欲爲坎川之涉則不可耳此裴寂之流也上九由頤厲吉利涉大川象曰由頤厲吉大有慶也由頤同由豫諸爻由之而養也上九爲一卦主是下之觀頤顚頤拂頤拂經者皆由我而養之也兼收並蓄能无危惕然乾健知險卽大川浩淼无不利涉大有慶矣其漢唐之帝王乎卦中空有舟象口容不宜動宜止故震三爻皆凶艮三爻皆吉巽下兌上大過棟橈利有攸往亨彖曰大過大者過也棟橈本末弱也剛過而中巽而說行利有攸往乃亨大過之時大矣哉卦義與小過對者也四隂環聚則小過四隂中强則大過大者之過觀其象矣兩巽相背爲木合爲大坎爲宮爲棟棟來註謂梁上屋脊之木所以承椽瓦者也說文謂之極爾雅謂之桴其義皆訓中也而兩兌亦相背周易皆反易獨乾坤坎離頤大過中孚小過八卦不然而頤大過中孚小過又内外兩卦自相反易初上皆柔木中雖剛而本末弱矣兌爲毁折坎爲陷爲矯輮棟不且橈乎葢四剛大過則兩柔不堪坐致橈敗勢所必然所可挽回者剛過而尚居于中二五爲中三四亦稱中爻又巽入而兌悦以行以此往而過而不過乃可亨耳然則大過之時所關何如而濟之者當何如不大矣哉司馬光曰大過可濟之以柔不可助之以剛故剛之四爻皆以居隂爲吉不以得位爲美按卦元亨利貞利有攸往等辭有見在之辭有期望之辭有相需之辭如此利有攸往乃亨則亨視攸往也象曰澤滅木大過君子以獨立不懼遯世无悶澤以滋木今澤在上而反滅木大過之象也天下滔滔而誰以易之如伊尹之躬耕固獨立不懼遯世无悶也卽仲尼之周流亦獨立不懼遯世无悶也卓立風波以濟大過者也玩辭曰獨立不懼木之植遯世无悶澤之悦初六藉用白茅无咎象曰藉用白茅柔在下也初柔在下弱而卑矣然大過之時正當以卑巽出之苟其柔如茅其潔如白茅巽爲白茅爲藉以承剛藉薦也可以无咎士虞禮苴刌茅長五寸束之鄭註云苴所以藉祭也九二枯楊生稊老夫得其女妻无不利象曰老夫女妻過以相與也九二大過之始矣而幸居巽中則三四爲棟而二尚楊也見仲氏易葢全卦有棟象而棟者中也故又獨取中二爻巽爲楊澤木也故二居巽中五居澤中皆爲楊楊将爲棟則楊已枯矣而尚爲楊則稊猶可生矣稊康成本作荑云木更生爲荑葢楊枮則稚生諺所謂一楊死百楊生也且乾爲人爲父老夫也而下乘初六巽爲長女夫老夫而得女不亦過乎然惟過以相與則女也而爲吾妻矣身雖老而妻幼不猶有生育之功乎漢上説无不利矣九三棟橈凶象曰棟橈之凶不可以有輔也九三以剛居剛方以爲盛威勢而誰何然而千鈞中壓初弱難支卽欲輔之而其愎悍不可輔也彖曰棟橈正此爻矣九四棟隆吉有他吝象曰棟隆之吉不撓乎下也九四以陽居隂大過而不恃其過則棟隆然髙起不致重壓而撓矣何者九三居下卦之上不可以有輔而棟橈九四居上卦之下上弱下强故不橈于下而棟隆也來註然居大坎之中疵厲将乘亦有他吝大傳吝小疵也但无大傷耳彖觀六爻全卦故以本末弱而見中之棟橈象分觀上下兩卦故各分上下有棟有隆九五枯楊生華老婦得其士夫无咎无譽象曰枯楊生華何可乆也老婦士夫亦可醜也九五者棟之餘也亦枯楊矣枯楊而有生意于下爲生稊則枯楊而有生意于上爲生華然稊再生可活而華一𤼵必敗何可乆哉且陽剛居尊儼一士夫而上以兌之少女據諸陽之上居垂暮之地竟成老婦今六下乘五是士夫爲老婦所得矣夫禮重從一而法不禁再嫁夫婦居室亦何咎然又何譽白頭吟成實可醜耳以将敗之榮膴被庸碌之薦紳𣺌无重輕但有醜狀其象如此上六過渉滅頂凶无咎象曰過渉之凶不可咎也上六則末之弱者也弱居于始尚可遜承弱居于末何克力救兌爲澤大坎爲水頺波湧至卽有志拯濟而過涉不能已滅其頂嗟乎凶矣然豈其咎哉可憫也卦上下反對故初之與上二之與五三之與四其辭皆相對而反也初六明馬后之事高皇也九二天順之任李賢王翺也九三祖龍之亾也九四成康之盛也九五孔光胡廣之流也上六龍逄比干之死也坎下坎上習坎有孚維心亨行有尚彖曰習坎重險也水流而不盈行險而不失其信維心亨乃以剛中也行有尚往有功也天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉坎水也重坎習重也則上下皆水而險見焉兩岸土夾兩隂畫爲坤土而二五中剛通行其間坎爲通流而不息未嘗盈聚山夾谷瀉爲陷爲險而浩然行之就下流濕未嘗失信是有孚也是維心亨也坎中爻象心維語助辭是往而出險有功也坎之尚行有固然者而至廣徴其險天險則不可升地險則山川丘陵王公法之則重重設險以守其國險之時三才皆用之亦大矣哉五上天位有不可升象初二地位互艮爲山有丘陵象艮爲止又守象象曰水洊至習坎君子以常德行習敎事洊爾雅曰再也劉氏曰仍也周禮六德智仁聖義忠和也六行孝友睦婣任䘏也所敎之事禮樂射御書數之六藝也君子法坎水之頻至故常之習之初六習坎入于坎窞凶象曰習坎入坎失道凶也初在重坎之下是習坎也乃入于坎之窞焉是失尚行之道矣故凶窞坎中小穴旁入者也葢坎象水陷土中而分爻觀之中剛健直尚可出險兩岸隂上穴穿反見險陷故初與三皆有坎窞象九二坎有險求小得象曰求小得未出中也九二正在險内似无得者然求之則有小得矣是何者以其未出中道也二中位陽實有得象六三來之坎坎險且枕入于坎窞勿用象曰來之坎坎終无功也居下坎之終而上卦之坎又來之是來之坎坎也誠險矣姑且安枕待之來註震木亙于内而艮止不動枕象雖則无功不至于凶坎窞在上故視初六之凶辭有差也若亦入于坎窞焉何用乎六四樽酒簋貳用缶納約自牖終无咎象曰樽酒簋貳剛柔際也六四則脱下坎而但有上坎矣當險陷之時隂處隂位以簡約爲敬故樽酒而副以簋撃缶烏烏于以納之牖下牖在室戸之西而近于奥詩云于以奠之宗室牖下是也自牖由牖也卽牖處陳設也舊説不由戸而由牖入大可異以仰接乎五五剛正欲出險而得四之來附其禮雖薄其情孔諧終又何咎互艮堅木可爲樽坎爲酒震竹可爲簋簋盛黍稷器貳副也虞氏易曰震爲仰缶風俗通曰缶瓦器可以節樂九五坎不盈祗旣平无咎象曰坎不盈中未大也九五剛中出險之材也而上六一隂斷岸巋然則坎水未至于盈也但旣平耳夫不盈則中尚未大何以能行然旣平則盈将不逺可以得出故曰无咎按彖之不盈以流則不盈也爻之不盈謂坎尚未盈也玩辭葢兌止水也坎流水也故美其不盈而有坎科又必盈而後行故欲其盈上六繫用徽纆寘于叢棘三歲不得凶象曰上六失道凶三歲也若夫上則爻盡可以出險矣无奈上六隂柔居于陽外又爻變之渙與下不接則失有孚尚行之道矣雖曰彼岸可登顧不有叢棘在乎坎爲叢棘以變巽之繩爲徽爲纆繫而寘之其中卽歴上卦之三爻爲三歲而未必得脱豈不凶哉劉表曰三股爲徽兩股爲纆皆索名朱楓林有六子卦變圖夫六十四卦除八純卦及否泰二卦外餘皆六子與父母因重及六子自相因重所成也卦象顯然渠乃以小過之艮下震上者謂自坎變二與四易三與五易解之坎下震上者謂自艮變三與四易上與二易則長男反從中男變長男中男反從少男變女亦然所謂无理祗取閙也離下離上離利貞亨畜牝牛吉彖曰離麗也日月麗乎天百榖草木麗乎土重明以麗乎正乃化成天下柔麗乎中正故亨是以畜牝牛吉也離麗也麗者附也以一柔附兩剛而命名爲離亦以離體爲火火隐无形必附物而始有形麗之義也以天道言日月則麗乎天以地道言百榖草木則麗乎土以人道言必上離接下離而重明以麗于正乃可以化成天下今卦五柔麗于中離以柔爻爲主二柔麗于中正皆利貞也故亨矣是以離者得坤之中畫者也坤爲牛離之六二以隂位隂不爲牝牛乎仲氏易離火炎上而躁乾文言曰火就燥畜牝牛則至順而不燥矣吉矣象曰明兩作離大人以繼明照于四方明而重兩明相繼也程傳繼明者舜之繼堯武之繼文一代之繼明也日新又新緝熙光明一人之繼明也初九履錯然敬之无咎象曰履錯之敬以辟咎也初爲趾在地爲履初九處萬物相見之初說卦離者明也萬物皆相見也所履錯雜而至王昭素說詩傳曰東西爲交邪行爲錯變艮爲徑路交錯之象惟以剛爻之乾惕小心翼翼无事不敬雖有咎亦辟而免矣離麗也故初九卽著于事物六二黃離元吉象曰黃離元吉得中道也坤之六五爲黃裳黃者土之中色也今離六二得坤中畫而麗于中正非黃離乎而豈不大吉乎觀此則彖辭柔麗乎中正明指自坤來他卦可類推矣九三日昃之離不鼓缶而歌則大耋之嗟凶象曰日昃之離何可乆也初爲日出二爲日中三爲日昃荀爽說日昃則光隂无幾以年則歲之已晚也以心則智之将耄也宜修身安養以善其終乃或以爲日之不乆不如行樂鼓缶而歌不則憂其不乆大耋之嗟哀樂失常徒以自傷梁氏不其凶乎二者冀乆之念誤之也不知四時之序成功者去何可乆也數固然矣九四突如其來如焚如死如棄如象曰突如其來如无所容也仲氏易曰九四不中不正以火繼火厝火在下而通火于上有如突然突者竈囱也廣韻竈堗通作突近世字彚謂從音森大謬上下皆火又若火之延來者然且四以陽體而居互巽之上巽風揚燎巽木如焚然夫火附于物而今以附物而反焚物及物焚而火亦无所容矣膏以明自煎火以焚自滅如死然如棄然荀慈明曰隂麗于陽相附麗也然而有别離之意焉離火托木而生是附麗也烟焰飛升而灰降滯是别離也六五出涕沱若戚嗟若吉象曰六五之吉離王公也六居于五雖不當位而得中是火之将熸而尚可延者大坎之水出于離目其涕沱若坎爲加憂且戚嗟若斯豈婦女之泣與覊人之嘆哉誠以身麗王公之位處尊負艱昭烈論後漢輒太息痛恨袁安議朝政則嗚噫流涕持危挽傾實有頼焉不其吉乎三嗟則凶五涕乃吉易之隨時如此上九王用出征有嘉折首獲匪其醜无咎象曰王用出征以正邦也水潤下其下必陷而上可出故坎下卦初三二爻一凶一无用而二僅可小得至上卦四五則无咎矣然不可謂險在下而自安也故上六又有徽纆之戒火炎上其上必焚而下可安故離下卦初二二爻一无咎一元吉而三尚可安以俟命至上卦四則焚矣五雖得中而嗟涕矣然不可以離嗟而不震也故上九又有出征之威征者上伐下也以正正不正也六五王也坤爻邦也用用上九之剛明也嘉善也乾爲首兌爲毁折九四乾爻之首死如棄如是折首也坤爲衆醜也卦二五坤爻皆吉而别无隂衆可獲者是獲匪其醜也殱厥渠魁脅從罔治正有嘉也王用之以正邦矣又何咎參同契專以坎離爲修煉詳玩三聖繫辭止是麗陷二義與匡廓軸轂等說𣺌不相渉葢易爲君子謀不爲小人謀爲大道謀不爲異端謀也然君子進則小人獲庇吾道興則異端返正卽所以爲小人異端謀也不然盡行小人之計則災害至而小人亦无以自容矣盡入異端之教則人類滅而異端亦无以自存矣周易傳註卷二
