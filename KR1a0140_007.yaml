body:
  text: 周易傳註卷七通州學正李塨撰說卦傳言八卦用于揲蓍極于性命其相錯其及物並其方位時氣而及其徳其象皆說卦也但言八卦者六十四卦祗八卦也昔者聖人之作易也幽賛于神明而生蓍參天兩地而倚數觀變于隂陽而立卦發揮于剛柔而生爻和順于道徳而理于義窮理盡性以至于命前曰伏羲始作八卦又曰易興于中古作易有憂患則伏羲文王周公皆作易者也神明處幽不能與人接也聖人作易為介紹以傳之介紹以傳命謂之賛而生揲蓍之法乾鑿度日垂皇策者羲是伏羲已用蓍也其揲蓍也取卦畫之數則三竒為乾天三天之數九也三偶為坤地兩地之數六也取天地之數則天一天三天五參天而九也地二地四兩地而六也不取六七八九十者天地之數三竒兩偶至五而極以下皆疊數也五加一則為六加二則為七加三則為八加四則為九加五則為十故五數而數已畢因倚之以為乾策九坤策六之數觀三畫六畫之變于隂陽而立彖象所遇之卦易言卦以隂陽所謂陽卦隂卦是也發揮旁通于一畫之剛柔而生變動所布之爻易言爻以剛柔如剛得中柔得中之𩔖是也于以和順于一隂一陽之道圓神方知之徳而條理乎六爻易貢之義因之窮極其理以盡乎繼善成之之性而馴至于樂而知之之天命作易之用至矣昔者聖人之作易也將以順性命之理是以立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦分隂分陽迭用柔剛故易六位而成章是易之理即性命之理矣而性命之理在天則為隂陽在地則為柔剛在人則為仁義聖人之作易也將以順乎立天立地立人之道故兼三才而各兩其畫以成六畫之卦且分初三五為陽二四上為隂而陽位用剛亦用柔隂位用柔亦用剛迭用相雜其文粲然故易六位而成章以順性命之理也天地定位山澤通氣雷風相薄水火不相射八卦相錯而疑八卦之象可說也天地固有否泰往来而尊卑之位一定艮山兌澤分據而通氣山伏氣于澤澤蒸氣于山為雲為嵐為泉為雨震雷巽風各體而相薄出于地行于天風呌號而迫雷雷匉訇而從風咸恒損益四卦可觀水火之性則不能對發而相射也火上水下炎上者上潤下者下曰未濟又火上澤下曰睽謂不相射而違去也水上火下炎上者上入于水潤下者下入于火曰既濟水火有形無質相濟則水火為一不相射也又火下澤上曰革彖曰水火相息非水下而息火即火上而息水更革而不相射也是非相濟即相革故又曰水火相逮以水火之卦雖可對列而水火之物无能對据也唐宋訓不相射為不相入不相犯害明與經文相濟相息背矣是定位也乾坤相錯通氣也艮兌相錯相薄也震巽相錯不相射也坎離相錯重而六十四卦皆相錯如屯鼎相錯𩔖錯交也摩也此節文義甚明宋人忽以道士陳摶先天之圖溷之謂之伏羲八卦方位夫經文但曰天地定位未嘗曰乾南坤北也但曰山澤通氣未嘗曰艮西北兌東南也但曰雷風相薄水火不相射未嘗曰震東北巽西南離東坎西也而强誣聖言可乎且伏羲文王同此八卦而誣曰此伏羲八卦帝出乎震一節為文王八卦何所據乎文言曰先天而天弗違後天而奉天時言大人行乾之事也與道士修煉之術何與而竊取為名乎王文中擬經亦屬擬議之事宋人遂比之操莽今强篡聖經以入異端較之擬經何如也數往者順知来者逆是故易逆數也以之揲蓍四揲數之而得過往之策或九或六或七或八是數徃也即大傳所謂知以藏往也彰往也序而數之順也卦成而占未来之事或吉或凶或悔或吝是知来也即大傳所謂神以知来也察来也迎而知之逆也然易之數徃專為知来計也則易參天兩地之數非逆數而何哉註疏意同如子張問十世可知欲知来也孔子舉夏殷周相因之禮順數徃也而即百世可知逆知来也然數夏殷周正所以知百世故往曰數来曰知而曰易逆數也雷以動之風以散之雨以潤之日以晅之艮以止之兌以說之乾以君之坤以藏之若八卦及物之功則何如者雷動物風散物雨潤物日煖物艮止物而物成兌悅物而物遂而皆統于乾含于坤焉言象言卦互相備也王肅說帝出乎震齊乎巽相見乎離致役乎坤說言乎兌戰乎乾勞乎坎成言乎艮而疑八卦之運行帝實主之帝上帝也萬物出乎震震東方也齊乎巽巽東南也齊也者言萬物之潔齊也離也者明也萬物皆相見南方之卦也聖人南靣而聴天下嚮明而治盖取諸此也坤也者地也萬物皆致養焉故曰致役乎坤兌正秋也萬物之所說也故曰說言乎兌戰乎乾乾西北之卦也言隂陽相薄也坎者水也正北方之卦也勞卦也萬物之所歸也故曰勞乎坎艮東北之卦也萬物之所成終而所成始也故曰成言乎艮帝之出之齊之相見之致役之說之戰之勞之成之不可見見萬物而帝見焉震雷一動萬物隨而出是震東方卦也由是而東南則巽矣萬物鮮潔而均齊焉由是而南方則離矣繼明光照萬物相見聖人南靣嚮明而治盖取諸此由是而坤地道最盛之時也間領三女為萬物母上承帝役竭力致養故曰致役乎坤由是而兌其正秋乎萬物至是各飽化機欣欣自得曰說言乎兌此故也由是而西北則乾矣夫乾何以為西北之卦也西成而後隂盛疑陽窮无復之𤣥黄交戰龍徳乃復兌夬為乾是秋冬之交也故乾天于此見而領三男以行冬春之事焉坎為水正居北方安存而慰勞之使萬物有所歸而休息焉故曰勞乎坎由是而東北為艮萬物至坎而終者于此而成其終終則有始萬物之始出于震者于此而成其始是萬物之所成終而所成始也故曰成言乎艮八卦言震東巽東南離南乾西北坎北艮東北則坤之西南兌之西可𩔖推矣言兌正秋則震之正春離之正夏坎之正冬可𩔖推矣虞書以東作屬春南訛屬夏西成屬秋朔易屬冬亦同此按乾坤鑿度以乾坤巽艮四隅卦為四門坎離震兌四方卦為四正有云庖犧氏畫四象立四隅以定羣物發生門而後立四正雖緯書不可信然亦見兩漢時皆以此節所言時位為羲畫原義至文王繫辭坤之西南得朋言坤蹇之不利東北言艮而孔子詳說于此是自古聖聖相傳八卦方位時氣皆屬一致乃邵子為陳摶所誤朱子又為邵子所誤妄以乾南坤北為羲卦方位于此乃曰未詳嗚呼認賊為主遇主而反不識矣神也者妙萬物而為言者也動萬物者莫疾乎雷撓萬物者莫疾乎風燥萬物者莫熯乎火說萬物者莫說乎澤潤萬物者莫潤乎水終萬物始萬物者莫盛乎艮故水火相逮雷風不相悖山澤通氣然後能變化既成萬物也嗚呼神矣哉神也者妙運萬物而為言者也莫疾莫熯莫說莫潤莫盛正言六子之神也故水火相逮以潤之燥之雷風不相悖以動之撓之山澤通氣以悅之成之然後能變化無窮而盡成萬物矣不言乾坤者乾坤之神寄于六子也宋明皆為先後天圖所誤于此節動萬物數語以為後天水火相逮三語以為先天而中以故字承之遂无能解說紛紛疑訟不知原无所謂先後天之分也亦曉然矣乾健也坤順也震動也巽入也坎陷也離麗也艮止也兌說也此八卦之徳也各足者也陷一陽陷于二隂也然健故動動則陷陷則止順故入入則麗麗則說乾為馬坤為牛震為龍巽為雞坎為豕離為雉艮為狗兌為羊遠取諸物則馬性健其蹄圓乾象牛性順其蹄坼坤象来註震雷龍也巽為號令雞鳴知時漢上說坎主水瀆豕處汚溼離為文明雉有文章孔疏狗外剛止人而内柔羊外柔悅羣而内剛乾為首坤為腹震為足巽為股坎為耳離為目艮為手兌為口近取諸身則首為天尊腹主坤藏足震動于下股上連下坼坎陷為耳離明為目手拘止也口開說也兌上開口象言象言以悅人故悅即為說乾天也故稱乎父坤地也故稱乎母震一索而得男故謂之長男巽一索而得女故謂之長女坎再索而得男故謂之中男離再索而得女故謂之中女艮三索而得男故謂之少男兌三索而得女故謂之少女八卦之為父母六子可明矣索纒也即交也兩股之合猶隂陽之交也見别傳乾一交坤則乾初入坤初易之而為長男坤一交乾則坤初入乾初易之而為長女乾再交坤則乾中入坤中易之而為中男坤再交乾則坤中入乾中易之而為中女乾三交坤則乾上入坤上易之而為少男坤三交乾則坤上入乾上易之而為少女而伏羲畫卦之次序亦可見于此矣舊訓索為求或謂陽求隂為男隂求陽為女或謂隂求陽為男陽求隂為女兩難畫一且隂求陽不可為訓項平菴曰乾坤六子初為氣雷風中為精水火末為形山澤乾為天為圜為君為父為玉為金為寒為氷為大赤為良馬為老馬為瘠馬為駁馬為木果本義云荀九家易此下有為龍為直為衣為言仲氏易云虞氏易有為徳為王為人為神為盈為甲為施為嘉為好何妥有為剛健乃推廣八卦以𩔖萬物之情皆文周彖象繫辭所有而孔子說之也天體圜故為圜来易云純粹為玉純剛為金孔疏云寒氷西北地也大赤盛陽之色仲氏易云老馬行久瘠馬多骨說文駁馬踞牙能食虎豹皆陽物木果形圓而核包生意亦象乾陽也坤為地為母為布為金為吝嗇為均為子母牛為大輿為文為衆為柄其于地也為黑本義云荀九家有為牝為迷為方為囊為裳為黃為帛為漿有仲氏易云荀氏又有為邑九家易又有為亂虞氏易為理為事為大業為臣為民為鬼為虚為乙為拇為䘮為終為害為死為萃為土為器為晦為國為暑為兕虎干寳有為順盧氏有為師左傳杜註有為馬地廣布如布釡化物以養人地道也坤隂收斂故為吝嗇崔憬曰地生萬物不擇美惡故為均子母牛者孳牛也孔疏云大輿取其能載九家易曰萬物相雜故為文虞氏曰坤隂為民衆也說統曰坤執簡以作成故為柄孔疏云黑者極隂之色震為雷為龍為𤣥黃為旉為大塗為長子為決躁為蒼筤竹為萑葦其于馬也為善鳴為馵足為作足為的顙其于稼也為反生其究為健為蕃鮮本義云荀九家有為玉為鵠為皾仲氏易云虞氏易有為侯為主為兄為夫為言為行為樂為出為作為麋鹿蜀才有為喜笑左傳杜註有為木為諸侯國語韋註有為車震天地之初索也故得天地𤣥黃之色旉者花也春時氣至而草木皆吐旉也孔疏一竒動于内而二偶開萬物所出為大塗崔憬曰剛動故決躁蒼筤陸農師曰幼竹萑葦荻與蘆也亦竹𩔖皆本末孤生无附椏者震之怒生似之爾雅曰馬後左足白曰馵震動居左也作足以動魯頌思馬斯作雙足並舉也爾雅曰馰顙白顛象一陽在初也善鳴則象雷也稼反生謂萌芽自下而生反勾向上陽反動于下似之其究也二三俱變陽則為乾健對變為巽則物生而蕃鮮即潔齊也巽為木為風為長女為繩直為工為白為長為高為進退為不果為臭其于人也為寡髪為廣顙為多白眼為近利市三倍其究為躁卦本義云荀九家有為楊為鸛仲氏易云虞氏易有為妻為處為隨為魚為號為包為杞為白茅為舞孔疏云木可曲直巽順之謂也風善入物故巽入為風仲氏易云巽以命令齊物如繩之直木而工則操之正所云巽為徳之制者記曰白受采白者質也巽以二陽蔽一隂内隂為文外陽為質故色白風長且高巽則進退不決臭風所發也寡髪者隂血不上行也廣顙陽上盛也訂詁曰白為陽黑為隂離目上下白而黑居中巽目上中白而黑掩在下是白眼多也巽亦可言目者巽入有視象利必于市曰利市利以三倍為率詩如賈三倍是也巽本乾體而一隂吝嗇為主于内性又善入凡乾之金玉皆有之是近利市三倍也来註云震巽言究者剛柔之始也對變震為躁卦坎為水為溝瀆為𨼆伏為矯輮為弓輪其于人也為加憂為心病為耳痛為血卦為赤其于馬也為美脊為亟心為下首為薄蹄為曵其于輿也為多𤯝為通為月為盜其于木也為堅多心本義云荀九家有為宫為律為可為棟為叢棘為狐為蒺藜為桎梏為仲氏易云荀氏又有為志虞氏易有為孚為疑為後蹇為臀為酒侯果有為險干寳有為法為夜盧氏有為車左傳杜註有為衆溝瀆土夾水也陽藏坤中故為𨼆伏虞翻曲者更直為矯直者更曲為輮水流有矯輮象宋衷弓與輪則以矯揉而成者惟險故憂故心病其曰耳痛者坎為耳也血與水為𩔖赤者血色仲氏易陽在中象馬美脊宋衷心堅故亟崔憬上畫柔為下首下畫柔為薄蹄而且曵来註乾健震動坎通行故皆象馬孔穎達坤為大輿坎折坤體故車多𤯝虞翻月水之精也水潛陷如盜木堅多心以剛在内也離為火為日為電為中女為甲胄為戈兵其于人也為大腹為乾卦為鼈為蠏為蠃為蚌為龜其于木也為科上槁本義云荀九家有為牝牛鶴仲氏易云九家又有為飛鳥虞氏易有為隼為為夏為罔馬融王肅俱有為矢侯果有為黄牛何妥有為文明干寳有為晝為斧左𫝊杜註有為鳥為諸侯曰火之精也甲胄戈兵鼈蠏蠃蚌龜剛在外也孔疏大腹者中虚也火熯物故為乾卦科盈科之科中空也木中空而上槁象離艮為山為徑路為小石為門闕為果蓏為閽寺為指為狗為鼠為黔喙之屬其于木也為堅多節本義云荀九家有為鼻為虎為狐宗仲氏易云虞氏易有為背為皮為尾為篤實為求為廟為小子為僮僕為城為狐狼鄭康成有為鬼㝠門左傳杜註有為言陽峙地上為山山无大塗二隂偶開在下為徑路上畫相連下畫雙峙中虚故為門闕木實為果草實為蓏皆剛實之見于外者周禮閽人掌王宫中門之令寺人掌王之内人及宫女之戒令皆止人出入者艮止義也仲氏易鼠之剛在齒鳥之剛在喙艮剛在上𩔖之又馬融曰黔喙肉食之獸謂豺狼之屬木堅多節亦止義兌為澤為少女為巫為口舌為毁折為附決其于地也為剛鹵為妾為羊本義云荀九家有為常為輔頰刑仲氏易云虞氏有為妹為孔穴為人為小坎水而窒其下則為澤巫上口以事神者秋殺物故毁折一隂上附行將決去兌乾之所以為夬也夬者決也仲氏易說文西方曰鹵李氏易解曰乾陽在下故剛澤水潤下故鹹胡炳文曰象有不言而互見者乾為君以見坤之為臣乾為圜以見坤之為方吝嗇隂之翕也以見陽之闢均地之平也以見天之高離為乾卦以見坎之為濕坎為血卦以見離之為氣巽為臭以見震之為聲震為長子而坎艮不言者于陽之長者尊之也兌少女為妾而巽離不言者于隂之少者卑之也乾為馬震坎得乾之陽皆言馬而艮不言者艮止也止之性非馬也他可觸𩔖而通矣序卦傳孔子盖逆知後儒有僣易經文者故言上下篇相次之義以定之有天地然後萬物生焉盈天地之間者唯萬物故受之以屯屯者盈也屯者物之始生也物生必䝉故受之以䝉䝉者䝉也物之穉也物穉不可不養也故受之以需需者飲食之道也飲食必有訟故受之以訟訟必有衆故受之以師師者衆也衆必有所比故受之以比比者比也比必有所畜故受之以小畜物畜然後有禮故受之以履履而泰然後安故受之以泰泰者通也物不可以終通故受之以否物不可以終否故受之以同人與人同者物必歸焉故受之以大有有大者不可以盈故受之以謙有大而能謙必豫故受之以豫豫必有隨故受之以隨以喜隨人者必有事故受之以蠱蠱者事也有事而後可大故受之以臨臨者大也物大然後可觀故受之以觀可觀而後有所合故受之以噬嗑嗑者合也物不可以茍合而已故受之以賁賁者飾也致飾然後亨則盡矣故受之以剝剝者剝也物不可以終盡剝窮上反下故受之以復復則不妄矣故受之以无妄有无妄然後可畜故受之以大畜物畜然後可養故受之以頤頤者養也不養則不可動故受之以大過物不可以終過故受之以坎坎者陷也陷必有所麗故受之以離離者麗也有乾天坤地然後萬物生焉其生之始之穉之比之同之合之飾之君師畜養禮樂兵刑上臨下觀否泰謙豫剝復蠱隨无妄大過皆循環相因而終歸于有所陷而麗皆生也无所麗則乾坤毁矣佛老求其无麗是天地之罪人也此上篇之序也后儒有上下篇義以隂陽盛衰消長為序而聖人不及惟發人事進退之次言人事而不言天道之教法也有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯夫婦之道不可以不久也故受之以恒恒者久也物不可以久居其所故受之以遯遯者退也物不可以終遯故受之以大壯物不可以終壯故受之以晉晉者進也進必有所傷故受之以明夷夷者傷也傷于外者必返于家故受之以家人家道窮必乖故受之以睽睽者乖也乖必有難故受之以蹇蹇者難也物不可以終難故受之以解解者緩也緩必有所失故受之以損損而不巳必益故受之以益益而不已必決故受之以夬夬者決也決必有所遇故受之以姤姤者遇也物相遇而後集故受之以萃萃者聚也聚而上者謂之升故受之以升升而不已必困故受之以困困乎上者必反下故受之以井井道不可不革故受之以革革物者莫若鼎故受之以鼎主器者莫若長子故受之以震震者動也物不可以終動止之故受之以艮艮者止也物不可以終止故受之以漸漸者進也進必有所歸故受之以歸妹得其所歸者必大故受之以豐豐者大也窮大者必失其居故受之以旅旅而無所容故受之以巽巽者入也入而後說之故受之以兌兌者說也說而後散之故受之以渙渙者離也物不可以終離故受之以節節而信之故受之以中孚有其信者必行之故受之以小過有過物者必濟故受之以既濟物不可窮也故受之以未濟終焉自有天地萬物而男女以立君子之道造端乎夫婦夫婦咸恒而後父子君臣上下之禮義有所錯焉錯即八卦相錯之錯其錯也為遯為大壯為晉為明夷為家人為睽為蹇為解為損為益為夬為姤為萃為升為困為井為革為鼎為震為艮為漸為歸妹為豐為旅為巽為兌為渙為節為中孚為小過以求其既濟而終之未濟亦如循環之相因皆錯也盖終以既濟則夫婦之道窮矣禮義之所錯亦窮矣惟終之以未濟則禮義之交錯未有所極錯以為生生生之謂易如此四時之序成功者去故不可久居其所泛言物理不指上夫婦也物不可終壯故受之以柔進上行益而不已則盈故決以正决邪必有喜遇韓註井道不可不革者浚之也鼎變化物故曰革物說則發舒故說而後散之韓註曰行過乎恭用過乎儉可以矯世厲俗有所濟也此下篇之序也雜卦傳伏羲之畫八卦也剛柔相摩其重為六十四卦也八卦相盪而卦成後觀之乃多兩卦反易祇為一卦者六十四卦除乾坤頤大過坎離中孚小過八卦隂陽對易不能反易餘皆一卦反覆成兩卦如屯䝉為一卦需訟為一卦上篇三十卦共十八卦下篇三十四卦亦共十八卦文王皆以對易反易二卦相連而序之孔子釋對易反易乃故雜其序前者雜置後後者雜置前上篇者雜列下篇下篇者雜列上篇且自大過以下並對易反易之卦亦雜焉是謂雜卦以見易道无窮不可執一或謂八卦統于乾坤坎離巽風即天氣之吹嘘而下交于地者也艮山即地形之隆起而上交于天者也震雷即火之鬱而奮發者也兌澤即水之聚而溼潤者也而坎離統于乾坤水火者天地之用也坤統于乾天包地者也故序卦始于乾坤中于坎離終以既未濟既未濟者水火之用也雜卦始于乾坤終于既未濟而結之以夬以復于乾即互卦觀之可見盖乾坤剝復大過頤姤夬八卦皆互乾坤解蹇睽家人漸歸妹既未濟八卦皆互既未濟比師臨觀屯蒙損益八卦皆互剝復咸恒大壯遯大有同人革鼎八卦皆互姤夬大畜无妄萃升隨蠱否泰八卦皆互漸歸妹渙節小過中孚豐旅離坎八卦皆互大過頤震艮謙豫噬嗑賁晉明夷八卦皆互解蹇兌巽井困小畜履需訟八卦皆互睽家人得十六卦而乾大過姤夬互乾坤剝復頤互坤漸蹇家人既濟互未濟歸妹解睽未濟互既濟又只得四卦故雜卦以乾坤起仍互乾坤繼以比師臨觀屯蒙皆互剝復震艮互解蹇損益互剝復大畜无妄萃升互漸歸妹謙豫噬嗑賁互解蹇兌巽互睽家人隨蠱互漸歸妹剝復互坤晉明夷互解蹇井困互睽家人咸恒互姤夬渙節互頤解蹇睽家人互既未濟否泰互漸歸妹大壯遯大有同人革鼎互姤夬小過中孚豐旅離坎互大過頤小畜履需訟互睽家人而其後歸之乾坤既未濟大過姤互乾漸互未濟頤互坤既濟互未濟歸妹未濟互既濟夬互乾而終焉此亦雜卦之一義也乾剛坤柔比樂師憂臨觀之義或與或求剛柔者諸卦之主也比建萬國故樂師毒天下故憂以我臨物故曰與物来觀我故曰求屯見而不失其居蒙雜而著屯剛見下而利貞得居蒙昩雖雜而養正則著震起也艮止也損益盛衰之始也大畜時也无妄災也萃聚而升不来也謙輕而豫怠也升征于上故曰不来謙自視輕也豫自處怠也噬嗑食也賁无色也兌見而巽伏也隨无故也兌說外見和順之貌巽入内伏深潜之思隨入宴息故无故蠱不可裕則當飭剝爛也復反也爛生意潰爛也晉晝也明夷誅也井通而困相遇也誅傷也本義井通以養人困安于所遇咸速也恒久也渙離也節止也解緩也蹇難也已免于險利用夫緩寛舒之政也方在于險當思其難艱難之慮也睽外也家人内也否泰反其𩔖也大壯則止遯則退也外疎外也内聯屬也大壯當止于正盛遯當退于既衰皆為陽計也大有衆也同人親也革去故也鼎取新也小過過也中孚信也小者之過踰常也豐多故也親寡旅也離上而坎下也小畜寡也履不處也豐則多事尚慎之哉旅則親寡在所處也離火炎上坎水潤下畜隂故曰寡履行故曰不處需不進也訟不親也大過顛也姤遇也柔遇剛也漸女歸待男行也頤養正也既濟定也歸妹女之終也未濟男之窮也本末弱故顛與頤對易姤與夬反易漸與歸妹反易事已濟則定矣與未濟反易女歸其終也未濟上九濡首男窮也夬決也剛決柔也君子道長小人道憂也夬剛決柔則夬進于乾矣君子道長君子慶矣小人道憂小人變矣聖人雜卦以夬終情深哉周易傳註卷七
