body:
  text: 周易傳註卷五通州學正李塨撰繫辭上傳卦下繫辭者文王之彖也爻下繫辭者周公之象也孔子既釋彖象而又統論卦爻繫辭之義曰繫辭傳分上下天尊地卑乾坤定矣卑髙以陳貴賤位矣動靜有常剛柔斷矣方以𩔖聚物以羣分吉凶生矣在天成象在地成形變化見矣聖人之作易原于天地者也天健而尊地順而卑是未有易卦之乾坤而乾坤已定矣来註地卑陳下天髙陳上是未有卦位上下之貴賤而貴賤已位矣天常動而地常靜是未有卦爻之剛柔而剛柔已斷矣天地間東西南北殊方也而中夏邊陲之屬必以其𩔖而聚萬物皆物也而羽毛鱗裸之倫自以其羣而分其聚其分吉凶錯焉是未有易占之吉凶而吉凶已生矣在天則日月星辰有隱見昏明之象在地則山川草木有升沈榮枯之形是未有隂陽營易之變化而變化已見矣是故剛柔相摩八卦相盪鼓之以雷霆潤之以風雨日月運行一寒一暑乾道成男坤道成女惟其如是故一剛一柔左右對易如手相摩切乾坤震巽坎離艮兌八卦上下因重如器相盪漾于是雷霆鼓之風雨潤之日月代明寒暑成歲如此其摩盪也而乾道成男坤道成女大生廣生之用出焉乾知大始坤作成物乾以易知坤以簡能易則易知簡則易從易知則有親易從則有功有親則可久有功則可大而乾坤之道可極言矣乾出其良知而大始萬物坤運其良能而成就萬物作者能之為也而乾之知則氣至物生通透徹達一无艱難是以易知而坤之能則承天時行約切凝靜並无紛擾是以簡能惟其易也故乾之始物不卜而可知惟其簡也故坤之成物不煩而可從惟易知也故動則呼天無不親之惟易從也故成形成色于焉有功有親也則雜而不厭終古不變是為可久有功也則種𩔖繁滋溥滿六合是為可大彼異端之言物物雕琢者烏足以知乾坤哉可久則賢人之徳可大則賢人之業易簡而天下之理得矣天下之理得而成位乎其中矣易簡天地之道也而人道即不外是易之可久則四徳直萬善備即賢人之徳簡之可大則美大富有胞與寰區即賢人之業故人能如天地之易簡則執簡御繁天下之條理皆得而天位上地位下聖人成位乎其中一如易之六爻成位者賢人統聖賢言過人之稱聖人設卦觀象繫辭焉而明吉凶剛柔相推而生變化乾坤明而卦象與繫辭可考矣伏羲文周設立卦爻觀其形象繫以辭焉而明其或吉或凶剛推柔生變柔推剛生化虞仲翔說而生生不窮焉按剛柔相推其在立卦之初則陽交隂隂交陽也如彖所謂剛来而得中之𩔖是也其在成卦之後則陽變隂隂變陽也如小畜上九變而辭有既雨象之𩔖是也是故吉凶者失得之象也悔吝者憂虞之象也變化者進退之象也剛柔者晝夜之象也六爻之動三極之道也以其象言辭有吉人事得之象辭有凶人事失之象辭有悔而趨吉事過憂而將變之象辭有吝而趨凶當事虞而安之之象卦爻陽變春夏進之象卦爻隂化秋冬退之象荀爽說剛屬陽明晝象柔屬隂暗夜象于以觀六爻九六之動則天地人交感之道也陸績曰初二下極三四中極五上上極下文爻言乎變化即在内分言統言一也是故君子所居而安者易之序也虞本作象所樂虞氏李氏易解俱作變而玩者爻之辭也是故君子居則觀其象而玩其辭動則觀其變而玩其占是以自天佑之吉無不利而君子得易之益矣居而安易之序如居乾之初九而安在勿用居乾之九三而安在乾乾孔穎達說是也樂而玩爻之辭如玩潜龍之辭而樂其不拔玩見龍之辭而樂其君徳是也于以居而无卜筮也觀象玩辭如蔡墨云在乾之姤知莊子云在師之臨謂之在者是也俞氏說動而卜筮也觀變玩占如陳侯遇觀之否晉侯遇復謂遇者是也于以趨吉辟凶承天之佑而易備于君子矣彖者言乎象者也爻者言乎變者也吉凶者言乎其失得也悔吝者言乎其小疵也无咎者善補過也此復即繫辭而詳釋之卦之彖辭言一卦之象爻之象辭言九六之變來註曰悔未至于吉而猶有小疵吝未至于凶而已有小疵善嘉也辭嘉之也是故列貴賤者存乎位齊大小者存乎卦辨吉凶者存乎辭憂悔吝者存乎介震无咎者存乎悔列貴賤以爻言齊猶言辨也王註齊大小以彖言如大畜小畜大過小過屯臨陽為主曰大亨旅巽隂為主曰小亨之𩔖辨吉凶應前失得聖人憂患之情見乎辭故存乎辭也憂悔吝應前小疵介初分之界也存乎初分之界即憂之也震无咎應前補過震動補過不悔而能之乎是故卦有大小辭有險易辭也者各指其所之故卦有小隂大陽而辭有危險順易各指人以所當適者而巳易與天地凖故能彌綸天地之道仰以觀于天文俯以察于地理是故知幽明之故原始反終故知死生之說精氣為物游魂為變是故知鬼神之情狀此復即聖人設卦觀象而贊之也設卦觀象者易也易即一隂一陽之道也與天地齊凖故能于天地之道彌滿而無所不周說文彌開弓也謂弓開則滿也綸絡而無所不到以之而仰觀天文俯察地理則地幽天明之故知矣原物之始而反其終則生死之說知矣氣之精靈聚而為物浮魂游蕩散而為變則鬼者物終而游魂變幻無定狀者是鬼也神者有一物其物之精氣結聚者即物之神也情狀皆可知矣與天地相似故不違知周乎萬物而道濟天下故不過旁行而不流樂天知命故不憂安土敦乎仁故能愛範圍天地之化而不過曲成萬物而不遺通乎晝夜之道而知故神无方而易无體聖人其全體夫易乎徳參天地尚何違智周萬物而道濟天下尚何過差旁行汎應而權不離經天則樂命則知尚何憂隨所處之土而安肫肫乎其仁則能胞與无疆矣焉有不愛天地之化育且待吾裁成而有模以範之有郭以圍之不使其過中萬物則委曲成就而一无遺且晝陽夜隂之道通之而玲瓏透徹則聖不可知神也而尚拘一方惟變所適易也而尚執一體哉一隂一陽之謂道繼之者善也成之者性也上言道也易也神也總不外隂陽而已道猶路也一隂一陽分立兩道也一隂一陽迭運一道也其繼續不已造化流轉者乃隂陽本然之善也故元稱善長所謂逝者如斯不舎晝夜也因而命之人或大或小或清或濁各凝成一善者則所謂性也中庸言天命謂性孟子言性善皆本此按韓康伯註曰道者何无之稱也在隂為無隂隂以之生在陽為無陽陽以之成隂陽雖殊無一以待之宋儒太極圖本之无極即此意蘇東坡傳曰聖人知道之難言也借隂陽以言之隂陽未交廓然无一物而不可謂之無有此道之似也又曰學道而自其繼者始則道不全昔孟子以善為性以為至矣讀易而後知其非也孟子之于性盖見其繼者而已朱晦庵本義曰隂陽迭運者氣也其理則所謂道又曰隂陽是氣不是道所以為隂陽者則道也又宗程張論性曰性有義理有氣質義理皆善氣質有善有惡故惡亦不可不謂之性孟子論性不論氣質其言未備信如諸說則改聖經曰無之謂道一隂一陽不謂之道繼之者有善有惡而性成焉可乎明與聖經反則何不直攻之闢之而乃為之註觧乎說卦曰立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義是明以隂陽仁義皆為道矣而曰不是道將仁義亦非道乎隂陽剛柔仁義其實也謂之道者名也如甲有身實也呼甲身曰長人其名也今謂甲身不是長人長人在甲身先所以為甲身者也而通乎在天道為元亨利貞在人性為仁義禮智元亨利貞非氣乎仁義禮智不可見而發為惻隱羞惡辭讓是非非氣之用乎性心生也心非氣質而何以隂陽之氣之流行也謂之道以其有條理謂之理今乃分理道别為一物曰理道善而氣惡不亦誕乎夫以無為宗出于莊老韓蘇明主之朱子闇惑之而詆孟子反聖言異哉自漢後䕶經衛道者不多人至宋儒儼以明道自居乃皆以異端之道為道是世道人心之不幸也於諸儒乎何尤仁者見之謂之仁知者見之謂之知百姓日用而不知故君子之道鮮矣是道也即陽可以見隂即隂可以見陽也故得陽道盛而為仁者則見仁之妙以仁能統性道也得隂道盛而為知者則見知之妙以知能運性道也若夫百姓日用夫道而不能知君子之道不亦鮮乎不知故不見也顯諸仁藏諸用鼓萬物而不與聖人同憂盛徳大業至矣哉富有之謂大業日新之謂盛徳生生之謂易成象之謂乾效法之謂坤極數知來之謂占通變之謂事隂陽不測之謂神是則隂陽之道大徳曰生其仁也而行生昭著則顯諸仁化育流行其用也而於穆敦化則藏諸用為顯為藏鼓鑄萬物而不假聖人與民同患之憂徳則盛業則大至矣哉何以謂之大業也天髙地下萬物散殊其富有乎何以謂之盛徳也至誠无息日新又新則日新乎故隂陽相嬗生生不窮是之謂易健而作始以成象是之謂乾順而效法以代終是之謂坤推極蓍策之數逆知將來之事孔䟽是之謂占窮則變變則通萬事乃生是之謂事如是而隂謂隂道隂即含陽不得測之曰隂陽謂陽道陽即含隂不得測之曰陽變化之極妙乎萬物是之謂神夫易廣矣大矣以言乎逺則不禦以言乎邇則靜而正以言乎天地之間則備矣夫乾其靜也專其動也直是以大生焉夫坤其靜也翕其動也闢是以廣生焉廣大配天地變通配四時隂陽之義配日月易簡之善配至徳然則易之道廣无不周矣大无不具矣以言逺則莫可遏止以言乎近則安靜而正以言乎天地之間則无一不有何廣大也夫易乾坤而已靜而專一動而直遂乾竒如是是以大生靜而翕輯動而開闢坤偶如是是以廣生然則易之廣大直與天地配矣且陽變通隂隂變通陽配乎四時陽之義配日隂之義配月易簡之善配乎聖人至徳而廣大至矣子曰易其至矣乎夫易聖人所以崇徳而廣業也知崇禮卑崇效天卑法地按繫辭傳皆子言而時間以子曰者或賛嘆或更端或别文周之辭也聖人存性之道舎易其何以哉聖人以乾之知大始為知是效天也效天而天崇聖人之聰明睿知足以有臨而知亦崇智者聖人髙明之徳也曷其崇以坤之作成物為禮是法地也法地而地卑聖人之三千三百恭敬退讓而禮亦卑禮者聖人經緯之業也曷其廣而皆以易則易其至矣乎後儒遲鈍不解世事猥以讀書窮理自文非易之崇徳也禮樂不修而托于記誦著述非易之廣業也天地設位而易行乎其中矣成性存存道義之門是則天設位于上地設位于下而一隂一陽生生之易行乎其中人得之而為知禮所謂成之者性也君子于此存之又存不顯亦臨無射亦保純誠无息致中致和一如生生之易焉天下之理皆從此出非道義之門乎故曰易其至矣聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其㑹通以行其典禮繫辭焉以斷其吉凶是故謂之爻言天下之至賾而不可惡也言天下之至動而不可亂也擬之而後言議之而後動擬議以成其變化然則文周繫辭之故可明而學易者宜慎其言行也賾蘇傳曰喧錯也亦作嘖文周見天地萬物之紛賾而擬其形容象其物宜謂之象即大象小象也乃就其中見人事之變動而觀其若何㑹聚若何通達以行典常之禮因繫辭焉斷其爻變之吉凶謂之爻爻交也即變也夫繫辭者言也言極天下之賾如先甲後甲初吉終亂而皆物情所有无一可惡也言極天下之動如龍躍鶴鳴解拇射隼而皆典禮所行无一可亂也惟不可惡不可亂也故學易者言也必以象爻擬之而後出動也必以象爻議之而後行擬議之久則始也勉摹繼成適肖變化者在易而即在我矣下七爻則擬議之事易之大小進退徃来禮之象也禮之相交相對相錯相綜易之實也故韓宣子適魯見易象春秋曰周禮盡在魯也陋者謂禮失迂失固豈知至動至變觀其㑹通乃以行典禮哉鳴鶴在隂其子和之我有好爵吾與爾靡之子曰君子居其室出其言善則千里之外應之况其邇者乎居其室出其言不善則千里之外違之况其邇者乎言出乎身加乎民行發乎邇見乎逺言行君子之樞機樞機之發榮辱之主也言行君子之所以動天地也可不慎乎君子之言行出身耳發邇耳然樞轉則户運機發則矢疾千里之外應違以之榮辱至焉是鶴鳴子和之象也且不惟此天地所以動矣好爵可虚靡哉君子之慎于擬議者職是故也同人先號咷而後笑子曰君子之道或出或處或黙或語二人同心其利斷金同心之言其臭如蘭其次當擬議者則在交游夫友與我出處語黙不必一致所謂先號咷也然而心同則笑矣其快利也雖金可斷而何徃能禦其言也馨香如蘭有味可挹哉初六藉用白茅无咎子曰苟錯諸地而可矣藉之用茅何咎之有慎之至也夫茅之為物薄而用可重也慎斯術也以徃其无所失矣其次當擬議者則在承藉夫以下藉上其用重矣不慎能无咎乎用白茅之柔潔以藉之則无失矣勞謙君子有終吉子曰勞而不伐有功而不徳厚之至也語以其功下人者也徳言盛禮言恭謙也者致恭以存其位者也其次當擬議者則在居功謙之九三功勞何如者不惟不驕且益加貶損是以功下人者也厚之至也厚則内有徳而外有禮矣且徳盛而禮恭矣天位永終宜哉語云徳厚者無盈色徳薄者无卑辭亢龍有悔子曰貴而无位髙而无民賢人在下位而无輔是以動而有悔也其次當擬議者則在處亢亢非僅人事也天時所積氣運所遷亦有不得辭者在神龍之善變以斡旋之不出户庭无咎子曰亂之生也則言語以為階君不密則失臣臣不密則失身幾事不密則害成是以君子慎密而不出也子曰作易者其知盜乎易曰負且乘致寇至負也者小人之事也乘也者君子之器也小人而乘君子之器盜思奪之矣上慢下暴盜思伐之矣慢藏誨盜冶容誨淫易曰負且乘致寇至盜之招也然言行之道雖多而言莫患于不密行莫患于妄乘髙位故又引節之初九解之六三以戒之總見當擬議而後言動也上慢下暴謂上無禮下无學也盜必招而後至故曰作易者知盜慎則不招矣大衍之數五十其用四十有九分而為二以象兩掛一以象三揲之以四以象四時歸奇于扐以象閏五歲再閏故再扐而後掛按禮國君有守龜家不藏龜盖龜國君以上始可藏而蓍筮則通士庶故易傳專言大衍夫如是可以占矣布蓍策而大推衍之即洪範衍忒也其數共五十而用以筮則置一策不用祗用四十九策鄭康成曰五十全數不可以為七八九六之用故減其一郭子和曰世俗皆知一五兩四謂之三少一九兩八謂之三多以定卦象然不必四十九數以四十五四十一皆初揲非五則九再揲三揲非四則八且不獨此自三十以上三十三三十七五十三五十七六十一六十五六十九七十三七十七八十一八十五八十九九十三九十七皆可得五九四八多少之象與四十九數為母者无以異獨不可得三十六二十四二十八三十二之策數故蓍數四十九不易之道也于是將四十九策分之左右以象天地兩儀又任取兩中一策掛于指間以象人道共兩儀為三才乃以四數揲仲氏易曰揲連撥也左策其所餘或一或二或三或四又四數揲右策其所餘同扐餘也如王制祭用數之仂也是揲之以四以象四時乃歸掛之一奇于兩扐而合之虞氏說是歸奇于扐以象閏閏亦餘也通掛一之策不五則九合為一變謂之成易掛一節揲一節扐一節又揲一節又扐一節共五節猶五歲然朱子說再扐則猶五歲之再閏也仲氏易曰前三歳一閏尚餘六日以加一月止三十日而三歲所餘有三十六日也故兩歲二十四日合前六日又加一月再閏故必再扐然後取四十四策或四十策復掛為二變掛扐之策不四則八取四十策或三十六策或三十二策復掛為三變亦不四則八言掛則分與揲扐統之矣五四以一四為奇九八以二四為偶三變皆奇則十三策其揲策三十六四數之凡九故名九而為老陽三變皆偶則二十五策其揲策二十四四數之凡六故名六而為老隂二偶一奇則二十一策其揲策二十八四數之凡七故名七而為少陽二奇一偶則十七策其揲策三十二四數之凡八故名八而為少隂是為一爻老變而少不變盖以象言老陽乾老隂坤少陽震坎艮少隂巽離兌父母變子不變也以數言商易占不動爻以七八周易占動爻以九六則九六七八筮之數也盖奇數起于一三成于九七耦數起于二四成于八六陽主上進七可進故曰少陽九无可進故曰老陽退變而為八隂主下退八可退故曰少隂六无可退故曰老隂進變而為七由是復合四十九策如前揲之至九變而成内卦十有八變而六爻備外卦亦成焉趙汝楳易雅變釋篇曰揲蓍三變之餘為九者十二為七者二十為六者四為八者二十八多寡不同而𩔖之為隂陽各三十二總之為六十四正與卦數等筮宗曰其均也一隂一陽之謂道其不等也物相雜故曰文又曰蓍變而有之卦者宜畫兩卦一為本卦一為之卦如陳侯筮得觀之否史曰坤土也巽風也乾天也風為天于土上山也有山之材而照之以天光于是乎居土上必先畫本卦有巽坤乃有風有土之象次畫之卦自巽坤變乾坤有風為天于土上之象有天光之象互體二三四為艮有山之象三四五為巽有山材之象若交重單拆本義筮儀老陽畫口曰重老隂畫又曰交少陽畫一曰單少隂畫一曰拆易小帖曰朱氏筮儀采之焦氏易林揲法而不著所自宋人著書多𩔖此使人莫辨其為聖傳為他說為巳見是謾飾也三代未聞或謂出于鬼谷子今火珠諸家多用之然火珠林擲錢代蓍用一卦定吉凶畫交重以紀變其定爻以世應其玩占以納甲五行六獸變包犧之畫棄周公之辭屏說卦之象黜四象之名故不必畫兩卦今揲蓍用之如畫一卦則外卦无巽无乾互體无艮无巽何以象之為風為天為山為木乎愚按國語左傳所載周時筮法得專卦者彖爻並推得變卦者貞悔俱占且隨其事而取義玩辭觀象不拘一法故能前民利用至于如神若易學啟蒙專看卦辭則文周未繫辭前將何以占且爻變尚祗看本爻辭明與周秦晉唐古人揲蓍遺法相左何能前民利用耶學者取左傳國語及晉郭璞等所占遺法𩔖觀之自明天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也夫大衍之數所以象兩象三象四時象閏者以其原為天地之數也天數有五一三五七九也地數有五二四六八十也而一三五七九同為竒二四六八十同為偶是五位相得乃由天數一三五七九合之為二十有五地數二四六八十合之為三十則天地之數各有所合共五十有五夫天地之數以五為率故五帝五方五常五品五行五音五色五味皆以五十其五為五十則數終矣如君子小人之澤以五世王者之興以五百年言極數不是過也而合天地之數實五十又五又有通春秋十有幾年皆解作又所謂終則有始天行也而筮用成數猶隂陽用老象以終則變也故釋去又五而用五十卜筮之成變化而行鬼神以此也五數小衍也五十之數大衍也邵康節朱漢上說故曰大衍大衍之數本于天地之數故上言大衍五十而下緊接以天數五地數五五十有五以釋之將天一地二反置後文復起詰端呼應變化一氣相承宋人不知妄為移易且有謂大衍非文王事者毋乃侮聖言歟乾之策二百一十有六坤之策百四十有四凡三百有六十當期之日二篇之策萬有一千五百二十當萬物之數也乾為老陽一爻三十六策六爻二百一十六策坤為老隂一爻二十四策六爻百四十四策共三百有六十可以當一年之日上下二篇六十四卦凡陽爻百九十二得六千九百一十二策隂爻百九十二得四千六百八策共萬有一千五百二十策可當萬物之數時行物生天地也大衍之數本天地故皆與之合焉按少陽七一爻四七二十八六爻得一百六十八少隂八一爻四八三十二六爻得一百九十二合之得三百六十策六十四卦陽爻一百九十二每爻二十八得五千三百七十六策隂爻一百九十二每爻三十二得六千一百四十四策合為萬一千五百二十是少陽少隂之策亦當期與萬物之數而乃但言乾坤可見三百八十四爻皆係老陽老隂所謂用九用六者此也所謂爻言乎變者此也而愚謂凡卦之陽爻自乾隂爻自坤亦從可決矣是故四營而成易十有八變而成卦八卦而小成引而伸之觸𩔖而長之天下之能事畢矣顯道神徳行是故可與酬酢可與祐神矣以是本于天地之故四營而成一爻之易十有八變而成六畫之卦孔頴達曰卦之為言掛也掛萬象于上也則内卦三畫為八卦而卦已小成引而伸之為六畫卦凡六十有四觸𩔖而長之剛柔相推為四千九十六卦三畫伸至六畫故曰引伸相觸而變故曰觸𩔖而長天下之能事備矣則道之弗彰者得筮而顯徳行之疑滯者得筮而神于以應酬天下之事佑助神化之功何不可者營謀為也四營即揲之以四也見來註舊以分二掛一揲四歸扐為四營則其筮儀揲扐兩節有三營四營之半等語牽强不妥易即變也四揲則成一變也聖人解易字如此此節言大衍蓍數因于天地驗于酬酢詞㫖甚眀宋人必曲引五十五位相得有合諸言以附㑹其所妄造河圖是屈經以濟已說也子曰知變化之道者其知神之所為乎易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占知大衍乾坤變化之道則可以通神故知神之所為夫知神則神矣故正辭應變垂象定占四者聖人之道而易皆有之以言以動以制器以卜筮者能弗尚之哉是以君子將有為也將有行也問焉而以言其受命也如嚮虞本作響无有逺近幽深遂知來物非天下之至精其孰能與于此嚮響通有為有行即動制器也問焉而以言卜筮也蓍受人命如響應聲不論逺近幽深遂知來問之物而告之則辭與占俱見盖至精至變至神統上四者言參伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象非天下之至變其孰能與于此筮法每爻有五節三變是參伍以變也三變而遇三少三多一少兩多一多兩少以得四九四六四七四八之數既奇偶相錯以分計之復多少相綜以合理之是錯綜其數也由是通六爻之變遂成天地隂陽剛柔相雜之文極九六七八之數遂成六十四卦内外之象以定天下之象非天下之至變者能之乎項平庵說易无思也无為也寂然不動感而遂通天下之故非天下之至神其孰能與於此无思无為即寂然不動感感以卜筮也孔疏曰故事故也夫易聖人之所以極深而硏幾也惟深也故能通天下之志惟幾也故能成天下之務惟神也故不疾而速不行而至子曰易有聖人之道四焉者此之謂也然則易也者聖人以之推極其深使天下之志无不含于其中故一叩而即通研辨其幾凡天下之務微萌畢照故隨幾而能成而總之神矣寂然不動不疾不行感而遂通已速已至此辭變象占之道所以俱備也天一地二天三地四天五地六天七地八天九地十此實指天地之數以起下詰應之端而覆明大衍也按鄭康成註曰天一生水于北地二生火于南天三生木于東地四生金于西天五生土于中陽无耦隂无配未相成也地六成水于北與天一并天七成火于南與地二并地八成木于東與天三并天九成金于西與地四并地十成土于中與天五并然其說不始康成揚雄太𤣥以三八為木四九為金二七為火一六為水五五為土呂不韋月令曰木數八火數七土數五金數九水數六盖自戰國末即有其說矣而實與易道刺謬不然繫辭曰乾大生坤廣生皆生也而成在其中觀坤曰資生即曰成物可見也不則乾知大始坤作成物或可曰天生而地成今乃天地各分生成各有生成是何說乎且天三生而二成地三成而二生何以言之水木土何以當生于天而成于地火金何以當生于地而成于天金木皆地生若曰木天生者得天氣也則何物不需天氣者取火于日空中有火火不實生于天乎土之生似當先于金木而反居五夫五行之配一二三四五何居或謂洪範一曰水二曰火三曰木四曰金五曰土因據之為相生之數則洪範枚舉不容无序非為生成也不然五事一曰貌二曰言三曰視四曰聽五曰思豈亦先生貌後生言以及視聴思乎夫土即地也豈有地猶無土待生水火木金後而天乃生之乎地之成土即以地成地乎况六七八九十之數復何自焉後人以此裝河洛圖太極為生人生物之源則所繫重矣乃聖經祗有五十五數以為大衍之本而並不及五行生成一語豈經㫖尚有紕漏耶其為曲學穿鑿附㑹灼无疑也故五徳相禪之妄髙氏拱本語明辨之矣五行生成之說非易道郭氏雍亦言之矣且五行配八卦鄭註无此係後人偽河圖見後加以生剋更為誣經毛河右易小帖云以卦義言離為火坎為水巽為木矣然震為雷不為木艮為山不為土兌為澤不為金革彖曰水火相熄則兌澤屬水即乾之為金不過與為玉並言非專屬金也乾為金為冰為大赤為木果則金木水火皆備矣以卦位言則震木兌金離火坎水似矣然而坤不是火艮不是水有四正而无四維即曰坤艮屬土正合五行然何以水火各一卦而金木與土則各有複卦且何以中央之土反无卦位也以卦數言則天一為坎地二為離天三為震地四為兌而乾巽艮坤則又以六七八九就天地而分屬之似矣然而土為五十反為卦數所不取夫參同契云三五至精五行之數全在正五今卦有合五而无正五如金水為一五木火為一五皆可兩合而土之正五卦何以反不及也至宋人太極圖專論五行且欲以五行生八卦更無理矣王崑繩曰五行生剋始于鄒衍而成于漢劉向班固然五行志等書皆牽扭可笑江河井泉金之流也其然乎世亦取火于金石獨木也哉水木火土則謂草木悉漂萍盲者笑其妄以為未有土先有火不知虚空何物可灰為大塊也剋木者金而火未嘗不剋木也吾見剋土者金木之剋不若金之利也火水交相剋者也土剋水水亦剋土也總之天地無不生無不剋萬物消長乎隂陽也若五行生剋謬矣哉錢煌曰卦論生殺則乾父剋震子震子剋坤母兌離巽三女艮坎震三男皆相剋此大亂人倫之道也而可哉胡朏明易圖明辨曰經言天地之數所以為大衍也註者篡以五行生成則與大衍何與何也蓍无五行无方位无生成也今試就筮法按之自四營成易以至十有八變而成卦孰為天生而地成地生而天成耶孰居東而為木居西而為金耶如今人河圖洛書圓者方者單者複者皆安在耶塨按金木水火土始見于大禹謨然與穀稱六府不稱五行甘誓始言五行而不詳其目至洪範乃有五行物數然水曰潤下火曰炎上木曰曲直金曰從革土爰稼穡是指流行人間最大而適用者有此五物猶禹謨言財貨藏于是而謂之府也故周禮考工記又名曰五材春秋傳亦曰天生五材民並用之非謂五行握自帝天而能生萬物也宋人太極圖乃謂五氣順布化生人物則金木何許較之人微且頑矣乃能生人焉有是理若謂四時配五行天有五緯星氣實生人則地有一物天有一星如少微四輔𩔖非星氣能生人也王良傅說以人得名能生人耶王崑繩曰五星古名嵗填熒惑太白辰配以五行者漢人也四時配五行亦後儒約象物之說月令春盛徳在木乃言春之盛徳種之于木非言木有盛徳而生春之物也夏秋冬之于火金水亦然且此聖經所未冇也按說卦方位夏火冬水似之而春木秋金則无其象至以天地生成配易卦謂天一生水為坎一地二生火為離二天三生木為震三地四生金為兌四因以地六成水并列西北為乾六天七成火并列東南為巽七地八成木并列東北為艮八天九成金并列西南為坤九則乾為天為老陽乃為地成乃得老隂六數坤為地為老隂乃為天成乃得老陽九數何其傎乎聖經乾天稱父坤地稱母以生萬物而震雷巽風坎水離火艮山兌澤六子動之撓之燥之潤之說之終始之隂陽化育之道盡矣今術數家但知宗後人五行生物不知大易此其所以為小道也五經語孟言道已盡出此者即可擲之汪季青曰謂五行為天地也不可謂五行即六子也則六子无金謂五行後于六子乎六子已有水火矣謂五行先于六子乎是六子不當稱六子而稱六孫矣其言渉戲然亦明且著者五行之物散見于易或以五行生成講易難通遂謂易无五行又非也但五行者言巳成之五材也五材不可言生剋而有畏愛如白术防風為使愛也木香見火无功畏也世誤以畏為剋愛為生耳子曰夫易何為者也夫易開物成務冒天下之道如斯而已者也是故聖人以通天下之志以定天下之業以斷天下之疑夫四營之易何為取天地之數也盧氏說盖以筮開𤼵萬物成就務事覆冒天下之道不過如天地之數而已筮法有一除一不用二分而為二三挂一象三四揲之以四而成卦有九六七八總用大衍之數五十无出天地之數之外者也蘇傳亦如斯指天一地二十者然割天一節于大衍以前此處文法尚可通哉漢律厯志及衛元嵩元包運蓍篇引天一十句與天數五一段接然不可以引述文改經文也是故蓍之徳圓而神卦之徳方以知六爻之義易以貢聖人以此洗心退藏于密吉凶與民同患神以知來知以藏徃其孰能與于此哉古之聰明睿知神武而不殺者夫蓍之數奇七七四十九象陽圓卦之數偶八八六十四象隂方崔憬說盖圓數奇故圓則徑一而圍三有奇方數偶故方則徑一而圍四蓍徳則一二三四四八五九七八九六迭出互見以推未來是圓而神也卦徳則奇為陽偶為隂各有定形以知物𩔖是方以知也六爻則每爻有義變易以陳于人是易以貢也聖人以此蓍卦之徳爻之義淨洗其心如江漢之濯退藏于宻淵淵靜深凡民之吉凶皆一體相關與之營慮患即慮也至誠如神可以前知清明在躬包羅萬古非聰無不聞明无不見睿无不入知无不通神武震世不假刑殺之聖孰能與于此哉是以明于天之道而察于民之故是興神物以前民用聖人以此齋戒以神明其徳夫史記曰龜千歲而遊于蓮葉之上蓍生滿百莖者下必有神龜守之上常有青雲覆之是神物也聖人興為卜筮以引導民用其心本齋戒也其徳本神明也而至筮時更加齋戒預燭未来靈明變化是以此神物齋戒以神明其徳也是故闔户謂之坤闢户謂之乾一闔一闢謂之變徃来不窮謂之通見乃謂之象形乃謂之器制而用之謂之法利用出入民咸用之謂之神故卜筮總于乾坤而極于民用乾坤為易之門户而坤隂收斂則闔户謂之坤乾陽發生則闢户謂之乾一闔一闢相交相易謂之變乾坤徃上卦為徃来下卦為来上下不窮謂之通衍而見卦爻之象謂之象因象成物如衣裳書契等謂之器制器以使民用禮樂刑政謂之法利用出入民咸用之如穀而酒飲麻而布衣車行如龍舟渡如飛妙用入神謂之神是故易有太極是生兩儀兩儀生四象四象生八卦八卦定吉凶吉凶生大業如是而大衍可申明矣易變也然必有不變者而變者以生崔憬曰五十有一不用太極也不變者也說文極中也屋極謂之中梁上脊檁有太極之一乃可用四十九策分而為二有竒有偶也是有太極乃生兩儀儀匹也一隂一陽相匹也天地兩儀也故曰分而為二以象兩無太極則五十策兩分之或皆竒或皆偶无竒耦兩儀也何以象兩兩儀生乃可挂一而四揲之以得七八九六之四象是兩儀生四象也七為少陽象春八為少隂象秋九為老陽象夏六為老隂象冬故曰揲之以四以象四時歸奇于扐以象閏若不分兩儀則合四十九策揲之祗餘一而隂陽老少之四象无由見矣何以象四時四象生則九變而成内卦十有八變而成外卦是四象生八卦也八卦則六十四卦具矣有八卦而吉凶可定趨吉避凶而大業以生矣易圖明辨曰此段兩言四象朱子以此四象為聖人畫卦之次第以後四象為揲蓍所得隂陽老少之爻夫均此四象文相連不遠豈容有二解哉前後皆言筮占太極節為覆明大衍无疑也按朱子宗道士陳搏先天圖以此節為聖人作卦次第其易學啓䝉圖先一圈為太極而上加一竒一偶兩畫為太極生兩儀一竒一偶之上又各加一竒一偶曰太陽少隂少陽太隂為兩儀生四象四象各二畫上又各加一奇一偶而乾一兌二離三震四巽五坎六艮七坤八出焉為四象生八卦以上又各加一竒一偶為四畫卦十六又各加一竒一偶為五畫卦三十二又各加一竒一偶為六畫卦而自乾至復三十二卦姤至坤三十二卦共六十四卦出焉邵子加一倍法即此其上更有七畫八畫无窮畫卦有言无圖本義載此圖又不作畫但以黒為隂白為陽累而上黑白相間六層乃以震四離三兌二乾一圓轉于左為數往者順巽五坎六艮七坤八圓轉于右為知來者逆為伏羲先天八卦圖以上二圖具後又以六十四卦横圖截為兩節北起復由東離盡卯中而南至乾盡午中亦為數往者順南接姤由西坎盡酉中而北至坤盡子中亦為知來者逆為伏羲六十四卦圓圖又以横圖斷為八節東自復而西至无妄八卦為一層下東自明夷而西同人八卦為一層又下東自臨而西履八卦為一層又下東自泰而西乾八卦為一層乃上西自姤而東至升八卦為一層又上西自訟而東師八卦為一層又上西自遯而東謙八卦為一層又上西自否而東坤八卦為一層乾始西北坤盡東南為伏羲六十四卦方圖而圓圖又分卦氣自復一陽生冬至十一月半盡震離之十六卦然後得臨春分二月半又盡兌之八卦然後得泰立夏四月初又隔四卦得大壯又隔一卦至夬皆為芒種五月初卦氣難通如此遂接乾姤為夏至五月半自此又盡巽坎之十六卦然後得遯秋分八月半又盡艮之八卦然後得否立冬十月初又隔四卦得觀又隔一卦得剝皆為大雪十一月初遂接坤復為冬至以上皆先天圖本義載于經首曰此非某說乃康節說乃希夷說非希夷說乃孔子之說但儒者失其傳而方外之流隂相付受以為丹竈之術至希夷康節始反于易而說始明嗚呼朱子曽不思陳搏為真方外之流耶孔子之說曽一一細勘否而遂誣指耶孔子曰庖犧始作八卦是易自作卦起未嘗聞始作太極也且作卦竒偶畫也太極圓圈非畫矣非孔子之說一孔子曰兩儀生四象崔憬以九六七八老陽老隂少陽少隂為四象然即揲圖中蓍策之事在畫卦因卦後非未作八卦而先有四象也何者老變而少不變並從已成之卦而推故仲氏易曰乾為老陽非老陽而後乾也坤為老隂非老隂而後坤也非孔子之說二孔子曰成象之謂乾則先畫乾效法之謂坤則次畫坤皆三畫卦以象三才未聞有一畫兩畫止而謂之陽儀隂儀太陽少隂少陽太隂者非孔子之說三孔子曰震一索而得男則又次畫震巽一索而得女又次畫巽坎再索而得男又次畫坎離再索而得女又次畫離艮三索而得男又次畫艮兌三索而得女又次畫兌而八卦畢是為作卦之序從未聞其序為乾一兌二離三震四巽五坎六艮七坤八也仲氏易曰乾父坤母合生六子今何以父子母女並生且六子俱先母生少女先中女中女先長女生世有此事乎于一索再索之義盡失矣非孔子之說四孔子曰八卦成列因而重之是畫八卦後不更作卦祗因一卦而重以八卦故但曰作八卦不言作六十四卦也如乾重乾為乾乾重坤為泰乾重震為大壯乾重巽為小畜乾重坎為需乾重離為大有乾重艮為大畜乾重兌為夬以下七卦皆然而六十四卦畢今連翻累畫豈因重哉非孔子之說五八卦六十四卦聖經有名今忽有四畫五畫卦何以聖人不為之名也且于三才何取焉非孔子之說六爻辭以一畫為初不稱一明无前于此者矣以六畫為上不稱六明无後于此者矣故說卦曰兼三才而兩之易六畫而成卦今以為六畫後尚有七畫八畫无窮畫卦明背聖言且果如此則六十四卦之理未盡也非孔子之說七孔子曰震東方巽東南離南方致役乎坤說言乎兌乾西北坎正北艮東北此八卦方位即言伏羲之八卦也今强坐之曰此文王後天八卦而撰乾南坤北離東坎西兌東南震東北巽西南艮西北為伏羲先天八卦以經文天地定位山澤通氣雷風相薄水火不相射附㑹之然此論八卦相錯之象並无南北方隅一字而可强以已意誣經乎參同契云乾坤者易之門户衆卦之父母坎離匡郭運轂正軸牝牡四卦以為槖籥朱子註云乾坤為爐鼎位乎上下坎離升降于其間如車軸之轉轂以運輪一上而一下也牝牡謂配合之四卦震艮巽兌也槖鞴囊籥其管也熊與可曰先後天圖參同契皆具後天坎離居先天乾坤之位以坎中陽實離中隂虚則仍為乾坤故丹家謂之還元是不惟先天方位為異端之學即後天圖依傍說卦方位而亦借為修煉用與聖經若風馬牛朱子註參同契恐人譏議自詭其名曰空同道士鄒訢鄒即邾訢即熹也著啓䝉又署名曰雲臺真逸是朱子明知其為道士之說明自附于道士而乃以亂聖經指為孔子說耶其非八也說卦言萬物出震齊巽見離養坤說兌戰乾歸坎成終成始于艮雖祗有兌正秋一語而春夏冬俱見矣此聖言无可易者今先天卦氣何其舛也或問朱子卦氣陽生隂生始何疎而終何宻臨二陽生為冬十二月卦乃在春分二月半泰三陽正月卦乃在立夏四月初推之一槩乖反朱子亦不能答曰未得其說容更思之又曰伏羲易自是伏羲說話文王易自是文王說話不可交互求合嗚呼是何言也羲文有二易耶四時運行萬古不易焉有伏羲配以此卦而文王又配以彼卦者且十二月辟卦為漢儒說尚非聖言若兌正秋諸語則孔子之言羲文易象者矣兌正秋也而今為春辰月矣乾秋冬之間也而今為夏午月矣艮終乎物而始乎物冬春之間也今為秋戌月矣八卦皆顛四時皆亂乃誣曰此孔子之說其非九也胡朏明曰先天圖以自震至乾為順數已生之卦自巽至坤為逆推未生之卦然則經曰易逆數也豈專用巽坎艮坤而不用乾兌離震乎丹家講順逆曰順則成人逆則成仙即抽坎填離也與易何與而牽之汚穢聖言耶其非十也至本義圖但以黑白分隂陽更可怪異豈伏羲畫卦時左執黑筆右執粉筆耶抑六十四卦俱无畫黑白之中遂分初二三四五上耶且白畫之陽固竒而黒畫之隂亦竒耶何强作事至是此等圖悖易害易而録之者欲人明其説然後知其妄也餘圖辯中已詳不具陳摶又有太極圖傳之周濓溪見朱震進易說表胡五峰通書序然程子兄弟親學于周與邵堯夫為友而不及太極先天一言朱子乃又表章太極圖以為學宗其說無極而太極太極動而生陽靜而生隂陽變隂合而生水火木金土二五之精妙合而凝乾道成男坤道成女化生萬物亦附㑹于太極生兩儀之文圖見後當時陸子靜張南軒林黃中皆不以為然毛河右著太極圖說遺議以辯之略曰太極圖二氏學也其圖竊取魏伯陽參同契中水火匡廓三五至精二圖彭曉舊本載之而合為一圖水火匡廓者以參同契首有水火匡廓運轂正軸二語作坎離二卦而運為一軸非兩儀也兩儀烏得有三輪哉亦非陽動生隂隂靜生陽也左為離白黑白即也右為坎黑白黑即也其中一圈則坎離之胎也三五至精圖則取五行逆克章三五與一天地至精語分五行為三五中央土一五也天五生土也左火與木共一五也地二生火天三生木也右水與金共一五也天一生水地四生金也金盛為水木盛為火而土合之即嬰兒姹女黄婆之說歸于一元則下一圈者三五之合非二五之合三五之精非二五之精丹家水火必還一元故其後復有含元播精三五歸一之語在隋唐間有道士作真元品已載之為太極先天圖即陳摶之所自始盖參同本以乾坤水火為抽填之祕而坎離横陳乾坤直列摶之所謂以乾南坤北離左坎右為先天者而匡廓運轂則以坎離為車軸之貫輪轉上下乾之南者有時而北坤之北者有時而南六十四卦方圖乾北坤南即此意而究其要訣則必如鼎器歌云隂在上陽下奔者朱子註云此是要法故其文有云上徳无為不可察求言隂在上主靜也宋儒主靜之學本此下徳為之其用不休言陽在下主動也宋紹興間朱震進周子太極圖于髙宗猶是上一圈為隂靜三輪下一圈為陽動見朱氏易卦圗上卷如真元品圖在朱子前而朱子為註則另加修飾如今性理大全所載以為可以掩人可以无弊而不知異端聖道非可飾合亦何為哉至于无極明出釋老不惟陸象山累書攻辯張橫渠與濓溪同時即曰今儒釋老莊混然一途以有生于無多見其詖淫矣又略曰易言動靜有常即指隂陽也未聞未生隂陽而先有動靜者也乾靜專動直坤靜翕動闢則隂陽俱有動靜陽不必專動隂不必專靜也五行非四象也且所謂生八卦者安在乎胡朏明曰宋史周子傳本曰自無極而為太極朱子力辨删自為二字元人修史如之不知自无極而為太極老氏無生有之說也無極而太極則空即是色為沙門衣鉢矣庸以愈歟毛先生所言真元品圖聞之吾友王草堂而未見也塨後在燕邸查道藏見之并録後圖左文亦附㑹繫辭傳易有太極一段有有物混成先天地生寂兮寥兮可以為天下母諸語是故法象莫大乎天地變通莫大乎四時縣象著明莫大乎日月崇髙莫大乎富貴備物致用立成器以為天下利莫大乎聖人探賾索𨼆鉤深致逺以定天下之吉凶成天下之亹亹者莫大乎蓍龜列陳天地間之最大者而終以蓍龜見卜筮之不可輕也亹亹者勉勉于事也是故天生神物聖人則之天地變化聖人效之天垂象見吉凶聖人象之河出圖洛出書聖人則之龜背有文以象卦蓍生百莖以衍數寒暑山川之變化日月星辰之休徴河圖洛書靈異開先皆聖人作易之因也易圖明辨曰書契興于黃帝之世伏羲時未有書名洛所出安得稱書盖聖人統伏羲文周而言觀下四象與繫辭並舉可見按洛書易傳外不再見而書顧命有天球河圖在東序之文萬季野曰周本紀犬戎殺幽王驪山下盡取周賂而去賂者珍寶貨財也河圖必亡于此時故王子朝之亂挟以出者周之寶珪典籍而巳寶珪典瑞所掌典籍太史掌之並非大寶器顧命所陳諸珍器平桓下无一復見傳記是圖書之亡久矣故自漢迄唐或言羲出河圖禹出洛書或言圖書並出羲時或言圖書為篇册或言圖即八卦書即九疇然並无言親見河圖洛書者與見圖書為一圈㸃之物者宋道士陳摶忽出河圖洛書劉牧傳之以四十五㸃為河圖五十五㸃為洛書阮逸又反之以五十五㸃為圖四十五㸃為書而朱子宗焉五十五㸃者一六複于北二七複于南三八複于東四九複于西五居中十複于上下按康成註天一地六并于北則一六當并列今複置亦誤也東西南皆如之四十五㸃者戴九履一左三右七二四為肩六八為足中有五无十皆竒白偶黑圖附後毛河右著原舛編以辯之略曰宋人圖書之偽有確証焉宋濓王禕輩雖非之而未考也陳摶之河圖非即鄭康成大衍註天一生水于北一段文乎然斷不得為河圗也何者康成河出圖洛出書註云河圖有九篇洛書有六篇若河圖即天地生成之數則康成自註何不直指曰河圖即前生成一二之數是也乃毫不及而别指為篇冊其无與也明矣洛書亦然乃易緯乾鑿度太乙下九宫法也乾鑿度下篇有以一隂一陽合為十五之說六八為隂七九為陽七八十五九六亦十五遂有太乙下九宫法取隂陽卦數即十五數以行九宫八卦四正四維合中央為九宫而數皆十五其法曰太乙者北辰之神名也居其所曰太乙此用論語知非古聖之書殆漢世道家所作嘗行于八卦日辰之間曰天乙每四乃還北南東西為四于中央中央者北辰之所居也以中无卦位故以此為太乙寓居之所天數以陽出以隂入陽起于子隂起于午是以太乙下九宫從坎宫始坎中男始之言无偏也坎北自此而從于坤宫坤南偽河圖以天地生成配易卦位乾坎艮震巽離坤兌起于西北而迄于正西九宫則以乾坎艮震四卦起于西北而迄于正東至巽離坤兌又另從正西起而迄于東南故正南非離而為坤蔡沈作洪範皇極不知此妄以天地生成所配卦位硬加之則東南仍巽七非兌何以四南仍離二非坤何以九西南仍坤九非離何以二西仍兌四非巽何以七卦數不合宫數一徃貿貿而今術數家又貿因之也坤母也又自此而從震宫震東震長男也又自此而從巽宫巽西巽長女所行半矣所謂每四乃還者也遂息于中央之宫既又自此而從乾宫乾西北乾父也又自此而從兌宫兌東南兌少女也又自此而從艮宫艮東北艮少男也又自此而從離宫離西南離中女也行則周矣乃上㳺息于太乙天乙之庭而升于紫宫太乙不常居卦位之中故五則暫息于中央至是則不息而上升矣行從坎始去從離終皆坎離水火之學道家之書也而其法則合于隂陽十五之數坎北數一為履一坤南數九為戴九震東數三為左三巽西數七為右七離二西南兌四東南則二為右肩四為左肩乾六西北艮八東北則六為右足八為左足中央數五為太乙之數而太乙四周不復再息中央而上升則太乙之數遂止于五數而无十數焉從橫交互皆得十五其說如此而未嘗曰此洛書假曰洛書則緯書具在其于九宫篇後又曰孔子曰洛書摘六辟日以建紀辟者君主也謂摘主十二月之卦以立歲紀止言六者陽該隂也何也夫康成之註衍數而别釋河圖與易緯之言宫法而别引洛書二者正相符矣胡朏明曰自陳傳妄傳河洛太極諸圖後之為圖者䕫魖罔象變相迭出以亂聖經真易道之阨㑹也塨按朱子曰易本是象可為特見但自王弼掃象而後程傳專言理朱子不甚滿之而象數无傳適當時儒宗周邵皆出於道士陳摶僧壽涯輩有附易妄圖遂引置易首而不知陷于異端是朱子之不幸也後人无考見本義首載此反若羲文之易皆從此河洛先天諸圖而起者一誤盡誤禍斯烈矣觀大傳天生神物與仰則觀象于天二段則伏羲作易无物不察即當日真河圖洛書亦僅與天生神物鳥獸之文同為感觸之一端耳今不玩易而但觀蓍龜鳥獸即盡易乎溺圖書者何以異是易圖明辨曰欲明易八卦具在焉用河圖欲明範九疇具在焉用洛書其言明矣又按禹時洛出書則之以列九疇亦不經見林之竒書傳云鯀陻洪水帝乃震怒不畀洪範九疇洪大範法猶言天奪之鑒天乃錫禹洪範九疇猶言天誘其衷趙汝楳易雅謂不過如天錫王智勇天錫公純嘏之𩔖不必天命物負之以錫諸人也毛河右曰圖書則以作易經有明文若則書演疇孔安國等後起之說未可信且禹所得名為洪範九疇􅂚嘗名洛書耶總之圖書既亡無甚攸關置之不論无不可者奚為作偽哉易緯太二坤宫七兑宫六乾宫乙下九九離宫五中宫一坎宫宫圖四巽宫三震宫八艮宫大戴禮明堂篇曰九宫之制二九四七五三六一八即此九宫法盖皆漢世讖緯術數之學也今相宅經有一白二黑三碧四綠五黃六白七赤八白九紫諸說皆本諸此易有四象所以示也繫辭焉所以告也定之以吉凶所以斷也然則大衍之示人用以四揲而著于繫辭斷其孰吉孰凶其所以前民者不瞭然哉易曰自天祐之吉无不利子曰祐者助也天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉无不利也引大有上九辭以證之言人能依四象所示繫辭所告履信思順而又尚賢則吉至而凶免矣子曰書不盡言言不盡意然則聖人之意其不可見乎子曰聖人立象以盡意設卦以盡情偽繫辭焉以盡其言變而通之以盡利鼓之舞之以盡神大衍明而聖人之意不可不知也故設為問答以發之言限于物故意不能盡象括無窮故立以盡意設卦觀象以盡其攻取之情偽因象繫辭焉以盡其言皆立象也如履大象履虎尾不咥人小象又言履虎尾咥人大過大象言棟橈小象又言橈隆變而通之以盡天下之利以至盥薦渉川載鬼噬胏等象如鼔而動之舞而蹈之以盡妙萬物之神聖人之意亦殆盡矣乾坤其易之緼耶乾坤成列而易立乎其中矣乾坤毁則無以見易易不可見則乾坤或幾乎息矣夫立象盡意不外乾爻坤爻而已則乾坤其易之緼藏耶虞翻曰緼藏也謂易藏于其中也何者乾坤成列而易象立乎其中矣若使乾坤之卦毁則于何見易易不可見則乾坤之功用不幾息乎是故形而上者謂之道形而下者謂之器化而裁之謂之變推而行之謂之通舉而措之天下之民謂之事業是故形象而上則一隂一陽謂之道形象而下則書契衣裳等謂之器陽化隂隂化陽化而裁裁如裁衣之裁之謂之變陽以進隂以退推而行之謂之通于是措之天下之民非事業而何易見而乾坤無息矣是故夫象聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其㑹通以行其典禮繫辭焉以斷其吉凶是故謂之爻是故夫象可覆明也爻亦象也極天下之賾者存乎卦鼓天下之動者存乎辭化而裁之存乎變推而行之存乎通神而明之存乎其人黙而成之不言而信存乎徳行是極盡天下之繁賾者存乎卦鼔舞天下之萬動者存乎辭化而裁之存乎變推而行之存乎通前文重化裁推行此重變通皆象也然神而明之則存乎无方无體之人斂嘿而變化已成不言而信若蓍蔡則存乎純徳至行是則聖人之意終有餘乎卦象繫辭之内者矣周易傳註卷五
