body:
  text: 周易傳註卷三通州學正李􅷊撰下經艮下兑上咸亨利貞取女吉彖曰咸感也柔上而剛下二氣感應以相與止而説男下女是以亨利貞取女吉也天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣乾坤重易爲否泰山澤重易爲咸損雷風重易爲恒益水火重易爲既未濟皆隂陽相應而此獨名咸者咸感也兑柔在上則澤氣上行艮剛在下則山氣下降二氣感應以相與艮爲少男止而旡他感兑爲少女悦而有正應則男可爲綱女主于順其徳允諧女不求男而男下于女則正合昏禮天地大夫婦也大夫婦有四徳夫婦小天地也小天地不亦有四徳之三耶仲氏易曰觀彖傳不曰亨以正則四徳之三也康成曰嘉禮㑹通和順于義幹事能正具此三徳而男下女娶之則吉也然豈止男女哉天地絪緼萬物化醇矣聖人經綸天下和平矣若是者何哉天地萬物原爲一體感而遂通無逺不届自然之情也象曰山上有澤咸君子以虚受人山之上必有虚處焉而後可以受澤故君子法之初六咸其拇象曰咸其拇志在外也卦象男女相感故六爻自初至上皆以人象之初爲足足將指曰拇虞氏説人動則拇先之初志在外卦之九四自咸其拇矣此爻與四以動相感者六二咸其腓凶居吉象曰雖凶居吉順不害也腓崔憬曰脚膞俗謂之腿肚在踝上膝下則進于拇矣故六二與五應而感動其腓焉夫二氣交感何所不及腓亦可咸者特是腓有動之理而无自動之形其形動皆隨乎股焉若自動則爲病矣腓病轉筋則動凶矣惟居而不動而潛相感召順乎應之道而不害不惟不凶且以獲吉此與五爻當以静相感者九三咸其股執其隨往吝象曰咸其股亦不處也志在隨人所執下也腓又進則股矣九三亦不安處亦承上二爻言感動其股執志以隨上六人指上六奔走奉承何卑下也往而吝矣九四貞吉悔亡憧憧往来朋從爾思象曰貞吉悔亡未感害也憧憧往來未光大也卦體下卦象股足上卦象身口四在體中而近上心位也思者心之職與初相應正而能固屈伸感召不出其位大傳曰百慮又曰何思何慮正謂此也則不染于感之害而悔无矣若憧憧然淺義曰憧憧心不定貌恍如有往恍如有來且往來者實繁有徒呼類爲朋尾朋爲從是爾之思昏瑣甚矣悔尚待問耶爻以陽居隂而互巽為進退為不果故有往來朋從諸象九五咸其脢无悔象曰咸其脢志末也脢脊肉不動者也脢在心上故五為脢與二之腓精神相通而志意則无焉是不感之感也末无也與論語末如之何末字同義玩辭來註曰拇與心皆動而在前腓與脢皆静而在後故各以類應上六咸其輔頰舌象曰咸其輔頰舌滕口説也上處兑口有輔頰舌之象焉口旁曰輔面旁曰頰應下之九三而掉舌皷頰如水之湧説文滕水湧上也感至此窮矣後世講學講聖諭而道日微俗日偷可歎也卦以上下相感為義舊解乃不取應而取比且謂應則有私繫明與聖言背矣巽下震上恒亨无咎利貞利有攸往彖曰恒久也剛上而柔下雷風相與巽而動剛柔皆應恒恒亨无咎利貞久于其道也天地之道恒久而不巳也利有攸往終則有始也日月得天而能久照四時變化而能久成聖人久于其道而天下化成觀其所恒而天地萬物之情可見矣男女俱少而男下于女其情易感曰咸男女俱長而夫尊于婦其道可久曰恒恒即久也剛上柔下得其序也長陽長隂能相成也即相與巽動而无違也剛柔皆應不孤嫓也王注如是之謂恒矣然則彖言亨无咎而利貞者非正以久于其道耶是道也天地之道也无巳者也夫已者以終故終則有始何巳之有以此攸往利矣且曠觀六合何物不然日月得天之行道夜則復晝晦則復朔而能久照四時變化暑往寒來寒往暑來而能長久以成萬物聖人久于其道禮減而進樂盈而返以漸摩天下而化成是則觀其所恒而天地萬物之情不可見哉子在川上曰逝者如斯夫不舎晝夜大觀也夫易酌象曰雷風恒君子以立不易方雷震而起于上風巽而入于下長男震動于外長女巽伏于内恒而不易者也方所也朱升曰以時則久而不巳以位則定而不易初六浚恒貞凶无攸利象曰浚恒之凶始求深也初與四應本正也然居于恒始當悠裕以處之久自有成乃巽性好入以為常理既然即可深求鑚穴索隠人不能堪因致禍敗者多矣胡瑗口義曰朋友始交遂責深契君臣初合輒望大行亦何利乎浚浚井之浚即求之深也九二悔亡象曰九二悔亡能久中也以陽居隂似乎有悔然恒而得中是久于中矣久中則悔自无九三不恒其徳或承之羞貞吝象曰不恒其徳无所容也巽終而躁三位過中不恒其徳矣徳不恒而值上下之際人之羞之也尚可定乎雖身居正位而動則加憂變成互坎静亦決躁兑為附決何地可容焉九四田无禽象曰久非其位安得禽也四爲上卦地位而震為皷爲作足有田象焉特田貴得禽今震爲大塗而遇毁折則雖有互兑之羊下巽之雞皆脱之矣是何也以陽居隂即久而非其位焉能有獲耶六五恒其徳貞婦人吉夫子凶象曰婦人貞吉從一而終也夫子制義從婦凶也五與二為正應而柔順居中不變其徳亦云善矣而第問當此者何人也使爲兑之婦人也耶則應二為吉所謂從一而終也使爲震之夫子也耶則宜専制以義而下從婦乎凶也上六振恒凶象曰振恒在上大无功也振即震公羊傳曰震之者何猶曰振振然也上六亦過乎中而居震之極動而多事若曰振者吾之恒也不知終則有始乃謂之恒謂以静爲動以斂爲發貞下起元也若以震終災凶將至又何功焉恒常道也然初六未恒而視爲恒則求太深九三巳恒而不能恒則羞或承九四恒不得位則无禽上六恒而多事則无功六五得中而體復隂柔爲婦則吉爲夫則凶恒之難如此所謂中庸不可能也非悠久成物自强不息者其孰與歸九二自始比于初為始而終應五為終久中以往庶幾近之矣艮下乾上遯亨小利貞彖曰遯亨遯而亨也剛當位而應與時行也小利貞浸而長也遯之時義大矣哉遯退也見雜卦逃也太𤣥準以逃唐二隂在内而漸進四陽在外而日消陽當遯者也獨是遯與否不同否三隂全在内三陽皆出外别換世界方可有爲遯則隂雖長而勢尚未盛陽雖退而中外有人即此境地猶可挽轉故五剛當位而二隂應之于是或褰裳而遯或覿面而遯明施摶捖暗自寳藏與時偕行以全其遯固可以亨而此時爲隂小者初二能正其浸長之勢與君子合亦尚有利然則君子介于去就之間小人尚在離合之際此時善維之可行斯人吾與之懐不善居之立成天地否塞之世其義不大矣哉象曰天下有山遯君子以逺小人不惡而嚴天未甞惡山也而山之望之杳乎其不可攀若遯去者然何其嚴也君子以此逺小人善矣哉初六遯尾厲勿用有攸往象曰遯尾之厲不往何災也上為首則初爲尾陽外向而遯而一隂潛躡其後以逐之是尾也夫陽類尚盛隂乃欲闇施其奸陽能容之乎亦有災而可厲矣爲小人戒惟退止不往則可耳六二執之用黄牛之革莫之勝説象曰執用黄牛固志也此小人之利貞者也坤爲牛二爲坤之中畫爲黄而上畫變艮牛之皮變而爲革矣見纂言獸皮去毛生曰革熟曰韋六二與九五相應知九五之將遯也出艮指而用黄牛之革作巽繩以執之艮止有執象以固九五之志則九五雖欲脱而不得矣説通脱即遯也勝任也言不能脱也九三係遯有疾厲畜臣妾吉象曰係遯之厲有疾憊也畜臣妾吉不可大事也九三爲四陽逃遯之始宜其遯矣然與二隂同體而性爲艮止則于此而係戀者有之夫係戀不決一爲隂勝必致成否豈不有疾豈不可危特是女子小人亦居家所不能去者仲氏易曰艮男下柔為臣巽女下柔為妾苟以情畜之艮為閽寺而二隂居門闕之内有畜象不致離叛不亦吉乎但以此係戀者而圖大事則終不可耳九四好遯君子吉小人否象曰君子好遯小人否也初六潛而躡我未明肆其毒也九四以陽居隂外似與之和好而巳遯矣此善處浸長之隂者不其吉乎而起視初之小人害陽不能徒得災厲反居否矣九五嘉遯貞吉象曰嘉遯貞吉以正志也九五與六二中正相應而六二竭情以執維乎五似難遯矣然九五志正而固與之一无違言一无忤事而即蕭然遯退是善去矣吉哉上九肥遯无不利象曰肥遯无不利无所疑也上九則飄然逺去矣出我剛斷以決坎疑坎位盡則无疑人既不來尾執巳亦无所疾厲東海北海囂囂无悶是肥遯者也隠固逺害出亦待時何一不利者乾下震上大壯利貞彖曰大壯大者壯也剛以動故壯大壯利貞大者正也正大而天地之情可見矣三畫卦初爲少二為壯三為究六畫卦初二為少三四為壯五上為究漢上易傳大陽至四壯矣且内卦剛而外卦動所以壯也獨是壯之始不宜躁初戒壯趾中欲能貞二三四皆曰貞終不使懈上六艱吉則大而得正一陽之初復于内者見天地之心四陽之動往于外者見天地之情矣象曰雷在天上大壯君子以非禮弗履震為足所履者純剛而无隂翳是非禮弗履也初九壯于趾征凶有孚象曰壯于趾其孚窮也初為趾趾主行壯于初者必以爲離志有孚下卦離位何妨鋭進而前不知六五居髙非應乃欲以下而逼上則孚且窮矣而况征乎徒得凶耳九二貞吉象曰九二貞吉以中也九二大壯之得中者得中則正中可兼正聖言也九三小人用壯君子用罔貞厲羝羊觸藩羸其角象曰小人用壯君子罔也九三以下乾而接上震鋭然有為而不知所處之位不中多凶如以小人處此則但知用壯以君子處此則必網羅羣賢於上下九四九二之君子皆網而致之以有爲焉罔即網字虞翻曰爻變離為網訂詁知罔舊訓无為非而解用罔為羅君子甚是但謂羅君子而與之爭又大誤何者爻以陽居陽固得其正然危厲也卦大兑為羊上卦震為草木為蕃有藩象九三之羊用壯而觸九四當前如藩且羸係其角矣羸王肅本作縲鄭虞作纍蜀才作累皆係累之意豈不危厲是以君子必用網也網羅羣賢以至九四則藩決不羸矣九四貞吉悔亡藩決不羸壯于大輿之輹象曰藩決不羸尚往也九四之陽居上下三陽從之正為卦主吉矣悔以无矣毅然直往以決隂柔故九三以九四為藩今則六五上開藩決矣无復羸羊之角矣坤為大輿以坤初而索為震一陽亙于下如輹不壯之至乎六五䘮羊於易无悔象曰䘮羊于易位不當也九四尚往往則進而變五為夬矣故六五互兑本羊也而忽焉䘮之則以五為陽位以隂居之位原不當故宜變耳易即變也有何可悔上六羝羊觸藩不能退不能遂无攸利艱則吉象曰不能退不能遂不詳也艱則吉咎不長也六五逼近下陽故變互兑而䘮其羊上六與陽隔于六五之隂大象見兑亦羝羊也以為居大壯之終可以觸藩而不知下有陽往上无所之以卦終也不能退也不能遂也不揣甚矣有何利乎然苟艱難惕厲則陽剛尚往將以乾終雖暫有咎豈長有咎焉初壯而不當征者也二壯而得中者也三壯而危厲當羣賢共濟者也四壯而當往者也五從人變易以為壯者也六隂柔而妄以為壯者也坤下離上晉康侯用錫馬蕃庶晝日三接坤有土有民故有侯象民功曰康書所謂康功是也訂詁錫下錫上也如書納錫大龜禹錫元圭之類坤為牝馬中爻坎爲美脊之馬坤為衆有蕃庶象坤三爻三接之象姚小彭曰錫馬蕃庶侯享王之禮也覲禮奉束帛匹馬九馬随之晝日三接王接侯之禮也覲禮延升一也覲畢致享升致命二也享畢王勞之升成拜三也彖曰晉進也明出地上順而麗乎大明柔進而上行是以康侯用錫馬蕃庶晝日三接也晉者日出也進也下坤上離其象則日出乎地順進而上麗乎天中大明四照離本乾卦為麗為明其爻則坤之一柔進行而居上卦離中為卦主皆晉也故坤順進而上麗乎日有諸侯朝享天子之象日麗天中下照坤土有天子禮接諸侯之象纂言則下之覲上為升進而上之臨下又爲晉接康侯用錫馬蕃庶晝日三接不亦宜哉象曰明出地上晉君子以自昭明徳杲日當空容光必照必如此然後可以言明明徳初六晉如摧如貞吉罔孚裕无咎象曰晉如摧如獨行正也裕无咎未受命也初與四應欲順而進則晉如然四爲民一剛上臨儼如山之傾壓而下又摧如初六于此惟絶去畔援獨行其正自无不吉縱四坎狐疑亦寛裕處之而巳矣葢坤雖有侯象而初爲民未受命也古世子嗣立未受王命皆士服焉以急爲六二晉如愁如貞吉受兹介福于其王母象曰受兹介福以中正也六二亦晉如也而坎險相接爲隠伏爲加憂則愁如所可幸者六五王母雖敵應不能即合而二既中且正守之以固則王母可感終有大福而吾受之矣坤爲母六五一隂又居坤上爲王母爾雅父之妣曰王母六三衆允悔亡象曰衆允之志上行也以柔處三繫辭曰三多凶其柔危似有悔者然坤爲衆而三居坤上衆皆信之虞氏易坎爲孚允也所謂信友可以獲上者也其志上行悔无矣九四晉如鼫鼠貞厲象曰鼫鼠貞厲位不當也九四上麗大明固晉如矣然位不中正貪據下隂上畏離日艮爲鼠而此則鼫鼠矣説文五伎鼠也廣韻螻蛄也體離欲升體坎欲降是能游不能度谷也不至于上是能飛不能過屋也不出于離是能緣不能窮木也離為科上稿五坤上薄是能穴不能掩身也倒震在下是能走不能過人也九家易雖晉之時晉如亦正然而厲矣六五悔亡失得勿恤往吉无不利象曰失得勿恤往有慶也六五陽位則有得隂體則有失然互坎已出總勿恤于心矣不患得不患失此正彖傳之所謂柔進而上行麗乎大明者也往而有慶寧顧問哉上九晉其角維用伐邑厲吉无咎貞吝象曰維用伐邑道未光也上九以剛而居離牛之首有角象焉然上位已窮即進其角將何所觸惟自伐其坤邑則厲吉而无咎耳夫離爲甲胄為戈兵乃無能逺振徒區區與邑人相詬厲離之終而不光矣雖進以正亦可羞焉初六在下獨行故進宜裕六二得中而貞故進受福六三爲衆所信則可上行而伸志九四處位不當則雖巳進而可危六五進而大明矣故有慶上九進之窮矣故不光進之道宜柔不宜剛故柔爻皆優剛爻皆絀也離下坤上明夷利艱貞彖曰明入地中明夷内文明而外柔順以蒙大難文王以之利艱貞晦其明也内難而能正其志箕子以之仲氏易曰由晉反之而明夷矣夷傷也滅也離日之傷傷于入地向非歴艱難而守正固亦又何利夫子曰吾于斯見文王焉夫所謂明夷者䝉難者也明離在内而坤順在外于以當互坎而䝉險難苟非體明夷之全義而隂行善者恐未足以當此也此非文之以而誰以也且于斯見箕子焉夫所謂利艱貞者晦其明者也互坎之險難在内卦是内難也商紂至親故曰内難而能艱難備甞深自韜晦以正其志苟非履利貞之爻六五利貞而佯狂避禍者未足以幾此也非箕子之以而誰以也象曰明入地中明夷君子以蒞衆用晦而明外晦而内明蒞衆之道莫善于是初九明夷于飛垂其翼君子于行三日不食有攸往主人有言象曰君子于行義不食也明夷之初何夷乎則于飛鳥見之離爲雉爲飛鳥而初三兩剛以健羽相夾而爲之翼則初固離之一翼也而頽然下垂有似乎夷其翼者初之離剛君子也比之離鳥之飛則于行也憤時逺去義不苟食則三日不食者有之離中空不食之象三爻爲三日于此而有攸往至三爻爲九三與初九陽剛同徳可爲主人特其志不甚相同嘖有煩言如伯夷避紂適周武王左右欲兵之太公曰此義士去之是也互震爲言六二明夷夷于左股用拯馬壯吉象曰六二之吉順以則也六二之明夷則夷于左股矣何者初爲足二居足上股也互坎主左方左股也李鼎祚説左股夷則害于行見易酌將欲拯之何所用乎幸比九三互坎爲馬美脊爲亟心壯馬也于以代歩吉矣葢六二柔中順以合則坎爲法則也故夷而有救如此散宜生等獻珍物以救文王似之九三明夷于南狩得其大首不可疾貞象曰南狩之志乃大得也九三之明夷葢有所志也今而乃大得矣離南方卦也而爲戈兵本可用武而三爻日盡日盡于冬則向南以修冬狩而尋入地之上六上居天位爲首是大首也而于以得之韜光之極遂興大事然豈可疾遽乎惟以貞耳六四入于左腹獲明夷之心于出門庭象曰入于左腹獲心意也四居卦中爲腹心且坤爲腹荀爽説震在左方爲左腹坎爲心六四韜光緘口内自籌度入于左腹而獲明夷之心焉他爻之傷在跡此傷在心我思古人實獲我心于是震行逺引迴視四爲門三爲庭干寳曰一曰室二曰户三曰庭四曰門而皆出之吾家耄遜于荒亦以自靖也傷心而曰得心者出遯則得其心也猶夷齊之逃曰求仁得仁也六五箕子之明夷利貞象曰箕子之貞明不可息也坤于地爲黑六五居坤中上比闇君如坐昏獄是箕子之明夷也然居中以正其志外雖晦而内之明亦何可息者伏坎内景上六不明晦初登于天後入于地象曰初登于天照四國也後入于地失則也下五爻之明夷因上六而夷也上六之明夷自夷也故當在晉時本明也後乃不明而晦矣明則日登天上照臨四國晦則日入地中坤迷失則天壤之判也嗚呼何爲至此漢上易傳曰卦之後爻因前爻者多矣而更有因前卦爲象者如明夷之上六辭因晉夬之初九辭因大壯亦彰往察来之一端也離下巽上家人利女貞風與火而何以謂之家人耶以爲巽離二女同居則離兑二女之名睽又何耶曰此則風火之所謂家人者也離上兑下水火不相及也而巽上離下則火以風發風因火熾兩相入而无間如家人然曰家人仲氏易夫家人以女爲奥主正家之道當責男而正家之效必觀女不利女貞而何利焉彖曰家人女正位乎内男正位乎外男女正天地之大義也家人有嚴君焉父母之謂也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣然而家人豈止女貞哉二之在内隂正位也而六二之女居之以正位乎内五之在外陽正位也而九五之男居之以正位乎外虞仲翔王輔嗣皆如此説男上女下謂之恒乃天尊地卑之大義也且不特此上九反身而威如非一家之嚴君乎嚴即威也嚴君者父母也仲氏易曰母亦可稱君如女君小君太君類母亦可稱嚴如有慈父必有嚴母類且初九以乾畫之男有六四坤畫之女而爲之家上女下男咸象也初有四曰有家五有二曰有家經文甚明二五曰假曰貞而此亦曰閑曰順初爲陽位四爲隂位是亦男女正位者也不與二五爲兄弟耶至九三間于初二四五隂陽之間雖嗃嘻交作而剛徳當位亦我兄弟也吾見一家之中太上之君威居髙堂九五長子𫝊家主政而一家信愛熙然無憂父得父道子得子道兄得兄道弟得弟道夫得夫道婦得婦道交相正以相成也家道莫盛于此由是以之治國以之平天下如運諸掌耳象曰風自火出家人君子以言有物而行有恒火上而風自生黄帝書曰火疾生風家人主中饋之象也家之本在身故君子言必有物有指實也行必有恒無二三也初九閑有家悔亡象曰閑有家志未變也初四相應而成家而初能以變爻之艮爲門爲止以閑之四爲巽女于歸在初坎志未變所謂教婦初來者也何悔六二无攸遂在中饋貞吉象曰六二之吉順以巽也六二以順隂畫即坤順而應巽五居巽中故凡事不敢自遂遂専成也而惟以酒漿五飯爲職孟母曰婦人之禮精五飯羃酒漿養舅姑縫衣裳正彖之所謂女貞者吉庸問乎鄭康成曰爻體離互體坎水在火上飪饋之象九三家人嗃嗃悔厲吉婦子嘻嘻終吝象曰家人嗃嗃未失也婦子嘻嘻失家節也離火聲不常或咷或笑或嗟或歌此恒態也仲氏易今三剛不中而跨兩離之間下與互皆離則爲猛爲寛難可一定使其待家人以嗃嗃耶雖多悔而過厲然正家之道不失猶爲吉也若婦子而嘻嘻耶則失治家之節終有羞吝矣説文曰嗃嗃嚴酷貌侯果曰嘻嘻笑也張楫作嬉嬉陸公理作喜喜皆通用字六四富家大吉象曰富家大吉順在位也六四之女身居巽始爲近利市三倍飲食祭祀必䖍米鹽醯醬必節蠶繰女紅無曠富家而大吉矣若是者何也以巽順而居正位八卦正位巽在四離在二上承家長下應夫子故能然耳九五王假有家勿恤吉象曰王假有家交相愛也此秉家政者王也率一家之和以承父母无所不至假格通至也通也父父子子兄兄弟弟夫夫婦婦交相歡愛吉矣哉雖互坎爲恤恤憂也而已勿也勿无通字曰吾今无内顧憂矣仲氏易上九有孚威如終吉象曰威如之吉反身之謂也彖𫝊之所稱嚴君者正此爻也長子柄政欲交愛以通情白髮在堂貴有威而可畏望立于上人信于下變坎爲孚陽剛在上爲威吉有終矣然所謂威如者豈作而致哉正其衣冠尊其瞻視反身自治而巳大學齊治均平本于修身非此道歟兑下離上睽小事吉彖曰睽火動而上澤動而下二女同居其志不同行説而麗乎明柔進而上行得中而應乎剛是以小事吉天地睽而其事同也男女睽而其志通也萬物睽而其事類也睽之時用大矣哉睽乖異也離火炎上兑澤潤下不相及也中女少女各逺兄弟不同歸也故謂之睽然睽而有合象焉内悦而外麗乎明柔行而居于上卦得五中以下與二剛相應夫柔之事小事也隂爲小而悦麗明則有徳進居五則有位下應剛則有輔來易小事不以吉耶而亦豈止此彼夫火同乎天天火同人澤臨乎地地澤臨火澤反易而爲男女反易家人男位外女位内合天地男女而生萬物乾道成男坤道成女男女搆精萬物化生則天地萬物男女皆于睽乎得之仲氏易而天尊地卑化育流行夫外婦内家室和好形形色色萬物一體惟合見睽亦惟睽得合睽之時用豈不大哉朱子卦變圖睽自遯大壯來則遯兩隂爻皆移與他卦祗移一爻者不合而大壯剛進與本文柔進而上行又不合故本義不得不雜用離中孚家人三卦仲氏易以此等无定式也于十辟卦外指復臨泰大壯夬姤遯否觀剥為十辟卦又以中孚小過爲半聚咸恒等十卦爲子母聚通爲變母以求其合然半聚子母聚之名不渉鑿乎象曰上火下澤睽君子以同而異禹顔同道而出處異由求同學而兵農分彖𫝊之睽而同異歸于同也大象之同而異同原有異也諸葛武侯曰違覆而得中猶棄敝屣而獲珠玉也睽之不可已也如是夫初九悔亡䘮馬勿逐自復見惡人无咎象曰見惡人以辟咎也初九與九四敵應而不相合宜有悔者而悔亡矣夫四在坎中爲亟心之馬下值兑脱兑説也説通悦通脱兑口亦有脱象爰且䘮去然而守正待之不必逐也兑口上夬夬即返乾馬自復矣仲氏易曰凡易中有兑口者皆勿逐自復如震之六二有兑口曰勿逐自得既濟六二有兑口亦曰勿逐自得是也且夫四居人位人也而坎爲盜離爲戈兵是惡人也惡人而值離目上下之交下互亦離則睽之目不相視者而今見矣説文睽目不相視也相見而不拒則咎辟矣故悔以亡䘮馬一象也見惡人又一象也九二遇主于巷无咎象曰遇主于巷未失道也六五二之主也當睽之際兑爲毁折坎爲險窞離之甲兵布滿天地此可論常道乎委巷相遇便定主臣何失道之有巷説文云里中道也離中虚有巷象六三見輿曵其牛掣其人天且劓无初有終象曰見輿曵位不當也无初有終遇剛也六三以隂居陽介兩剛之間而欲應乎上九則見坎輿以偏輪而被曵坎為輿又為輪三居坎下爻為偏輪故為所曵又坎為曵其駕輿之離牛以一後一先而相掣上離在坎車前互離又在坎車后有牽掣象此其狀必不能以急合仲氏易而且其人更有可異三居人位巽爲髮而半巽不成巽髮且遇兑折則天之程𫝊曰天髠首也艮爲鼻而半艮不成艮鼻且遇兑折則劓之劓割鼻也其險難爲何如者然上之與三本正應也三爲終上亦爲終上九之剛雖不遇之于初必遇之于終睽極則合用固然也淺義曰此之見三自見也上九之見見三也九四睽孤遇元夫交孚厲无咎象曰交孚无咎志行也九四以剛居柔上下之隂各有應與不相爲助則睽而孤者也然獨不曰有敵應之元夫在乎元者始也陽爲夫而居初始元夫也四能出坎中之志以孚于元夫而元夫亦孚之交相結與則天下强悍之徒見收于君子者豈少哉在初爲使貪詐初以四為惡人在四爲得依歸雖厲而无咎焉此真遇之睽者睽之一象也六五悔亡厥宗噬膚往何咎象曰厥宗噬膚往有慶也宗即主也即書所稱功宗也九二以六五爲主者元首之主也六五以九二爲主者腹心之主也雖自二至上象噬嗑有物于中作梗二變亦為噬嗑然梗者四剛二變艮爲膚雖梗可斷則其宗噬之一噬即嗑五往應之有慶矣尚何悔尚何咎往上為往來下爲來易例也然攸往等辭多作行字解不必曰往上如此往字仲氏易謂五仍上往所以為睽訂詁謂不往上而往下睽所以合執而鑿矣上九睽孤見豕負塗載鬼一車先張之弧後説之弧匪冦婚媾往遇雨則吉象曰遇雨之吉羣疑亡也上處睽極亦睽孤矣夫上九所求遇者三也而下視則坎坎爲豕則所見者惟豕耳然且三之所處坎與兑俱豕溷澤畔而塗負焉夫坎車也載之者三也即所謂其人也乃坎爲隠伏有鬼象焉則一車之上但見鬼而不見人且坎爲弓輪其在前者有離矢弧若張然而在後者為兑脱弧又脱然卦以下為前上為後此自上爻見之則上卦為前下卦為後即一見間而乍是乍非可疑如此仲氏易獨是應坎為疑而在離終明使其忽然悟曰此坎非冦也坎為盜乃我之婚媾也隂陽相應為婚媾往而遇之坎雨一漂羣疑頓釋所謂无初有終者不誠有終而吉耶凡此等辭皆必實有其象若不取象而但論理將加聖言以怪誕之失矣初九九四之睽材徳之睽也然初辟咎不得不見四四睽孤不得不孚初睽而同之一象也九二六五之睽時勢之睽也故二雖巷可遇五以噬膚而往睽而同之又一象也六三上九之睽羣疑之睽也故三无初而有終上先孤而后遇睽而同之又一象也艮下坎上蹇利西南不利東北利見大人貞吉彖曰蹇難也險在前也見險而能止知矣哉蹇利西南往得中也不利東北其道窮也利見大人往有功也當位貞吉以正邦也蹇之時用大矣哉蹇説文云跛也坎險在前而艮止不進如跛者之艱于行也故險欲其見互離見象而止欲其能艮篤實有能象則艮外蔽而障坎于内者䝉而坎外通而止艮在内者非智乎惟智則能止以處蹇亦惟智則能往以濟蹇彖之所謂利西南者正謂乾畫之剛往入西南坤位坎本坤體得中而行順蹇以濟也若東北艮山峻阻説卦坤位西南艮位東北非蹇所宜窮而不利矣劉子新語故九五大人也而彖謂之利見亦以往五則有功耳當尊位而得貞邦國大難皆可正之坤為國正邦故有功是蹇非无所用也難于用也以難用之時而能有用濟大扶艱豈不偉哉象曰山上有水蹇君子以反身修徳玩辭曰山上有水流而多阻水之蹇也行有不得反而自修君子之蹇也初六往蹇來譽象曰往蹇來譽宜待也初爲東北艮卦之始往則蹇矣惟來處以待六二之合二之譽即我之譽繫辭曰二多譽同濟時艱乃宜耳六二王臣蹇蹇匪躬之故象曰王臣蹇蹇終无尤也二則上應九五之王王臣矣王臣而可以蹇辭乎吃而猶言再吃不憚也跛而猶行再跛不畏也此豈爲身之故哉以臣事君義在則然即才柔事險成敗難必而亦何過焉下艮互坎蹇蹇之象九三往蹇來反象曰往蹇來反内喜之也至于九三剛實之才雖可濟蹇而爻處下位之終逼近上險輕往必蹶惟來反而比于在内之二二在三内二才弱而心正欲得剛明者共爲幹濟喜可知也六四往蹇來連象曰往蹇來連當位實也四入于險矣隂柔之才亦難獨往其必來而與九三相連結乎九三當位以九居三而實陽為實隂為虚不連之蹇何以濟九五大蹇朋來象曰大蹇朋來以中節也今而知九五之王之能濟蹇矣身居險内可謂大蹇然剛徳得中行而中節六二相應之朋且偕初之待三之反四之連蹇蹇而來以共濟也洪水雖警得人曰仁自有功焉上六往蹇來碩吉利見大人象曰往蹇來碩志在内也利見大人以從貴也而又有自局外來以濟蹇者不觀上六之吉乎位在九五之外復何所往往則必蹇惟志在内之碩而巳矣九五陽大爲碩爲貴繫辭以五為貴三為賤爲大人來碩即以從貴矣所謂利見大人矣馬援竇融之流是也彖𫝊欲其往者往求濟也爻辭戒其往而欲其來者來正所以爲往計也葢處蹇之時不貴一人獨往而貴同心共助故曰待曰反曰連曰朋而皆曰來詩云淠彼涇舟烝徒楫之周王于邁六師及之濟蹇之道如此坎下震上解利西南无所往其來復吉有攸往夙吉彖曰解險以動動而免乎險解解利西南往得衆也其來復吉乃得中也有攸往夙吉往有功也天地解而雷雨作雷雨作而百果草木皆甲拆解之時大矣哉反乎蹇則解矣上震下坎險而能動動而遂免于險所以解也故蹇利西南而解亦利西南解之利西南者以乾剛往上居四則坤衆以得也震本坤體説卦坤為衆萬物皆致養焉夫解之出險惟在二四兩剛故以反易言之蹇卦五陽往上得中今居下卦亦中也是无所往而來復得中中能濟難吉矣蹇卦三陽在下今有所往而居上卦之初則往而有功得衆則有功又夙而吉矣夙早也四居上卦之初故為夙且以反易言之為蹇而以重易言之則為屯屯則天地始交雲鬱雷上草木句曲解則天地發舒雨潤雷下坎通震蕃而百果草木皆甲拆矣甲孚也拆分裂也隂陽流行萬物怒生解之時何其大哉象曰雷雨作解君子以赦過宥罪天將布澤隂陽氣結雷雨一作則解矣赦過宥罪亦君子所以解民難也宥寛也文中子曰无赦之國其刑必平而易言赦過者言人過誤當赦者赦之非發令遍赦也初六无咎象曰剛柔之際義无咎也四剛得衆者也初六以柔而與四剛應則剛柔際矣義又何咎九二田獲三狐得黄矢貞吉象曰九二貞吉得中道也九二九四皆剛也而九二剛得中道則正能解難者坎為狐六三在三位三狐也小人之象二在地上可以于田此而獲之而且得黄矢焉是獲禽而武備益修矣虞氏曰互離為黄矢又爻變坤坤中黄色其貞吉為何如者中即正也六三負且乘致寇至貞吝象曰負且乘亦可醜也自我致戎又誰咎也六三體剛非二而應剛非初才柔質陋上承九四若以背負之者然是荷薪肩餱之小人耳而今且下乘九二之車坎為車儼然擁葢策肥甚自得也夫乘者君子之器而以此瑣瑣者據之即出正命亦可醜也可醜則人醜之醜之則思奪之寇之至也无日矣坎為冦離兵交作將以誰咎九四解而拇朋至斯孚象曰解而拇未當位也三之不宜乘而宜負也任拇之人也乃以九四觀之震為足而三在足前儼若拇然王註故為九四計亦惟解去爾而即爾也拇則初六相應之朋至斯有坎孚之美耳坎為孚盖九四以陽居隂而與三比位未得當故必斥去私人而後能往得衆往有功也六五君子維有解吉有孚于小人象曰君子有解小人退也卦之二陽君子也六五與二相應與四相比爻變為巽巽為繩其于君子如縶如維以云解難誠有解也至于三之負上之隼為小人者亦且畏戎與射曉然知解時之不可以儌倖也而退而相孚矣解之至也上六公用射隼于髙墉之上獲之无不利象曰公用射隼以解悖也然小人解之則有孚縱之則終悖不可不知也上六變離為飛鳥外圍中空而在上為髙墉是隼在髙墉之上也隼鷙害物髙墉有慿不射之悖何由解悖逆也六五居尊位即公也必用君子以坎弓離矢射上而獲之矣獲之則悖解何所不利觀卦象則雷雨作解得衆物生觀爻象則拇必解隼必射而後小人可孚初六九四九二六五相孚相維以有功焉葢小人不去君子徒勞雷霆四擊乃布甘雨解之道也兑下艮上損有孚元吉无咎可貞利有攸往曷之用二簋可用享彖曰損損下益上其道上行損而有孚元吉无咎可貞利有攸往曷之用二簋可用享二簋應有時損剛益柔有時損益盈虚與時偕行六子之索本于乾坤損益二卦損陽益隂損則皆損益則皆益而一名損一名益者何也損内本乾卦而損其一陽則陽將衰曰損益内本坤卦而益之一陽則陽將盛曰益故雜卦曰損益盛衰之始也一義也民不可損損下以益上下損而上亦將受其損益亦爲損君不可益損上以益下下益而上亦將受其益損亦為益二義也向秀説則先于損象觀之損下卦之一陽而爲兑益上卦以一陽而爲艮其道上行如下之供上仁育下之情願報之禮率下而下之分以為當輸之是損有孚者損而有孚也有大離之孚大離中虚心象故亦為孚則大吉无過可貞于久而互震攸往自无不利况損有其事亦有其時時宜用損二簋至薄亦可享獻故剛盈則損柔虚則益可損可益與時偕行儀文用度示儉示禮布縷米粟力役可用可緩皆時也仲氏易曰震為盂為竹簋象二者初二兩陽也下之兑口食上之艮闕而坤養在中享之象應當也彖曰山下有澤損君子以懲忿窒慾山下土虧成澤損之象也内乾剛恐失于忿易六三而成兑説以懲之外坤柔易流于欲易上九而成艮止以窒之損之事也初九已事遄往无咎酌損之象曰巳事遄往尚合志也巳巳身也初爲民安于在下是以供上之事為巳事者也巳事而有不速往以奉之者乎此與君上本義曰尚上通合志之順民也何咎但民可願損上不可過損也務斟酌以損之乃為得耳九二利貞征凶弗損益之象曰九二利貞中以為志也初爲民則二為臣臣之應五利剛中而不變所謂以道事君也若兑悦妄動震主動則凶矣故无所謂益上也惟弗損則所以益之為民留餘勿進羡勿搜括財之弗損也當朝正色勿曲學勿卑節身之弗損也六三三人行則損一人一人行則得其友象曰一人行三則疑也損之損下益上六三上九也故于此爻特明上下之象焉乾為人三人行者下乾卦三陽並進也損一人者九三之一陽變也一人行者乾一陽往上卦也得其友者一陽上為上九一隂下為六三而隂陽相交也葢隂陽之道貴于致一一人行似乎孤矣然无獨必有對陽感隂應必得其友三人行似乎衆矣然一國三公吾誰適從左𫝊離坐離立勿往參焉禮記參則雜而生疑必損其一天以一而得地男以一而得女絪緼搆精萬物馮生則不疑其所行也可玩哉三人行則損一人老之變也一人行則得其友少之合也仲氏易曰來註以益下三爻反于損之上三爻為三人行則不特損下三爻反于益之上三爻亦當為三人行凡反易之卦何一非下反上上反下者且其以一人行為六三往上而居四夫三四皆隂居上居下何從見之祗强解反易而不顧情理何也六四損其疾使遄有喜无咎象曰損其疾亦可喜也此則初之所謂合志者也坤為虚為害九家易疾也或兵或役皆疾也而得初九一陽之遄往而損其疾矣誠合志而可喜矣然遄往者孰使之則六四以酌損者使之六五或益之十朋之龜弗克違元吉象曰六五元吉自上祐也卦之得益者上九也然六五君位上九之益即所以祐五也祐助也故六五居中不貪有或益之十朋之龜弗克違之象焉或者不期而至似不知所從來者十朋之龜大寳也禹貢納錫大龜聼其自有不株求也弗克違者欲辭之而不得也彖之所謂元吉者正以此仲氏易曰大象離為龜古五貝為朋新莽時兩貝為朋十朋直五十貝也上九弗損益之无咎貞吉利有攸往得臣无家象曰弗損益之大得志也上九則五之財賦所聚也益也然與下之六三相應而以之爲友是損下以為益者實弗損下以為益也非彖之所謂无咎可貞而利有攸往者乎故以情言之爲得友而以分言之則為得臣得臣則天下皆吾人即皆吾土吾財志大得矣又奚事聚斂于一家為故曰得臣无家震下巽上益利有攸往利渉大川彖曰益損上益下民説无疆自上下下其道大光利有攸往中正有慶利渉大川木道乃行益動而巽日進无疆天施地生其益無方凡益之道與時偕行益則損上乾卦之陽爲六四而成巽益下坤卦之隂以初九而成震初民也而受益有不説而无疆者乎夫益下者上之道也貴不下賤則道不光今觀卦象陽自上卦而下于下卦之下以成大離不粲然而光明乎且二五皆居中得正則震往有慶其利也不信然乎矧巽木震旉皆為木道震行而渉川大離有虛舟象不又利乎而益之象更不止此以益之道動往而出以巽則奮發而不鹵莽進徳修業何可限量天以一陽施于下而地得之以生萬類上乾下坤天地也品物咸亨安有方所凡此皆震巽春夏之交蕃鮮長進與時而偕行者也象曰風雷益君子以見善則遷有過則改風雷之勢交相助益者也本義君子遷善改過如風之迅如雷之勇益可勝言耶初九利用爲大作元吉无咎象曰元吉无咎下不厚事也上之益下不必果有所予也夫予下㡬何而使下自益則无盡仲氏易侯果曰大作謂耕植也書曰東作史曰大興農功是也處益之始益耒耜象居震之初初為民為地民在地而動東作之象震為稼穡又為大作益之大者莫如耕植故初九之利利爲大作而下无厚事之苦則大吉无咎矣事事上也厚薄之反也不違農時則力役輕什一而征則税斂薄故曰不厚事六二或益之十朋之龜弗克違永貞吉王用享于帝吉象曰或益之自外來也四既益初矣初為民則二爲臣君之置臣以爲民也民益而臣不並受其益乎而六二不敢必君之益我也故十朋之龜弗克違而曰或益之夫損之六五下以龜益上其貢不煩而益之六二上以龜益下則其錫至渥損益反易益之六二即損之六五六二于此惟永守其正則吉矣且二與五應五王也二在地上王者掃地而祭因吉土以饗出震之帝纂言所謂祭則獲福者亦于此見之又益之一象也四在外卦故曰益自外來六三益之用凶事无咎有孚中行告公用圭象曰益用凶事固有之也三與初同體亦在所益者第三本多凶繫辭而又處三坤之中與穿土交陷而成凶象者正有合焉説文曰凶字象地穿而交陷其中夫民饑爲凶孟子曰河内凶是也古之王者原有委積以待凶荒周禮遺人縣都之委積以待凶荒用而益之尚有何咎故必出之以誠孚誠也不為虚文行之以中不滋偏弊而出鎮圭以致王命周禮珍圭以徴守以恤凶荒註珍作鎮王使人徵諸侯憂凶荒則授之以致王命焉使公侯被災之地力爲拯救可也然而救荒以孚以中尤貴以豫委積苟非固有即欲益凶而何益哉乾徳益下有畜實象坤為國有公象又坤土圭象震為言告象大離孚象六四中行告公從利用為依遷國象曰告公從以益志也六四居中爻亦中行也然損陽而遷之以坤隂坤為國有遷國之象焉則中行者何行哉從來國之依在民民之依在稼穡四居中央坤爻地位土爰稼穡所謂周原膴膴堇荼如飴者則告公以衆吉允從利用往遷可也夫遷國本非輕舉有以告之而益其志則遷可定艮爲言有告象從即洪範龜從筮從卿士從庶民從也坤順有從象九五有孚恵心勿問元吉有孚恵我徳象曰有孚恵心勿問之矣恵我徳大得志也四以益下為心乃恵心也九五之君比于四而孚之不問而信大吉之道也然有孚恵心則恵者四之徳哉即我徳也我即指五爻變為頤養賢以及萬民于此有焉五之志不大得耶上九莫益之或擊之立心勿恒凶象曰莫益之偏辭也或擊之自外來也上九與六三應六三隂虚而凶上當益之矣乃上九乘剛恃剛亢而不下莫有益于下者然所謂莫益猶偏舉之辭也豈止莫益哉或來擊摧殘虐之矣陽剛髙峙有擊象故蒙上九亦言擊夫雷上風下曰恒今返之而風返于上雷擊于下曰不恒且此即恒卦之九三也亦曰不恒凶將立致外何利焉外者外也纂言曰對三而言乾下兑上夬揚于王庭孚號有厲告自邑不利即戎利有攸往彖曰夬決也剛決柔也健而説決而和揚于王庭柔乘五剛也孚號有厲其危乃光也告自邑不利即戎所尚乃窮也利有攸往剛長乃終也夬者缺也環之有缺者名玦今以五陽而戴一隂其形上缺則因象名夬而義亦隨之合五陽而決一隂此與左𫝊賜之玦則決白虎通君子有決斷則佩玦者其義正同仲氏易曰上缺故為附決故夬者決也剛決去柔也内乾健而外兑悦則所以決之者不至激而失和夬之道也然則彖辭可釋矣揚于王庭者五為王王庭也羣賢對揚于王庭正以柔乘五剛之上不容不決也孚號有厲者善類共結而號呼惕厲持之以危乃可決隂而有光也乾惕危厲之象乾為言兑為口號象告揚之象且夫所謂隂之在上者尚上通非將終之窮宼哉決勝一戰恐其致死于我也况渠坤之一爻猶儼然坤邑矣其亦自其邑而修文命以告之休兵養鋭勿輕即戎而修吾徳政行仁益強剛往而長隂乃自終決隂可易乎哉以不利即戎故三戒其壯頄以剛長乃終故五慮其未光象曰澤上于天夬君子以施禄及下居徳則忌澤氣上于天則蒸潤而下澤決而流之象也若居其徳則忌矣恐其伐施故又戒之初九壯于前趾往不勝為咎象曰不勝而往咎也大壯四陽夬進而五陽則大壯初爻壯于趾者此更進而加一陽壯于在前之趾焉淺義曰卦以上為后則初為前夬下卦三爻即大壯下卦三爻故爻辭頗類夫初勢微而逺于上何能勝夬之任乃壯往若此徒取咎耳九二惕號莫夜有戎勿恤象曰有戎勿恤得中道也仲氏易曰二則當任決者但逺未即決因取孚號而怵惕之彼宵小勢窮乘間抵隙每思以暮夜之間作興戎之計壁人腹刃投以不測而九二能守中正便巳无慮所謂其危乃光者也九三壯于頄有凶君子夬夬獨行遇雨若濡有愠无咎象曰君子夬夬終无咎也九三以剛處剛決去之意若赫然見于辭色顴骨髙峙頄音葵面顴也三在乾為首故冇頄象則淺丈夫也豈不有凶為君子計亦惟夬之又夬志于必往雖獨行而與上遇五陽獨三與上六應兑水下注有若雨之濡者厭浥可愠而利器深藏濡縷立斃終无咎耳九四臀无膚其行次且牽羊悔亡聞言不信象曰其行次且位不當也聞言不信聰不明也至于九四以剛居柔位處不當君子而涉于隂柔者也變坎為臀見虞氏易臀字從殿殿後也九三為頄九四反為臀者三下卦之上四上卦之下也臀下有柔肉曰膚乘剛則臀无膚矣訂詁又坎為曳且以无膚而次且不進矣夫以四視上六為兑主羊也羊在前而我從後驅之此牽羊之術也東谷鄭氏謂羊性狠居前而力挽之則忿而不行却行而使之前則行矣若如此則无悔矣其如四聴言不明雖號之以此而不信何變坎為耳九五莧陸夬夬中行无咎象曰中行无咎中未光也乾畫平直而五疊隆峙一若髙平之陸然上六拆于其上又若陸上有莧然夫莧葉弱而根堅上柔下剛之象見荀慈明説九五于此夬之又夬曰吾以中行者去之焉是固決而和者何咎然九五居尊有權隂逼莫逃可以一決而盡而乃安于中行君子微窺其隠曰得毋有未甚光明者乎葢惟恐陽之不決陽也三爻遇雨亦无咎此爻中行乃未光乃知時宜待而輕見詞色時當決而尚講持中調停皆腐儒敗乃事者也王崑繩曰夬之九五兑也非乾也雖決上六而隂有不忍割者是未光也故兑之九五遂孚于剝焉上六无號終有凶象曰无號之凶終不可長也五陽孚號則一隂无所號矣兑口亦有號象終不可長其凶宜耳五剛決一柔若易易然然初九不勝矣九三且受其沾濡矣九四趦趄不果矣九五夬而未光矣且下卦健體則初與三恐其決之過上卦説體四與五又恐其決之不及惟二得中而惕號不寧小人之難去如此君子去小人之難如此厲哉故通卦不言亨吉祗曰无咎无恤悔亡所以深戒君子使勿忽小人也聖人之情見乎辭如此巽下乾上姤女壯勿用取女彖曰姤遇也柔遇剛也勿用取女不可與長也天地相遇品物咸章也剛遇中正天下大行也姤之時義大矣哉姤者遇也在夬之一柔方幸其決于上而忽出于下來與剛接若邂逅然是姤也夫柔者女也上有五陽而一女竟出而與之遇可不謂壯乎若用而取之則從此漸侵漸長由姤而遯而否而觀而剝而可乎然而柔出遇剛固可危厲而五陽在上索入一隂則天地相遇天陽地隂為仲夏之月大巽東南品物咸章且九二位遇中九五位遇中正則陽能包畜初隂以大行于天下姤之時其義不亦大哉象曰天下有風姤后以施命誥四方天下有風自上而下物无不遇之而從令焉后之命誥似之初六繫于金柅貞吉有攸往見凶羸豕孚蹢躅象曰繫于金柅柔道牽也初六則正所謂女壯者也巽為繩巽木而合乾金為金柅説文柅木名實似梨仲氏易曰實似梨黄色故名金柅則初六有牽繫于金柅之象焉裹足不前守隂之貞則吉矣若欲求陽而往男不先女女反先男其凶立見然而繫則繫矣形以之繫心誰能繫試諦觀其象可畏也哉坎為豕坎體不全且柔爻為羸豕羸豕母豕也趙汝楳曰隂為羸豕巽股為蹢躅塗豕逸風而金柅是繫急就不能形神俱瘁専専莫化盤桓踢蹶可畏亦可醜也大堤白苧无數言情之作不及此五字寫盡九二包有魚无咎不利賔象曰包有魚義不及賔也九二剛而得中切比于初陽大隂小則包之包之而視初魚也則有魚矣魚隂類巽亦為魚夫嘉魚罩罩何咎但初六之女壯女也壯女入門不嚴内外乃使大享見賔恐難保其貞矣則象之所謂不利賔者豈曰魚不利于賔哉亦以二既包之義不可再及于賔耳賔指四四與初正應今二既包初二為主遂視四為賔矣九三臀无膚其行次且厲无大咎象曰其行次且行未牽也九三即夬之九四也故亦臀无膚其行次且然而不同矣五陽之所遇者皆初隂也而三獨緩行而不與之牽焉惕厲以處自鮮大咎初之牽自牽也此之未牽不牽乎人也此在姤時而可以不姤者故夬之次且以不當而不明此之次且以未牽而无咎也九四包无魚起凶象曰无魚之凶逺民也四與初則正應矣乃以不中不正致初之魚為九二所有而九四之包反无魚焉隂為女亦為民夫本吾民而逺之使歸他人凶得不起乎此當姤而不能姤者九五以杞包瓜含章有隕自天象曰九五含章中正也有隕自天志不舍命也自二視初魚也而自五視之二為杞虞氏易巽為杞初隂蔓延地下如瓜二變艮亦為果瓜是杞栁包瓜也杞栁可為桮棬二五皆中而五居尊位則杞包𤓰者五以之也夫九五剛遇中正而包隂瓜隂陽相間文章燦然包之則含之何者瓜之在地乃自天而隕者也與夬反對自見天命也天命如此九五之志自奉天而不違矣程𫝊舍違也之以爻而曠觀漢唐九五之君因時成事不待言矣即孔子志懐三代之英然秦之一隂巳生于下孔子可違天哉亦刪詩訂禮起漢唐之豪傑包漢唐之隂衆耳是志不舍命也上九姤其角吝无咎象曰姤其角上窮吝也上九亢陽于上角也隂遇之牴觸而不合豈不吝而有疵然卓立難近何咎此以極剛而待隂之過者世外之髙士也姤隂始生緩行而不與牽一道也角觸而不使近又一道也包魚而閑制之使不及賔又一道也以杞包瓜品物咸章又一道也或地位不同或徳行各異而厪女壯之慮則一也惟既應之而又不能包之致使為他人用以起凶災此為下耳坤下兑上萃亨王假有廟利見大人亨利貞用大牲吉利有攸往彖曰萃聚也順以説剛中而應故聚也王假有廟致孝亨也利見大人亨聚以正也用大牲吉利有攸往順天命也觀其所聚而天地萬物之情可見矣萃者聚也何為而聚也人情逆則不聚忤則不聚偏而无從則不聚今坤順而兑悦九五剛中而六二應之聚之故瞭然矣故王假有廟者聚精神孝聚品物享以聚祖考也渙之假廟立廟之始此之假廟亨廟之成利見大人亨者三隂在下而承九四以見九五其聚以正也用大牲吉利有攸往者天命既聚非二簋應損之時故順天命而備物以祭攸往咸宜也夫天命不可度也人心莫知其鄉也羣生至衆也程𫝊羣物至紛也而聚合總攝乃至于此此其中有情焉咸則其情通恒則其情久萃則其情聚然則天地萬物之情不于所聚而可見哉九五王也互艮為闕為鬼㝠門宗廟也坤為牛大牲也五居天位互巽為命天命也象曰澤上于地萃君子以除戎器戒不虞澤萬物之所説也而在坤地之上坤為衆非萃乎聚戎器而修之除更新也以備不虞萃道之大者𫝊曰國之大事在祀與戌初六有孚不終乃亂乃萃若號一握為笑勿恤往无咎象曰乃亂乃萃其志亂也此萃之始也卦象大坎本有孚然居于初位尚未終也故其志疑惑不定乃亂而散乃萃而合此豈可者苟能爻變為震震為鳴號大呼上卦之陽艮手相隣一握而進雖震為喜笑容有笑其往之急者而勿恤也惟一意于往而聚則无咎耳六二引吉无咎孚乃利用禴象曰引吉无咎中未變也二則彖之所謂應乎五者執持中道不變其心即孚也以艮手牽巽繩引羣而拱剛中二居中則初六六三皆可引之吉又何咎且當萃之時孚誠以用夏祭不亦利歟禴夏祭名周禮宗伯以禴夏享先王是也下卦離位故為禴祭六三萃如嗟如无攸利往无咎小吝象曰往无咎上巽也六三當萃之中故萃如而處上下之間无有正應則又嗟如大坎加憂亦為嗟是无所利也惟往而上見乎五雖應非其正不免小吝然上互為巽三五同功固其宜也又何咎焉此聖言以互體示人者九四大吉无咎象曰大吉无咎位不當也四本多懼而爻以陽處隂位復不當然在萃時不擅尊位退處隂小使下之三隂皆往於五正以位不當而大吉无咎矣觀九五曰萃有位可明九五萃有位无咎匪孚元永貞悔亡象曰萃有位志未光也乃五則萃有位矣又有何咎然萃與比相似而不同比不寧而建國初起之君也萃假廟而戒不虞成業之君也業成志或不光如唐太宗末年漸荒漢之景帝致七國之變是也又比惟九五一陽故五隂之比顯然明白萃四五兩陽則九五之剛中反居大坎之偏與離光相背其孚乎四隂者或有時而匪孚矣悔矣亦如比之元永貞乃悔亡耳上六齎咨涕洟无咎象曰齎咨涕洟未安上也萃之終而乃有不得萃者焉淺義曰齎持遺人也咨嗟嘆聲兑口象涕目液洟鼻液兑澤象以柔上乘五剛非萃之道故持此咨涕洟以致其不安之意于五而求萃也亦无咎矣天下大萃之時而初六乃有孚不終乃亂乃萃矣六三萃往而有嗟矣上六欲萃而涕洟矣所謂修已以安百姓堯舜猶病也九五之大人乃不光而元永貞焉豈其可哉巽下坤上升元亨用見大人勿恤南征吉彖曰柔以時升巽而順剛中而應是以大亨用見大人勿恤有慶也南征吉志行也升者何也上卦坤為地下卦巽為木地中生木木之初柔為卦主以時而上升也故六爻為初六稱大吉以其為升之主也或曰巽從坤交當曰柔以時下不當曰柔以時升不知卦自名升初六之升乃坐全卦象而言非就一爻往來言也其徳巽而順其體九二剛中而五相應升而大亨非是之故歟故大坎為恤而六五用見九二之大人則隂陽㑹合有慶而勿恤矣且升即征也巽位東南坤位西南皆南也于此而征則志行矣吉矣周易玩辭謂升自臨變推易圖亦載升為臨之初移三則當曰剛以時升矣與經文不合故本義不得巳取解仲氏易不得巳専取小過則其言曰臨觀者二陽卦之正易也乃有不通可乎亦可見卦變推易之不與聖經比附矣柔以時升與大壯大者壯也等辭同本象自明不必他牽象曰地中生木升君子以順徳積小以髙大順徳地道也地道生生不窮故木積小而升于髙大焉初六允升大吉象曰允升大吉上合志也參天之柯自兩葉始故初六之升允升也允信也大坎為孚有允象上坤為土以培下木兩志相合其吉何可量者九二孚乃利用禴无咎象曰九二之孚有喜也九二剛中則有孚于五者也升而用禴巽臭肆達巽為臭皇尸載喜利矣何咎禴夏祭也南征故為夏祭九三升虚邑象曰升虚邑无所疑也坤為邑上有坤卦下有坤爻而三剛峙其中有虚象虚同墟説文虚大丘也是虚邑也九三升而漸髙至于虚邑當其在初已允在二已孚此又何疑焉六四王用亨享通于岐山吉无咎象曰王用亨于岐山順事也六四升而愈髙則山矣互兑在西方則為岐山岐山者西方之山也亨祭于岐山順以事之坤為順後遂自侯而王不其升乎王指五也六五貞吉升階象曰貞吉升階大得志也至于六五則大居正而吉又安所升然下與九二應引天下之賢士以升坤土兩排如陟東西階然為天下得人志之大得為何如者上六㝠升利于不息之貞象曰㝠升在上消不富也若夫上六處坤之極真无所升矣而乃晻日晦夜行不休彼㝠迷者坤為迷豈以下有巽利尚欲求富哉不知隂中消索荀爽曰隂用事為消陽用事為息何富之冀然而此意亦有利焉苟易夫求富之心以之體道則不息之貞聖敬日躋昭格于天乃升之極者坎下兑上困亨貞大人吉无咎有言不信彖曰困剛揜也險以説困而不失其所亨其惟君子乎貞大人吉以剛中也有言不信尚口乃窮也隂勝于陽則戰然戰則陽可復猶非困也今坎剛為兑柔所掩九二一剛為二隂所掩本義四五兩剛為上六六三所掩狀似悦陽包陽而實蔽陽于内令其坐而自困此則困也然困于遇不可困于心雖遇坎險而兑悦如故遭困而不失其所所所居之地也則處困而亨惟君子能之夫君子者即大人也二五剛中得正不其吉乎若不知處困之義而徒恃兑口以自解説則困時之言人誰信之窮可知耳象曰澤无水困君子以致命遂志澤在上而水漏于下困竭之象也君子處此則命委于天志遂于巳所謂夭夀不貳修身以俟之也初六臀困于株木入于幽谷三嵗不覿象曰入于幽谷幽不明也卦本以柔揜剛而困然剛不可困也困剛者必將自困故隂爻辭有不祥而陽爻辭无全凶故隂亦困焉坎為臀一陽逼于後卦以下為前上為后比之堅木坎為木堅多心有根株而无枝葉木在地下為根地上為株臀困于此何能上進且不特此而巳坎有重窞而初當最下如幽谷然一入其中則歴坎之盡勢必三嵗不覿王昭素曰自初至四歴三爻為三嵗葢坎與離反故幽而不明耳此卑暗而困者九二困于酒食朱紱方來利用亨祀征凶无咎象曰困于酒食中有慶也亨通享此則富貴而困者坎為酒應兑為口食肉山酒海困而不勝而朱紱之服來加未已二至四為離三至五為巽以離牛之革加之巽股是紱也離南方卦朱色詩曰朱芾斯皇赤紱三百紱芾通字蔽膝也朝祭之服不亦九二中道之慶乎特是酒食薦亨服紱以祭則可敬鬼神而利若以此為推食解衣而欲進而有為則坎陷而凶矣然時勢至此于巳何咎明萬厯時君子正如此六三困于石據于蒺藜入于其宫不見其妻凶象曰據于蒺藜乘剛也入于其宫不見其妻不祥也剛有石象坎有蒺藜象六三正乘下剛則困于石而且據于蒺藜矣及入于坎宫坎為男兑為女而上六不應又入其宫不見其妻不祥而凶孰甚焉此則據非其位而困者九四來徐徐困于金車吝有終象曰來徐徐志在下也雖不當位有與也卦之三陽惟九四有應故其志以斯世斯民為已任見初六之困以為此吾與也駕我金車來而相救坎為車九四乾畫為金无奈以陽居隂位處不當徐徐不前坐為車困則徳不下施不其吝乎然志終不變必及所與如孔子雖困于周流而澤被萬世是也與即斯人徒與之與九五劓刖困于赤紱乃徐有説利用祭祀象曰劓刖志未得也乃徐有説以中直也利用祭祀受福也後半震不成震足前半艮不成艮鼻且俱為兑之毁折則劓且刖矣雖九五得位繫我赤紱而束縛絞急即困于赤紱焉九五與九二敵應互離火性炎上二為朱紱則漸上色輕為赤紱雖然徳中而直乾爻靜専動直豈終困哉徐出言説兑為説説悦通字以達神天祭祀獲福利矣文王之囚羑里而終三分有二也似之上六困于葛藟于臲卼曰動悔有悔征吉象曰困于葛藟未當也動悔有悔吉行也上六亦掩剛而困者巽為木六以柔纒巽木之上是困于葛藟也巽為髙上居巽髙之上是于臲卼也臲卼即杌􅑾不安也然上與初三不同窮則變矣忽而覺曰吾其動乎吾悔矣果有悔也則征行而吉矣征行即動也君子固困窮而通而小人悔掩剛之不當亦可通如此巽下坎上井改邑不改井无喪无得往來井井汔至亦未繘井羸其瓶凶彖曰巽乎水而上水井井養而不窮也改邑不改井乃以剛中也汔至亦未繘井未有功也羸其瓶是以凶也巽為木為入坎為水木入水下而取水在上汲井之象非井乎故觀乎反易困上為兑反于下為巽巽為市邑是改為邑也困下為坎反于上亦為坎剛徳居中坎水通行是井原有不改也來註三隂為井身初井泥四井甃上井收是也三陽為井水二射漏三井渫五寒冽是也井不改則取之不竭无所喪惠而不居无所得但見往而外者坎一井也來而内者大坎亦一井也養人又何窮焉特是井必出水始能養人向使汲水者幾至于井汔幾也而未用其繘于井繘綆也巽為繩綆象忽羸其瓶羸敝敗也毁折下漏離中虚瓶象兑為毁折羸象則无以上水不其凶乎象曰木上有水井君子以勞民勸相如井養然君子也勞來其民勸之助之戒用休董用威勸以九歌初六井泥不食舊井无禽象曰井泥不食下也舊井无禽時舍也初二皆地道而初尤地下井底之泥也其可食乎仲氏易夫井泥而不可食必其久不渫治者也舊井也眢而下缺即巽之雞離之飛鳥亦无反而顧之者禽常近水杜詩鸕鷀窺淺井是也為時所置可知矣九二井谷射鮒甕敝漏象曰井谷射鮒无與也九二井有水矣但毁折之水兑為毁折流于山下變艮為山則井而似谷莊周所謂缺甃之崖是也其水无人上汲惟下注而射于初有射鮒之象焉崔憬曰魚隂蟲也􅀄處井下體又隂爻魚象仲氏易曰鮒小魚也少牢饋食曰魚用鮒十有五而俎言細小也埤雅謂即今之鯽以其相即而行曰鯽以其相附而行曰鮒吕子洞庭之鮒則大魚别一種而且倒兑下缺有似翻壺盛水之甕且敝而漏矣甕即瓶夫汲之必有與之者顧誰與此无應故无與九三井渫不食為我心惻可用汲王明並受其福象曰井渫不食行惻也求王明受福也三居剛乘剛逺于泥而无漏巽為潔齊井之渫去其汚者渫者泄也史記屈原𫝊作井泄是也然水尚在井中而兑口居上或不為人所食者有之清不見亮賢不見收行道之人皆必為我心惻矣于此而用汲引焉庶其可乎夫五王也五與三同功為離離為明王而能明以汲之則共處離位與不共處離位者誰不受福焉宜求之者衆矣仲氏易六四井甃无咎象曰井甃无咎修井也四在互卦離中以離中之火燒坤土坎本坤卦為甓而甃之四傍馬融所謂以瓦治井者修也九五井洌寒泉食象曰寒泉之食中正也仲氏易曰此水繘而上矣坎水正中洌也不泥也寒也坎北寒地也泉也有本也上坎下又坎也食也兑口正向也上六井收勿幕有孚元吉象曰元吉在上大成也上六井上見口如井韓然收也按韓説文井垣也即今井口上榦也所以收井者故謂之收畫井即取其形故蘇軾𫝊曰收者甃之上窮也井收得母幕之乎幕葢井具也夫往來井井取之不禁又何幕為井口仍見上缺是勿幕也出坎之孚而得大吉井養于是乎大成矣周易𫝊註卷三
