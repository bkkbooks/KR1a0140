body:
  text: 周易傳注卷一通州學正李塨撰上經伏羲畫八卦因重而成六十四卦夏首連山艮也殷首歸藏坤也周文王乃以乾為首分上下二篇故曰周易經者後儒所加也前漢孟喜傳云上下二經乾下乾上乾元亨利貞此文王繫辭所謂卦辭亦謂彖辭仲氏易曰重卦皆伏羲作漢晉説易皆然惟鄭康成淳于俊屬之大禹司馬遷揚雄皇甫謐屬之文王然大傳云八卦成列因而重之及下文伏羲作八卦下即以益渙等實之則重卦羲作也注疏亦云乾知大始則元專直暢達則亨一無險滯則利何所間何所移則貞皆乾之象也仲氏易曰乾健祇一德而分之有四元始亨通利和貞正子夏傳健德備焉魏徵曰始萬物為元遂萬物為亨益萬物為利不私萬物為貞詳具彖傳文言卦爻之象與占不可分繫辭傳曰設卦觀象六十四卦皆象也繫辭焉而明吉凶六十四卦之辭皆占也平居所玩之辭即卜筮所玩之占也故曰彖者言乎象者也易者象也蓋文王周公所繫之辭皆象也而遇其辭者即以為占焉本義分象占為二則聖人明曰彖以言象而首乾卦元亨利貞四字祇論占不設象謂之何耶潛龍勿用觀下象傳曰潛龍勿用陽在下也文言曰潛龍勿用下也潛龍勿用陽氣潛藏明作一句讀明以無用即指潛龍言今分潛龍為象勿用為占毋乃非經旨乎如坤初之履霜堅冰至上之龍戰于野明明皆象不可言占朱子亦以為占即在內然則他卦他爻又何必分象占乎且占亦無定矣如明夷初九以于飛垂翼為象于行不食有言為占則占出行者可也而占鳥雀者不又當以于飛垂翼為占而于行不食有言為象乎何以分焉初九潛龍勿用此為爻辭亦為象辭史記日者傳曰伏羲作八卦文王演三百八十四爻而馬融等又云周公作爻辭卦從下而上故下爻為初周易陽爻曰九陰爻曰六者九為老陽六為老陰以用言也下文用九用六正釋此也即大衍其用四十有九之用也易以卜筮周易占變爻老變而少不變故用九六也筮法三變挂扐者十三䇿為老陽餘三十六揲以四凡九故名九挂扐者二十五策為老陰餘二十四揲以四凡六故名六天下之物莫健于龍故借龍以象陽馬融説而無如其尚在地也大傳三才以初二為地道鄭康成曰初在地下二在地上潛也勿施用也詳具象傳文言按繫辭傳曰爻者言乎變者也又曰道有變動故曰爻故蔡墨曰乾之姤潛龍勿用遊吉曰復之頤迷復凶朱震易傳載陸績曰陽在初稱初九去初之二稱九二則初復七陰在初稱初六去初之二稱六二則初復八卦畫七八經書九六七八為彖九六為爻四者互明聖人之妙意也故蘇軾亦言卦主靜爻主動是爻論變古法也然而玩索爻辭論變者十一二不論變者十八九何也以卦有材則爻亦有材聖人辭象其材以待占者本爻之爻互舉對勘則變化無窮若必每爻先立變辭則一卦變六十四卦雜賾莫舉不可以為六爻辭矣焦氏易林每本卦辭外復立六十三辭正演爻變也九二見龍在田利見大人地上為田龍在此見矣二于三才為人道陽大陰小故曰大人而人利見之九三君子終日乾乾夕惕若厲無咎來注若語助辭厲危也三于三才兩之為人道以乾德而居人道君子之象詩疏曰德可君國子民曰君子下三爻離位以陽陰陽也仲氏易曰下三爻離位上三爻坎位爻純則見離日在下卦之終終日之象夕象下乾終而上乾繼乾乾之象乾乾則心不懈惕象九陽爻三陽位過剛不中而位又多凶繫辭傳故厲然乾惕而不息何咎之有顏習齋先生曰舊解乾乾惕若為晝夜惕厲未析也終日乾乾者晝則習行子臣弟友禮樂兵農之事也文言曰終日乾乾行事也可見夕惕若者夜無事作則用操存省察之功也九四或躍在淵無咎或躍在淵者言龍有時躍于淵中以試其可飛否也上三爻坎位以陰陽陰也故有淵象人位而近于天故有躍象天人之間故有或象然隨時進退何咎九五飛龍在天利見大人龍在天位飛矣哉盛德大業萬物利見焉來注六畫之卦五為天三畫之卦五為人苗氏名敏榮山西人獨得解曰凡卦有主爻乾以五爻為主故初遠五言潛四近五言躍上過五言亢上九亢龍有悔爻極于六故六爻曰上觀此則宋人謂有七爻以後卦者妄也上雖天道而位過乎中龍之亢者也亢人頸也高也來注蔡澤所謂信而不能絀往而不能返者也故有悔悔則變矣用九見羣龍無首吉羣龍指六爻也六陽爻皆龍也乾為首無首不見其首也用九以見羣龍無首為吉者老陽則變陰也用六利永貞大終者老陰則變陽也卜筮之道也天時人事之宜也舉此義于乾坤二卦而他卦無者本義謂為六十四卦之通例是也觀蔡墨以用九為乾之坤自兼六爻皆變言彖曰大哉乾元萬物資始乃統天仲氏易曰此孔子贊易文也舊名十翼以上彖下彖上象下象上繫下繫文言説卦序卦雜卦為十篇宋邢璹稱七翼朝以道偽造古易謂孔翼八篇非是第漢田何易原離二經與十翼為十二篇至東萊費直始合十翼附之經以代章句今本乾卦是也其後鄭康成倣馬融周禮注例就經列注于是復分彖象諸傳附之經下今本坤後六十三卦是也文王演易卦下所繫辭原名彖辭在爻下者原名象辭故孔子彖象先儒謂之彖傳象傳彖傳曰材也王輔嗣曰統論一卦之體也此以天道釋乾之元也元統四德則統天矣雲行雨施品物流形萬物亨通各見品形故曰品物大明終始六位時成時乘六龍以御天此聖人之元亨也本義六爻之位以時乘之易者時也孟子論孔子曰始條理者智之事也故以大明終始為聖人之元而時乘以亨之統天者乾元統天德也御天者聖人行天道也乾道變化各正性命保合太和乃利貞亨通之後而變變化化萬物各正性命保之合之以翕太和利貞也此天道也首出庶物萬國咸寧此聖人之利貞也本義象曰天行健君子以自強不息先儒以此卦象傳為大象下爻象傳為小象天一日夜行三百六十五度四分度之一而越一度何其健也大象皆取天地雷風水火山澤之物象不必與彖爻一義觀剝山附于地與彖柔變剛不同大過澤滅木與彖大者過也不同可見也潛龍勿用陽在下也陽體在下故潛故勿用見龍在田德施普也德施不普者豈見龍哉終日乾乾反復道也行而反又復之無時離道也乾乾也或躍在淵進無咎也量可而進飛龍在天大人造也造作也亢龍有悔盈不可久也不可久故悔而變用九天德不可為首也為首見其首也必不為首乃以首出文言曰元者善之長也亨者嘉之會也利者義之和也貞者事之幹也孔子釋文王所言故名文言仲氏易不言周公者統于文也亨者禮之三千三百嘉美之聚會也利者義之安且慊也知而弗去事依以立猶築牆之以為板為固也以下皆覆贊彖爻之言君子體仁足以長人嘉會足以合禮利物足以和義貞固足以幹事君子行此四德者故曰乾元亨利貞長帥也帥人而養之教之也因物之所利而利之義何弗和初九曰潛龍勿用何謂也子曰龍德而隱者也不易乎世不成乎名遁世無悶不見是而無悶樂則行之憂則違之確乎其不可拔潛龍也隱即潛也以下皆釋潛也不易易變也謂轉移世道也乎世則遁世不成乎名則不見是無悶而曰憂者世自可憂我自無悶也樂行帶言也九二曰見龍在田利見大人何謂也子曰龍德而正中者也庸言之信庸行之謹間邪存其誠善世而不伐德博而化易曰見龍在田利見大人君德也龍德而正中以九在二位也以下庸言五句皆釋正中之見也乾為君九二之德備矣刁氏名包字蒙吉祁州人易酌曰乾實有誠象坤虛有敬象皆于二之人位見之項安世周易玩辭曰稱中正者二事也二五為中初三五陽位陽爻當之二四上陰位陰爻當之為正稱正中者一事也猶言兌正秋也凡卦有九五者皆稱中正以其備二美也獨需彖及比巽九五稱正中者重中也艮之六五中不正而言中正者中可兼正也九三曰君子終日乾乾夕惕若厲無咎何謂也子曰君子進德修業忠信所以進德也修辭立其誠所以居業也知至至之可與幾也知終終之可與存義也是故居上位而不驕在下位而不憂故乾乾因其時而惕雖危無咎矣實心實事所以進德文謨有物所以居業三居下卦之上在上卦之下知上尚有可至是知至也從而至之則乘幾圖進故曰可與幾知下已處其終是知終也從而終之則以義命自處故曰可與存義是故進而不怠又何驕處而不援又何憂九四曰或躍在淵無咎何謂也子曰上下無常非為邪也進退無恆非離羣也君子進德修業欲及時也故無咎湯武之應天順人時至勿失即進德修業也來注曰上進釋躍下退釋淵無常無恆釋或非為邪離羣釋無咎九五曰飛龍在天利見大人何謂也子曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物覩本乎天者親上本乎地者親下則各從其類也大人造而天地效靈萬物樂應是同聲同氣以類相從自然之應求也觀之水火雲風親上親下之族可見矣覩見也正訓萬物利見乎大人也上九曰亢龍有悔何謂也子曰貴而無位高而無民賢人在下位而無輔是以動而有悔也仲氏易曰在上則貴失位陽居陰則無位上而失位則高而不能君其民三之君子二之大人皆隔處下卦乘而不應而不為之輔故動而有悔潛龍勿用下也陽在下以體言下專以位言見龍在田時舍也仲氏易曰舍次也言暫次于此終日乾乾行事也曰行事則非後儒之講學徒口耳者可冒矣或躍在淵自試也試即虞書試可之試必試而後知其可也飛龍在天上治也本義曰居上以治下亢龍有悔窮之災也窮盡也盡則無復之矣是災也乾元用九天下治也元統四德故但曰乾元潛龍勿用陽氣潛藏易陰陽言氣偶見此理氣心性後儒之習談也易則不多言氣惟曰乾陽物坤陰物又曰百物不廢懼以終始論語以仁知孝弟禮樂為道偶一及心一及性而無言理者惟曰敬事執事敬唐虞于正德利用厚生曰三事成周于六德六行六藝曰三物與後儒虛實大有分矣見龍在田天下文明易小傳曰九二變離之同人天下文明之象終日乾乾與時偕行際上乾下乾之時而不乾乾焉負此時矣或躍在淵乾道乃革本義曰離下而上變革之時飛龍在天乃位乎天德召誥所云王位在德元也亢龍有悔與時偕極時雖至十宜以七八處之而乃與之偕極乎君子違時挽時以為因時者此類也乾元用九乃見天則則凖則也乾元者始而亨者也利貞者性情也乾始能以美利利天下不言所利大矣哉乾始以生物為性情故物成乃見仲氏易始而必亨利物不言本義云不言所利者貞也元亨利貞祇一元也四德祇一德也此又覆贊彖辭大哉乾乎剛健中正純粹精也趙汝梅周易輯聞曰剛者一陽爻之稱卦具陽爻者有之健者經卦乾之稱卦遇乾者有之二五之謂中九五之謂正諸卦所同也兩卦不雜曰純八純卦是也剛柔不雜曰粹乾坤是也坤之爻二乾之爻一故精則惟乾所獨卦爻之德凡七諸卦不能備獨乾備之此乾之所以為大也六爻發揮旁通情也陸績曰發揮變動將旁通于坤以成六十四卦時乘六龍以御天也雲行雨施天下平也聖人渾一乾矣御天而行如雲雨之布澤天下焉有不平君子以成德為行日可見之行也潛之為言也隱而未見行而未成是以君子弗用也夫潛之勿用豈不可用哉君子以成德為行固無日不可見之于行而乃弗用者以潛耳行而未成如楊椒山雖行居位而未成其行亦不可輕用也以下又覆贊爻辭君子學以聚之問以辨之寬以居之仁以行之易曰見龍在田利見大人君德也學聚問辨博學于文也寬居仁行約之禮也九三重剛而不中上不在天下不在田故乾乾因其時而惕雖危無咎矣此釋厲也重剛下乾接上乾也九四重剛而不中上不在天下不在田中不在人故或之或之者疑之也故無咎此釋或與無咎之故也九四居人之上故曰中不在人來注曰重剛不中之中二五之中也中不在人之中六爻中間之中也疑擬議也夫大人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時天且弗違而況于人乎況于鬼神乎此釋九五之大人也天一物也而萬物皆天乾一卦也而八卦皆乾故大人體乾出治天且弗違而無往不合有如此者合吉凶謂福善禍淫也聖人有作旋乾轉坤先天而天弗違也天地之道有開必先後天而奉天時也亢之為言也知進而不知退知存而不知亡知得而不知喪其惟聖人乎知進退存亡而不失其正者其惟聖人乎進退身也存亡所據也得喪所圖也知退則進矣知亡則存矣知喪則得矣貞下起元自強不息聖人之正也用九之道也坤下坤上坤元亨利牝馬之貞君子有攸往先迷後得主利九家虞氏漢後説易諸家皆先迷句後得主利句西南得朋東北喪朋安貞吉坤地也順也地承乎天以生萬物則乾曰元亨利坤亦曰元亨利特乾為龍為馬坤亦馬也而牝矣故其貞也曰牝馬之貞夫坤之利貞觀之君子矣君子法坤攸往必所趨有時而所向有方所謂時先後是也行每求先而陰不可先先必迷也所謂坤為牝為迷是也行不可後而陰則必後以陽為陰主後乎主則得所主也所謂先失道而後順常是也此其利也乃其方則有東北有西南西為兌南為離皆陰類也得吾朋也東為震北為坎皆陽類也喪吾朋也然天下得喪何常惟貞是安吾往亦欲得吾主耳先則失主後則得主西南則失主東北則得主然則西南之所得者祇其類耳非主也東北之所喪者去其類耳乃有主也終有慶也婦人之道以順為正攸往之宜得主而不得朋苟安于是是牝馬之貞也何有勿吉仲氏易蓋乾之利貞自主而已坤則以得主為利喪朋從主為貞所謂柔順也故以君子覆釋利貞之德焉彖曰至哉坤元萬物資生乃順承天仲氏易曰坤元合天而即能以發萬物者資始育萬物資生是其合之乃所以順承之也至與大對大者無外至則無間坤厚載物德合無疆含𢎞光大品物咸亨此所謂亨也天有無疆之德而坤合之含能容光能徹𢎞則不狹大則不細皆厚也牝馬地類行地無疆柔順利貞牝馬柔順故與地類而行地無疆焉是柔順乃坤之利貞也君子攸行先迷失道後順得常西南得朋乃與類行東北喪朋乃終有慶安貞之吉應地無疆地合天君子應地無疆一也象曰地勢坤君子以厚德載物地勢高下邐迤一何順也惲臯聞曰兩坤高下纍積故曰勢初六履霜堅冰至象曰履霜堅冰陰始凝也馴至其道至堅冰也一陰始凝履霜象也而堅冰隨至可畏哉宜辨之早也馴順習也六二直方大不習無不利象曰六二之動直以方也不習無不利地道光也坤至柔而動也剛直也至靜而德方方也含萬物而化光大也沈氏説而歸之六二者乾為天以九五中正而當天位為主爻坤為地以六二中正而當地位為主爻故不必觀重卦而知其利也六二已無不利矣習者重也易習坎書不習吉六二之動者爻以動而後可見也六三含章可貞或從王事無成有終象曰含章可貞以時發也或從王事知光大也仲氏易曰時至三爻物將成章矣坤為文章也坤以含𢎞之德蘊其菁華而發之以其時則三位雖不正而由是以正貞正也不亦可乎坤為臣道即以臣言縱勞于王事不敢專成然光大之知必能終事蓋三居重坤之中其于全卦固未成也所謂無成也然而內卦之坤于此終焉則有終者也此臣道即地道也含章故知光大六四括囊無咎無譽象曰括囊無咎愼不害也六四以外陰而接內陰又陰居陰位坤為囊九家易陰主閉塞故如括囊者然括結也不得摘以過不得加以譽以咎譽皆害之招也愼如此可以不害矣四多懼故愼六五黃裳元吉象曰黃裳元吉文在中也坤為黃為裳九家易為文左傳昭十二年子服惠伯曰黃中之色也裳下之飾也元善之長也中美能黃上美為元下美則裳仲氏易曰此坤中之君王宮之后下國之侯也元吉者坤元之吉玩辭曰六三六五皆以陰居陽者也陰陽相雜為文故有文章之象而文言皆以美釋之上六龍戰于野其血玄黃象曰龍戰于野其道窮也陰盛則窮陽必與爭戰者爭也陽者龍也説卦曰戰乎乾非乾陽不戰矣二氣相薄勢必兩傷故其血玄黃戰于卦外野之象用六利永貞象曰用六永貞以大終也大者陽也變而從陽則永貞矣王弼注曰以剛健而居人之首則物之所不與也以柔順而為不正則邪佞之道也故乾吉在無首坤利在永貞文言曰坤至柔而動也剛至靜而德方後得主而有常含萬物而化光坤道其順乎承天而時行陰動合陽故動也剛石介曰當其生物也孰可禦之是動剛也以下亦覆贊彖爻之言積善之家必有餘慶積不善之家必有餘殃臣弒其君子弒其父非一朝一夕之故其所由來者漸矣由辨之不早辨也易曰履霜堅冰至蓋言順也來注曰順即馴也玩辭曰坤德在順初六獨惡其順者以其非順乎陽乃自順其陰也直其正也方其義也君子敬以直內義以方外敬義立而德不孤直方大不習無不利則不疑其所行也敬以直內正心也義以方外修齊治平也所以合乾也玩辭曰不孤訓大也陰為小陽為大陰與陰相守則孤孤則小陰從陽則不孤不孤則大陰德之無可疑而利者也陰雖有美含之以從王事弗敢成也地道也妻道也臣道也地道無成而代有終也六二正矣六三終之所謂含萬物而化光者于此見焉代終代天終事也天地變化草木蕃天地閉賢人隱易曰括囊無咎無譽蓋言謹也天地變化無知之草木亦變而蕃天地閉塞先覺之賢人必謹而隱君子黃中通理正位居體美在其中而暢于四支發于事業美之至也黃坤之正色也地有脈絡故曰理坤順得中理無不通是美在其中也暢四支而發事業則正位居體之事位五也體六也陰疑于陽必戰為其嫌于無陽也故稱龍焉猶未離其類也故稱血焉夫玄黃者天地之雜也天玄而地黃陰盛似陽則陰不安分陽不能甘勢必相戰然以陰抗陽不可以訓也故戰不稱牝馬而稱龍若龍起兵端者然陰雖盛豈能離陰類乎故傷不稱氣而稱血以血陰類也陰陽之物皆有氣有血而氣陽類血陰類乾下五爻皆與之惟上九戒以過亢坤二爻中正三爻代終五爻黃中為合坤道初則欲其辨于始四則欲其謹于中至于上窮則天地兩傷世道懍然大變矣蓋乾坤雖兩相配合而天尊地卑陽大陰小陽勝陰則治陰抗陽則亂且專玩乾則陽為主而陰包于內故反覆贊嘆不盡其盛專觀坤則陰為主而陽列于旁故分爻指目多覺可危聖人之情已見于乾坤辭矣震下坎上屯元亨利貞勿用有攸往利建侯彖曰屯剛柔始交而難生動乎險中大亨貞雷雨之動滿盈天造草昧宜建侯而不寧震下坎上曰屯者屯草句萌曲屈也以乾剛交坤柔始交得震而再進為坎為險為陷難以生也曰元亨利貞者在險中而能震動大亨以正之道也利建侯者下雷上雨動蕩滿盈乃天道肇造陰陽相薄萬物句萌草創冥昧之際必宜有乘乾出震者建之以參贊天地震動勞坎宏濟時艱不自寧息也元亨解大亨不如乾之訓始者萬物資始惟乾有之也屯則磐旋邅回故勿用決躁而往雷震百里諸侯之象白虎通屯之彖曰動乎險中象曰雲雷屯蒙之彖曰險而止象曰山下出泉蒙以下諸卦其義其辭皆上下分兩卦觀明是聖人當日一作八卦再因重為六十四卦焉有邵堯夫八分為十六十六分為三十二三十二分為六十四之説耶又安有朱漢上乾坤一交為姤復再交為臨觀之説耶象曰雲雷屯君子以經綸雲雷屯象經以象雷之動綸以象雲之合初九磐桓利居貞利建侯象曰雖磐桓志行正也以貴下賤大得民也八卦正位震在初離同坤在二艮在三巽在四坎同乾在五兌在六漢儒説也卦之所謂利貞建侯者正指此爻也故爻以其屯難之始曰磐桓不進磐同盤曰利居于貞而象傳直斷之曰雖磐桓志行正也陽貴陰賤以震陽下陰在下卦下二三在應爻下四大得衆民初為民主互坤為衆為民得民則君矣故利建侯六二屯如邅如乘馬班如匪寇婚媾女子貞不字十年乃字象曰六二之難乘剛也十年乃字反常也六二陰爻為女與五為正應進當適五然初爻陽剛而二乘之則乘乾馬震亦為馬為其所繫屯如邅如兩顧班如班如班荆班馬兩分也亦何能進然詳觀之九五屯膏未光不王而寇諺云成王敗寇坎為盜寇象而初九居貞則非寇也剛下于柔男先于女昏禮男先求女以貴下賤實婚媾也故二雖以初非正應守貞不字至于邅回十年數窮理極乃終許于初焉字者許嫁而字也見曲禮夫二與五應常道也字初則反常矣管仲之于桓公似之按卦爻言日者近之辭言年歲者遠難之辭計數以三者卦爻終于三上下卦之應亦間以三也又言七者因重之卦終于六七則復矣故七皆吉辭至于數之極者乃言十卦上爻乘下爻曰乘如屯六二乘剛也下爻承上爻曰承如蠱初六意承考也初與四二與五三與上其陰陽相抗者曰敵如艮上下敵應相配者曰應如恆剛柔皆應之類六三即鹿無虞惟入于林中君子幾不如舍往吝象曰即鹿無虞以從禽也君子舍之往吝窮也六三陰柔不中不正又無應與本義而躁動之性妄見震鹿見虞氏易遂欲即之然三居人道當為虞人而變坎隱伏則無虞矣無虞何以從禽惟外坎藂棘九家易相比驅而入之君子見幾以為與其震動毋寧艮止若不舍而往徒吝窮耳吝則窮矣易吝與悔對悔將改也吝不肯改也如吝財者之出入艱難也有以羞解者吝嗇則羞澀矣六四乘馬班如求婚媾往吉無不利象曰求而往明也六四之陰與震初之陽相應乘之固宜特五剛相比應初頗遠則亦有乘馬班如之象然而初九我之正應而能屈已下賢者也其來求婚媾也往而從之吉無不利可坐決矣卦體一至五為大離離火上明故明于擇主如此九五屯其膏小貞吉大貞凶象曰屯其膏施未光也九五身已居尊而坎雨稱膏虞氏説則其膏也但卦義屯聚屯邅爻在陷中反乎離光雖亦有所施而出納吝嗇未能光大如黃金一付不問出入者以此為小正之事猶可若為大正之事旋乾轉坤吾未見刓印不與者之能圖大也凶上六乘馬班如泣血漣如象曰泣血漣如何可長也上六乘九五亦馬也坎亦為馬然五不足依而六三不應初復隔遠則乘馬班如安所適從且以陰柔居屯極險極為加憂為血水泣血漣如不能長矣六爻當屯之時一出而濟世安民一有所從而屯邅一妄動而取困一明于所從而吉一位己尊而吝澤以敗一莫適所從終底于亡陽君也陰臣也故初陽五陽皆自立之象二陰四陰六陰皆從人之象惟六三以陰居陽遂欲妄動而豈得哉聖象明切如此乾坤立本圖六十四卦無出八卦者八卦無出乾坤者繫辭傳于取益取渙諸辭上惟曰始作八卦又曰乾坤其易之縕耶乾坤毁則無以見易而六十四卦凡陽爻皆稱乾之策凡陰爻皆稱坤之䇿可見也特論爻則專稱剛柔以剛即乾柔即坤也故曰乾剛坤柔又曰剛柔者立本者也宋程頤曰乾坤交而為六子八卦重而為六十四皆由乾坤之變蘇軾亦謂易有剛柔往來上下之説學者沿是爭推其所由變此大惑也剛柔相易皆本乾坤而已至明何楷因有乾坤主變一圖李挺之朱震諸圖亦知本之乾坤但為姤復等所亂耳較先儒卦變諸説甚長特其所謂本之乾坤者不本八卦三畫之乾坤而專觀重畫本卦之剛柔且以上下卦畫為往來則隨之剛來而下柔為乾上畫來坤初畫往蠱之剛上而柔下為坤上畫來乾初畫往等有合而于四陽四隂之卦如訟曰剛來而得中晉曰柔進而上行則上下卦畫并無往來不能一律相合是尚有所礙也今更定此圖有當從本卦觀者如賁柔來而文剛分剛上而文柔之類是也蓋賁本取剛柔相間為文故以本卦觀也有不必從本卦觀者如訟剛來而得中之類是也訟但取乾之索為坎居下卦得中故訟不成不須來自上卦且上卦乾爻未有移動不可曰自上卦來也有從反易觀者如復反剝曰剛反序卦曰剝窮上反下受之以復無妄反大畜曰剛自外來而為主于內之類是也有于本卦觀諸爻剛柔不專指一爻者如剝柔變剛巽柔皆順乎剛之類是也而剛柔立本則一也詳具各卦下乾坤父母乾坤此卦本也繫辭傳曰乾陽物也坤陰物也陰陽合德而剛柔有體又曰剛柔者立本者也乾坤索而得六子艮坎震皆坤卦而乾交之兌離巽皆乾卦而坤交之説卦傳曰震一索而得男故謂之長男巽一索而得女故謂之長女坎再索而得男故謂之中男離再索而得女故謂之中女艮三索而得男故謂之少男兌三索而得女故謂之少女乾坤自重乾坤繫辭傳曰因而重之爻在其中矣乾坤相重泰小往大來否大往小來凡重卦居下卦為來為下居上卦為往為上行為進諸重卦本乾坤屯剛柔始交而難生剛柔始交指下卦震言也而難生即連上卦坎言蓋因重之卦必以六畫統觀成義也後皆倣此蒙初筮告以剛中也需位乎天位以正中也訟剛來而得中凡言得中者多以坎離言坎二陰之中離二陽之中也師剛中而應比原筮元永貞無咎以剛中也小畜柔得位而上下應之履柔履剛也同人柔得位得中而應乎剛大有柔得尊位大中而上下應之謙天道下濟而光明地道卑而上行天道指艮一剛爻言地道指坤三柔爻言聖言活變如此豫剛應而志行隨剛來而下柔訟之剛來得中從三畫乾卦來也此之剛來下柔則本卦乾坤卦畫往來自有其象聖言隨便指之不拘一格也蠱剛上而柔下臨剛浸而長剛中而應此則六爻合論又不拘一爻往來矣噬嗑柔得中而上行賁柔來而文剛分剛上而文柔剝柔變剛也此亦六爻合論者復剛反動而以順行無妄剛自外來而為主于內以上二卦又從反易觀之而得剛反剛自外來之象者凡易言內外者不一泰之內陽外陰下卦為內則上卦為外兌之剛中柔外又以重卦上三爻為外上上卦之外也三下卦之外也中孚之柔在內而剛得中又以三四為內以在六爻內也大畜剛上而尚賢大過本末弱也坎維心亨乃以剛中也離柔麗乎中正咸柔上而剛下恆剛上而柔下遁剛當位而應此以六爻觀之又取乾中爻與艮二爻相應為義不取三剛之艮止也易象無方如此大壯大者壯也晉柔進而上行睽柔進而上行得中而應乎剛蹇利西南往得中也解利西南往得衆也其來復吉乃得中也此與蹇卦皆以上卦為西南明以坎震為坤卦而乾陽往之損損下益上三人行則損一人一人行則得其友觀言下卦曰三人行明以兌為乾卦矣益損上益下夬柔乘五剛也姤柔遇剛也萃剛中而應此亦舍兑之主爻而取兌之中一爻乾剛未變者與下卦應為義升柔以時升困剛掩也井改邑不改井乃以剛中也鼎柔進而上行得中而應乎剛漸進得位往有功也其位剛得中也歸妹天地之大義也旅柔得中乎外而順乎剛巽柔皆順乎剛兌剛中而柔外渙剛來而不窮柔得位乎外而上同節剛柔分而剛得中中孚柔在內而剛得中小過柔得中剛失位而不中既濟柔得中也未濟柔得中也以上六十四卦惟觀頤明夷家人革震艮豐八卦彖中未及剛柔餘皆見之序卦傳言上下經皆以天地生萬物起正此義也坎下艮上蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞彖曰蒙山下有險險而止蒙蒙亨以亨行時中也匪我求童蒙童蒙求我志應也初筮告以剛中也再三瀆瀆則不告瀆蒙也蒙以養正聖功也山下有險氷焉止而不得流行蒙蔽之象然而曰蒙亨者乃二以亨通之道行時中也坎為通故五以少男而為蒙之正謂之童蒙二以中男而兼互震長男之任因之統諸蒙以授家政是主卦者也則謂之我仲氏易禮聞來學不聞往教則非我求童蒙童蒙求我也求我者何也大離中虛二至上大離坎中實皆有心志之象仲氏易二之與五非強應之志應也然而不可瀆也筮揲蓍也問焉而以言也蒙之叩師如之初筮其志誠二有剛中之德則告之凡筮初得下卦二在下卦亦有初筮之象但至再至三則瀆矣瀆則不告不惟厭其瀆我亦恐以此瀆蒙夫蒙以養正正即貞也作聖之功在此而可瀆乎象曰山下出泉蒙君子以果行育德山下出泉濛濛然蒙也如泉果行通蒙也如山育德養蒙也初六發蒙利用刑人用説桎梏以往吝象曰利用刑人以正法也蒙之在初貴以發之者養之坎為法為桎梏撲作教刑而況蒙稚則用刑以正法斯利耳若變兌為毁折而脫桎梏以往何以發焉吝而己説通脫楊時曰桎梏禁之使無妄適也此嚴父嚴師教于嬰孩之道也九二包蒙吉納婦吉子克家象曰子克家剛柔接也九二以陽居陰剛而得中而坎又能藏垢是以善養子弟包蒙者也何吉如之夫二之應六五之陰柔也豈惟象蒙童亦象婦剛柔相接則納之矣納婦則坎男授室即以克家不又吉歟六三勿用取女見金夫不有躬無攸利象曰勿用取女行不順也夫九二之納婦或以逼近六三之女而亦取之乎用勿取之矣何者彼與二相比見九二陽剛多金乾爻為金見來注遂謂金夫可喜而以上九艮止不能速合因隨水遷流而就下是見金夫不有躬也夫三以應上為順而今行不順矣女與取者皆不利也易小傳曰卦變為蠱有女惑男之象六四困蒙吝象曰困蒙之吝獨遠實也陽畫實卦凡四陰初與三或比陽應陽惟四為獨遠實遠實則蒙無自啓困矣六五童蒙吉象曰童蒙之吉順以巽也六五柔中而惟剛中是應是蒙之未鑿者也童蒙也順者中爻互坤巽者爻變為巽上九擊蒙不利為寇利禦寇象曰利用禦寇上下順也上九陽剛在上其于三之蒙也不惟桎梏且以下石則擊蒙矣艮為手為石有擊象夫蒙之分界甚矣哉養正則聖不正則為娼見金夫不有躬娼也為盜坎為盜見金失躬又盜象遊惰子弟無賴少年至于為寇上必擊之何利之有然上得已哉害于家國凶于其身不禦之不利此先王郊遂寄棘之典所以設也象于見金夫也曰無攸利為寇也曰不利聖人仁蒙而終欲返之見乎辭矣故象傳于不順者終望禦之而上下順焉坤為順六爻初嘗對上二嘗對五三嘗對四觀之則其義易明初可用刑上至用擊二為包而接五五為童而巽二三為見陽而失身四為遠陽而失實諸卦多然終始見于初上而曲折備于中爻也玩辭乾下坎上需有孚光亨貞吉利涉大川彖曰需須也險在前也剛健而不陷其義不困窮矣需有孚光亨貞吉位乎天位以正中也利涉大川往有功也天下事進則進退則退而有欲進而不進者則需以待之也故乾健于行而險難在前不能不待者時也而剛健在已不陷于險者德也卦有四陽固可濟險而九五一陽位乎天位正得其中又為諸陽之主坎實有孚向離光亨其貞吉矣雖坎為大川而乾以知險往涉有功何弗利焉易璇璣曰易之為道非中則正而言正者猶有所謂可正有不可正有不可疾正有利君子正有不利君子正有曰艱正正厲正凶正吝至于言中乃未有言利不利可不可者亦無所謂艱厲凶吝之辭是正有時而不可中無時而不可也象曰雲上于天需君子以飲食宴樂雲上于天而雨未降需象也當飲食宴樂以待之若值需時而躁心妄動及一鬱無聊皆非也初九需于郊利用恆無咎象曰需于郊不犯難行也利用恆無咎未失常也郊遠于水故于此需之而又遲久以待無難乃進則無咎中孚以三四為內繫辭傳以二三四五為中則初上有郊外象同人上九曰同人于郊見訂詁又虞翻曰乾為郊耿氏名極字保汝定興人周易淺義曰不犯難行謂不往應四也不失常謂遲久不應亦終不失陰陽相應之常也爻有有應有無應有有應而不應有無應而應有初不應而終應此類是也九二需于沙小有言終吉象曰需于沙衍在中也雖小有言以吉終也仲氏易曰九二當互兌之始兌于地為剛鹵即沙也兌為説為口舌即小有言也夫沙者水石之交瀕于水矣所恃者二位居中其為寬衍猶在耳楊愼曰衍者寬平之地左傳有昌衍漢書有鄜衍皆此義中以濟險故終吉九三需于泥致寇至象曰需于泥災在外也自我致寇敬愼不敗也郊外當需臨流則渡泥豈可需之地哉今外坎之水逼臨是泥也而乃需于泥焉則坎為寇盜自我致之矣為九三計必乾乾惕若乃可出險不敗耳六四需于血出自穴象曰需于血順以聽也坎為血六四已入坎則需于血矣然柔得其正下與初應順以聽之不激不傾可自穴而出焉坤畫為順仲氏易曰四上為坎之二陰故皆言穴猶坎卦初與三皆言坎窞也易小傳曰坎耳聽之象九五需于酒食貞吉象曰酒食貞吉以中正也君子以飲食宴樂此爻當之蓋九五得中守正故剛健而不陷吉何加焉荀爽曰五互坎離水在火上酒食象也需有二道有需而後平險者如周亞夫堅壘不動待七國之敝而乘之是也有需而其險已平者如陸遜料昭烈有伏兵不往應之而其伏自出是也上六入于穴有不速之客三人來敬之終吉象曰不速之客來敬之終吉雖不當位未大失也上六之位不若九五中正而居險極變巽為入則入于穴矣所幸下應九三而乾卦三陽同體陽主上進則此敬愼不敗者將偕衍在中者不失常者不速而自來上六能敬之則共將出險豈至大失哉淺義曰坎為酒食三陽應之有客象以酒食應客以柔應剛以上應下皆敬象不速即需也初九當久須九二需而寬衍九三不當須所謂需者事之賊也六四始入險順聽一陽即可得出上六已陷險非依衆剛不能終吉惟九五有德有位樽俎廟堂坐待成功建業者不可以不知需也按卦爻之上卦曰往之下卦曰來而屯四之初乃曰往需下卦之上乃曰來蓋以乾坤之重卦而分上下則上卦為往下卦為來以本卦爻之本卦則以我適彼為往以彼向我為來非一義也坎下乾上訟有孚窒惕中吉終凶利見大人不利涉大川彖曰訟上剛下險險而健訟訟有孚窒惕中吉剛來而得中也終凶訟不可成也利見大人尚中正也不利涉大川入于淵也不險不訟險而不健亦不訟訟卦上剛下險則內險而外健矣所以訟也然乾剛來居下卦得坤之中為坎有孚象震坎艮皆坤卦而陽入為主巽離兌皆乾卦而陰入為主兩剛敵應有窒象見淺義窒塞也坎中一陽陷于二陰有惕中象訟者必有情之辭為人所窒而不得伸乃以鳴官且惕然于中不成不終斯吉矣不然必凶九五中正之大人見之訟以平故利若恃其坎險以水浮天則大川深廣滙而成淵一遭風波將墮入矣何利涉之有按漢焦延壽有一陰一陽自姤復五陰五陽自夬剝之説宋人因之為卦變仲氏易因之為推易大約謂一陽五陰之卦皆自復剝而來一陰五陽之卦皆自姤夬而來二陽四陰之卦皆自臨觀而來二陰四陽之卦皆自遁大壯而來三陰三陽之卦皆自否泰而來朱子以為非作易本旨乃卦成後有此象其言近是如兩人對閲高下互分二木相勘枝節參錯為卜筮觀玩之一助亦可而以諸卦自復剝等來則斷不可乾坤生六子一因重之六十四卦皆具焉有師卦自復卦來訟卦自遁卦來之理耶且六子助天地以生萬物者也而震巽坎離艮兌反生自臨觀等卦則傎甚矣以至干寶謂乾之初九自復來乾之九二自臨來諸卦反生乾坤更顚倒淩亂之極矣烏可訓耶至來知德又專歸反對名之曰綜夫反對見于雜卦本屬經意但專以此解往來諸辭則其説有難盡通者如賁與噬嗑反對賁彖曰柔來而文剛來注曰噬嗑上卦之柔來文賁之剛柔指離之陰卦剛則艮之陽卦分剛上而文柔來注曰分噬嗑下卦之剛上而為艮以文柔剛指震之陽卦柔則離之陰卦夫噬嗑上卦為離下卦為震是亦可曰柔文剛剛文柔矣且分字何解猶是一陽二陰之卦祇一倒觀並無移動何以言分象曰天與水違行訟君子以作事謀始天左旋水東注天上浮水下流違行而訟之象作事謀始無違行矣初六不永所事小有言終吉象曰不永所事訟不可長也雖小有言其辨明也初六不永其訟雖以才柔位下亦以訟事原不可長也故雖變兌而小有言然互離在前一辨即明矣九二不克訟歸而逋其邑人三百户無眚象曰不克訟歸逋竄也自下訟上患至掇也九二以剛爻居坎陷之中真險而健者然五剛在上何能訟勝不克固也特幸而剛中尚能出險故歸而逋逋遁也則訟息矣坤為邑坎卦本坤即其邑也三百户者合三爻言之是通一邑之戶也虞翻曰乾為百坤為戶一人好訟則一邑受害三百戶無眚言訟息則安者衆也玩辭否則以下訟上患如掇拾豈能無眚乎眚災也坎為眚六三食舊德貞厲終吉或從王事無成象曰食舊德從上吉也下卦本坤也以剛來而為坎則坎險其新德而坤順其舊德也六三不變故有食舊德而順從于上之象焉不言于初而言于三者三爻之卦至三而成也上即指五言小過六五已上也比六四以從上也皆指五是不訟者也雖居于險地為二所牽其正亦厲然終吉矣故其從王事而無成也與坤之三爻德亦同焉九四不克訟復即命渝安貞吉象曰復即命渝安貞不失也四居互巽亦有何訟而無如其據陽爻而處陰位也則亦一訟人矣第近尊而有應則能出險斷非終訟者故巽而不克訟則必返而聽命曰渝矣渝變也爻變互震有變動意吾改行矣是已安于正而不失矣何勿吉焉即就也謂俯而就聽訟者之命也巽象命令見巽卦故有聽命之象九五訟元吉象曰訟元吉以中正也九五以中正之德聽有孚之訟故訟大吉上九或錫之鞶帶終朝三褫之象曰以訟受服亦不足敬也健而在上訟勝之人也乾為衣為言故當以訟勝受服而應爻互離為腹為革則其所受服或有似乎鞶帶大帶者見説卦及唐氏易來注乾為圜帶象然而終朝三奪之矣何足敬哉應爻互離終朝之象上變兌成困兑為毁折褫象三爻三褫象坎下坤上師貞丈人吉無咎彖曰師衆也貞正也能以衆正可以王矣剛中而應行險而順以此毒天下而民從之吉又何咎矣坤為田土為國邑而險即存乎其間畫溝洫而藏兵衆所謂師也坤為衆水亦為衆而坤又為輿震為車左傳杜注坎為弓為輪皆象兵事且以一陽統五陰正古者五人為伍積而至于五旅為師之象況二在坎為中男又互震而為長男儼然一丈人矣鄭康成曰丈人長人之稱呂東萊曰老成持重諳練之人陽剛得中六五相應出坎險而布坤順則秉軍正以正衆而衆因以正是侮亂取亡兼弱攻昧以此毒天下而民從之也于以王也何有象曰地中有水師君子以容民畜衆容民畜衆廣言不專指兵也陸績曰坎在坤內故曰地中有水師衆也地中衆者莫過于水初六師出以律否臧凶象曰師出以律失律凶也坎為法律否臧即失律也在卦初故言師出左傳宣十二年知莊子曰周易師之臨曰師出以律否臧凶執事順成為臧五陰爻皆坤為順逆為否衆散為弱師本五陰為衆今變其一則衆散而弱川壅為澤坎流水變為兑則壅而為澤有律以如已也言衆各一心律屈而從人故曰律否臧且律竭也竭敗也盈而以竭夭且不整夭塞不流所以凶也不行之謂臨澤在地下不行之象有帥而不從臨孰甚焉帥指九二此不揲蓍而即以之卦解爻辭正所謂爻言乎變者也仲氏易欲主推移遂駁爻變似與古人所言左矣九二在師中吉無咎王三錫命象曰在師中吉承天寵也王三錫命懷萬邦也九二剛中主師上承六五之寵則如周禮一命受職再命受服三命受位者無不錫之何者坤坎為衆萬邦也丈人得而萬邦安錫主帥者即所以懷萬邦也豈有私焉六三師或輿尸凶象曰師或輿尸大無功也仲氏易六三過中不當乃乘剛而為出師之佐上下無應此偏裨致敗之象也坤震坎皆輿而坤又為迷為死全坤在前震動致喪將或敗而輿尸矣有何功焉六四師左次無咎象曰左次無咎未失常也春秋傳三宿為次左次退舍也文事尚左武事尚右古陳圖右在前左在後故以退後為左次兵法知難而退常道也六四陰柔得正則猶能不失常道耳六五田有禽利執言無咎長子帥師弟子輿尸貞凶象曰長子帥師以中行也弟子輿尸使不當也坤為地田也搜苗獮狩不外田中故亦名曰田坤又為兕虎禽也白虎通曰禽者鳥獸之總名田而有禽是有獲也夫田獵所以習兵兵出無名事乃不成故利執言執言聲其罪也無咎互兼畫大震為鼓為言然而師貴有名尤貴擇將使用相應之九二則由全卦視之為丈人而自六五之君視之為長子互震也坎智淵深震勇奮起仲氏易出剛中之德以行誠無咎矣若誤以六三之互坤同體而使之則二既長子次之即弟子矣少不更事往而輒敗雖師出有名而正亦何濟然則使人可不當哉虞氏曰長子謂二震長子也弟子謂三三體坎震之弟乾之子上六大君有命開國承家小人勿用象曰大君有命以正功也小人勿用必亂邦也此用師已畢論功行賞之候也大君謂六五也開國封諸侯也承家立都邑也干寶説或析土地或定采食丈人及其下偏裨凡有功者皆正之然而正之云者不可吝亦不可濫彼失律輿尸之小人斷宜勿用用之則亂邦矣仲氏易以衆正而王之道如此玩辭曰初與四對初出而四退也二與五對二將也五君也三與上對三敗事上成事也以三處險極上處順極也六爻固各有象義然數至五而周位至五而尊上爻結五之意者亦多如此上六之類也坤下坎上比吉原筮元永貞無咎不寧方來後夫凶彖曰比吉也比輔也下順從也原筮元永貞無咎以剛中也不寧方來上下應也後夫凶其道窮也比則吉矣比則有輔矣下之四陰皆順從乎五矣坤為順凡筮初得下卦再得上卦則上卦原筮也原再也禮曰末有原左傳原田周禮原蠶漢書原廟皆是原筮而得九五則剛中為元乾元也以剛居正而堅坎于木為堅多心則永貞是再三籌策而得首出長治之道者也惲臯聞説又何咎焉但見莫敢遑寧坎為勞卦而四方下國坤為國來享來王上下之應有如此者而獨是卦之下畫為前上畫為後上六一陰亦知五之當比而逆而高亢是後至之夫也其道窮矣焉得不凶虞氏説象曰地上有水比先王以建萬國親諸侯物相親比而無間者莫如水在地上下坤互坤皆侯國象初六有孚比之無咎有孚盈缶終來有他易會曰句吉象曰比之初六有他吉也九五為卦主初六之爻純見離而有孚者亦欲往而比五也無咎之道也夫五非初應何以無咎初之應在四今四相敵而不相配則為他矣配則我往而彼來他則不來矣特是初欲比五而四密邇于五以陰從陽早與五比者也坎為缶玩辭曰爾雅小罍謂之坎罍缶類也故坎之六四為用缶苟出我之有孚以盈于六四之缶旁通大有盈象則他必下應相偕而比五矣自四言之為終來自初言之為有他吉矣又何咎六二比之自內貞吉象曰比之自內不自失也二居內卦而比五是比之自內矣夫二之應五正也正故不自失六三比之匪人象曰比之匪人不亦傷乎三以陰柔居不正之位處多凶之地亦上比于五則比中之阿比者矣自傷傷人可歎也六四外比之貞吉象曰外比于賢以從上也九陽為賢天位為上四居外卦而比之是外比之矣四當承五者也往而從之何勿正焉九五顯比王用三驅失前禽邑人不誠吉象曰顯比之吉位正中也舍逆取順失前禽也邑人不誡上使中也夫九五之比非隱芘而私昵也五爻位居正中坎水內光顯然明白以比天下者也如驅田矣三則巳發軍禮也其禽順我而奔去者如南驅而禽從而南奔故曰順則射取之其禽迎我而來者逆迎也則舍置之不殺降也故在前之禽以舍而失注疏而于貉其同之邑人亦不警誡以取前禽焉古禮三殺上殺自膘逹腢次達耳本次自髀達􅞞皆自後射達前是取順也面傷者不獻是舍逆也程傳本義乃臆注三面合圍前開一面去則免之不出而反入者乃射之與易文軍禮俱相左矣蓋民心罔中惟爾之中歸懷之衆主者顯然親之故使民心皆化于中不為已甚吉可知矣坎為狐為弓有驅禽象坤為邑人易小傳曰坎變為坤夷險而為順不誡之象上六比之無首凶象曰比之無首無所終也道窮而比戮斯及矣子夏傳如防風之後至也凡卦初為足上為首聖人于人事欲其行而進故為之計者四卦履晉升漸是也欲其親附為之計者五卦比同人隨萃中孚是也事必濟險為之計者四卦屯蹇渙解是也事成宜保為之計者四卦泰大壯大有豐是也而其事始于夫婦為之計者六卦姤漸歸妹咸恆家人是也其餘多一事一卦矣爻象固隨時不拘而二五多吉辭以中也初多平辭以始也如坤之履霜堅冰至非謂初即堅冰也謂不辨則漸至耳又蒙之利用刑人用脫桎梏師之師出以律失律則凶等皆兩擬之辭上多傾辭以窮也三多凶四多懼以位不中而處上下之間往來多事然四辭每勝于三以懼則不至于凶也乾下巽上小畜亨密雲不雨自我西郊彖曰小畜柔得位而上下應之曰小畜健而巽剛中而志行乃亨密雲不雨尚往也自我西郊施未行也畜訓藏又訓止大畜曰止健是畜大矣大畜者其畜為大則小畜者其畜為小可知也故雜卦曰小畜寡也大者陽也小者陰也即四也四為偶位以偶爻居偶位得位也八卦正位巽在四又得位也且兼互離互兌之陰一位之中三陰並見又得位也仲氏易一得位而上下五陽環而包藏之櫽止之是上下應之矣非小畜而何哉其畜也健而能巽九五陽剛得中而畜陰之志以行爻辭四五合志乃以亨矣試觀我西郊乎我文王自謂也陰陽之氣畜而雲畜而不往則雨今五陽畜陰而三陰之卦俱綴于天密雲之象惲臯聞説而巽一陰為卦主風以散之不雨象尚往猶然往去也故施而未行中爻兌為西方卦有西郊象易纂言曰內外之陽甚多所包畜之陰甚少故卦名小畜象曰風行天上小畜君子以懿文德小畜者風行天上乾天之陽畜巽風之陰也禮樂文物由中發外身之風也故君子懿之懿美也初九復自道何其咎吉象曰復自道其義吉也報答曰復初之與四正應也則其畜陰也乃報答之由其道者也報答即應也道在是義即在是吉矣何咎之有九二牽復吉象曰牽復在中亦不自失也二之畜四非應則非復也而亦曰復者有牽之者也二與初共為地道而陽剛同體則牽而復之在中不失亦吉矣亦以初言初不失則二亦不失所謂牽也三則失矣九三輿説輻夫妻反目象曰夫妻反目不能正室也此不能畜小者也三陽與四陰相比夫妻也然乾為圜有輿之輪象互兌則輪毁折脫輻而不能行矣道德經三十輻共一轂所以搘輪者故視其夫妻夫進于下妻乘其上離為目巽為多白眼反目狀也雖有室不能正之焉能畜之哉六四有孚血去惕出無咎象曰有孚惕出上合志也血陰類憂惕陰象六四孚乎陽則血去而惕出矣是承九五之有孚而上與合志所謂剛中而志行者於戲畜陰至此陰亦善矣互離孚象九五有孚攣如富以其鄰象曰有孚攣如不獨富也五與四同其有孚所謂合志也且復牽巽繩而為之攣攣綴也則四真為所畜矣夫畜者養也聚也養與聚非富不可而五居巽中巽近利市三倍此富者也仲氏易富則能畜乎四矣四五相比比者鄰也君子非財無以轉移小人可獨富哉以用也上九既雨既處尚德載婦貞厲月幾望君子征凶象曰既雨既處德積載也君子征凶有所疑也上變為坎坎為雨則不雨也而今既雨矣且坎為隱伏又既處矣處者畜也處字對往字觀自明向之往而不處者而今既處也畜至上九積乾德而成巽富甌窶滿車坎為車以畜四陰畜不且成耶特是四以巽女而至上剛女也而巳婦矣婦得位而久處以至上剛貞也而亦厲矣其貞厲也殆如月幾望然大離與坎對易坎藏離中離負坎背隱月魄而就日色互光偏上離為互卦與上爻稍近故偏幾望象也仲氏易四陰至此不亦終可畏哉倘君子陽剛過極變坎而疑遂以巽終之躁輕進而與之爭必遭凶矣此小畜所以貴健而巽剛中而志行也君子黨疏故初二欲其牽君子性剛故上九戒其征且九三之不能畜陽在陰下雖反目而不言禍上九之不能畜陽在陰上少有疑而已得凶畜陰之道蓋可知矣兌下乾上履虎尾不嘻人亨彖曰履柔履剛也説而應乎乾是以履虎尾不嘻人亨剛中正履帝位而不疚光明也兌為附決乾主上進而用互巽之股以行履之象也上天下澤高下不紊禮之象也禮者履也今觀其履下兌之柔正互巽之股而上而承乾師剛中而應以上下爻言此説而應乾以上下卦言則進而履者乃以柔履剛也乾西北之卦有虎象焉古人以白虎為右西方獸也虎上為首則下為尾兌三正履虎尾矣然兌為悅和悅而上以應乾虎何嘻焉是涉危地而遜以行禮萬全之道也亨可知矣孔子贊釋至是而復進曰豈特此哉不見九五乎陽剛中正躬履天位而一無疚病向離出治何光明也此履之至也象曰上天下澤履君子以辨上下定民志初九素履往無咎象曰素履之往獨行願也淺義曰履之無飾者素履也初在下為足比應皆無陰陽相間之文故有此象無應而往故曰獨行願蓋禮以質為本始也九二履道坦坦幽人貞吉象曰幽人貞吉中不自亂也九二以剛德居中履行地上二爻在地上坦坦寬平不怨天不尤人中何亂焉紫巖易傳曰二居澤中為幽人六三眇能視跛能履履虎尾嘻人凶武人為于大君象曰眇能視不足以有明也跛能履不足以與行也嘻人之凶位不當也武人為于大君志剛也離為目巽為股皆為兌之毁折眇跛之象也然以柔處剛位居下卦之終巽固多躁而兌亦附決遂不以為不足曰吾能視能履且曳其履之跛者而履乾虎之尾則卦以悅而應乾而虎不嘻人者兹且以位不當而嘻之矣不其凶乎然六三之志豈不剛哉從來武事尚右陰爻兌卦皆武象也離為戈兵為甲胄而居人位﨣然一武人矣若武人有為于大君之事不畏艱不懼死其志固然耳王氏説九四履虎尾訴訴終吉象曰訴訴終吉志行也四己入乾則已為虎尾矣然四為人道與三同才則三履而四亦履之獨是九四以剛居柔又四多懼敬畏而訴訴然所謂臨事而懼終獲其志者也離為志安在虎必不可履哉雖暫時未見其吉終吉耳九五夬履貞厲象曰夬履貞厲位正當也九五以剛卦剛爻而居剛位處于下者和悅而不敢強諍又履與夬相為重易而乃正當九五之尊位則凡行剛決一往無前固屬貞固然亦厲矣明太祖似之彖看不變之全卦九五剛中正故曰履帝位而不疚爻辭則專看一爻且兼變象九五變離則剛者愈燥文言曰火就燥故又曰厲蘇氏易傳謂古之論卦者以定論爻者以變是也上九視履考祥其旋元吉象曰元吉在上大有慶也上九在上苟視下五爻之履卦大離有視象或素或坦或剛或訴或夬考其吉祥者居之則周旋中規折旋中矩大吉而有慶矣禮者恭敬撙節退讓之具也且履剛貴于用柔初位下二四上皆柔位故吉而無咎三五剛位故或凶或厲初以素朴二以貞坦三以任剛四以戒懼五以專決而上九復進以時中履行之狀如繪矣周易傳注卷一
