body:
  text: 周易𫝊註卷四通州學正李􅷊撰下經離下兑上革已日乃孚元亨利貞悔亡彖曰革水火相息二女同居其志不相得曰革已日乃孚革而信之文明以説大亨以正革而當其悔乃亡天地革而四時成湯武革命順乎天而應乎人革之時大矣哉革變革也文王序卦以反易爲次然又有重易而可對見者如睽之與革是也睽爲火澤火炎上而水潤下相違而巳而革爲澤火澤之潤下者必及火火之炎上者必及澤相搏也已而相熄息與熄同即滅也或謂兑澤與坎水不同不可言水則孔子言水火相息非耶二女亦然睽之中女上而少女下雖各有志猶不相害至于革則女兄居下女弟居上孤嫠既不堪而復以晨夕先後短長錯迕之細相對詬誶其勢不至于不相得不止此革之所由名也仲氏易然而天下之事革舊則新理有固然但不極不革湯武行善桀紂行惡各終其日崔憬説巳終也漢晉皆如此解史記凡下事接上事者言巳謂終此事而又為也漢上易𫝊以巳為戊巳之巳謂八卦納甲乾納甲壬坤納乙癸震納庚㢲納辛坎納戊離納巳艮納丙兑納丁不惟納甲之説起于後人且此卦下離謂之納已則蠱卦无乾何以有甲巽卦无震何以有庚不可通矣至訓巳字更于此卦添一庚字或謂庚前一日為巳或謂庚后十日為已不更添設歟人乃曉然信之内文明而外和説大亨以正所革者當其悔乃亡且此人道也即天道也暑以變寒寒以變暑相革而成嵗故湯武革命以法天地上順乎天而下應乎人然則革之時何其大哉彖曰澤中有火革君子以治厯明時天地革而四時成君子治厯明之而巳初九鞏用黄牛之革象曰鞏用黄牛不可以有爲也雖當革時處下無應一若有物束之者所謂鞏也説文以革束物為鞏第鞏用韋束而初居離剛即用離牛之剛革而黄其色者離為牛剛其革也黄者黄離色也于以爲鞏則既堅且靱而急不能革故曰此不可以有爲者仲氏易葢獸去皮毛本爲革象而時日未至故且束縳以自處耳六二已日乃革之征吉无咎象曰巳日革之行有嘉也離爲日二爻則日過半矣彖之所謂已日乃有孚者亦以已日乃可革也由此而征行以待巳日不輕革焉焉有不嘉九三征凶貞厲革言三就有孚象曰革言三就又何之矣九三以爲逼近上卦即欲征而革乎則罹躁動之凶矣必正而危厲變革之言三訂而就就成也變震為言則乃孚者有孚矣又何之乎言巳詳審无所復用其詳審也九四悔亡有孚改命吉象曰改命之吉信志也九四在離日上所謂巳日也互乾居中躍而欲飛人近天位天下皆信其志正彖所謂悔亡者湯武革命此其時矣巽為命九五大人虎變未占有孚象曰大人虎變其文炳也于是而革者稱大人矣命之既改創制立法更朔易服考車書而定禮樂其乘乾向離文明飾治仲氏易如虎之文采變化炳然外著乾有虎象宋衷曰兑為白虎是何待占而後知其信于天下哉二至上大坎爲孚而三有孚皆歸陽爻心實孚也上六君子豹變小人革靣征凶居貞吉象曰君子豹變其文蔚也小人革靣順以從君也至于上六則由創而守矣有位君子之革文章華國豹變蔚然陸績曰兑陽爻稱虎隂爻稱豹豹虎類而小訂詀曰虎大而文疎曰炳豹小而文宻曰蔚無位小人之革改易靣目從欲而治居髙則為君子隂柔則為小人俱指上六言所謂萬物更新四海太平者非耶然而繼創以守務在休息張而不弛盛世所忌動則凶居則正而吉葢非常之舉更革之行可以處變而不可以處常惟可處變故當其未革用黄牛之革而偏厭其固惟不可處常故及其既革雖虎豹炳蔚斐然文治而惟恐其征時則然也初二三以漸而革四則正革五六革之成革道如此巽下離上鼎元吉亨彖曰鼎象也以木巽火亨烹通下亨以大亨俱同餁也聖人亨以享上帝而大亨以養聖賢巽而耳目聰明柔進而上行得中而應乎剛是以元亨鼎者何也象也初偶似足二三四竒而中實似腹五偶似耳上竒似鉉非鼎象而何然象也而義即具焉以木巽入也火事爲烹餁豈細故哉聖人作而大牢脀音征以牲體實鼎也鼎以享上帝饔餐牢醴用物宏多以養當代之聖賢鼎之攸闗為何如者而况其徳則巽順于内而大坎之耳上離之目亶聰明作元后且坤柔爲離主爻進而上行得五中而應九二之剛上下相得其大吉而亨也尚待多辭決歟頤與鼎皆有養義而口實不若鼎養之尊也觀彖象辭可見象曰木上有火鼎君子以正位凝命命既革矣君子正位以凝之成王定鼎于郟鄏其象如此初六鼎顛趾利出否得妾以其子无咎象曰鼎顛趾未悖也利出否以從貴也初在鼎下而偶開如趾然然卦與革反易則一觀于革似顛其趾者夫趾而顛有似乎悖禮祭先夕溉鼎滌濯則必顛鼎而出否濁之物焉豈為悖哉且夫顛者倒也初六爲巽倒巽即兑兑爲少女爲妾而自初至五即爲大坎之子又有得妾以其子之象焉妾以事餁子以主鼎則母以子貴與鼎以出否而從貴者不相似乎訂詁否爲賤新潔爲貴九二鼎有實我仇有疾不我能即吉象曰鼎有實慎所之也我仇有疾終无尤也二當鼎下腹而得陽爻則有實持其實何之六五二之所之也謹慎以之則我之仇類同爲陽爻同居腹位如行塞之九三覆餗之九四未免有所嫉妒然不能即我之身而害之故吉而无尤九三鼎耳革其行塞雉膏不食方雨虧悔終吉象曰鼎耳革失其義也一至五大坎爲耳三正居坎中則雖未至六五六五爲鼎耳已有耳象焉无奈中有三陽而九三上下充連通者不通坎為通鼎耳改矣胡瑗口義夫耳必虚而後可貫以鉉而扛近食前今耳改而塞則行亦塞失鼎之義矣漢五行志口鼎以耳行雖有上離之雉可以爲膏焉得食哉幸而大坎將雨雨則隂陽相和革者可復塞者可通將見不食而虧闕者悔而思變終獲其吉矣九四鼎折足覆公餗其形渥凶象曰覆公餗信如何也凡物之能容者必其有餘地也九四下有三陽實滿巳過上逼耳鉉鼎不能勝其下之足初為足斗然摧折兑為毁折而公餗覆矣李氏集解曰四為諸侯上公之位餗者雉膏之屬流漓沾濡坎象形模沃若夫九四不甞以爲鼎鼐材乎而今果何如六五鼎黄耳金鉉利貞象曰鼎黄耳中以為實也此正鼎之耳也而居離中則黄離爲黄耳于是以上九之金鉉貫之上九乾畫乾為金鼎于是不成烹餁之功乎特是鼎耳无實以下與二爲正應得中而虚納彖𫝊曰耳目聰明得中而應乎剛則二之有實即爲五之實矣其中也其貞也是其所利也上九鼎玉鉉大吉无不利象曰玉鉉在上剛柔節也上九乃六五之所謂鉉者然自五視之爲金鉉而乾爲金又爲玉變震亦爲玉則金鉉而飾以玉復稱玉鉉焉夫玉鉉在上而通于五耳上九爲陽六五爲隂則鉉耳之相通即剛柔之相節節无過不及也推之水火之齊周禮烹人掌共鼎鑊以給水火之齊寒煖之節文王世子食上必在視寒煖之節聖人與上帝聖賢之感格皆此節也不大吉而无不利歟初六出鼎之否九二有鼎之實宜乎行而亨矣乃九三鼎塞九四鼎覆何能有之惟六五之耳上九之鉉剛柔相節則可用以享上帝養聖賢是鼎非聖人其孰與歸震下震上震亨震來虩虩笑言啞啞震驚百里不䘮匕鬯震動也一陽動于二隂之下其象爲雷重震則二雷相逐故震來虩虩然虩虩説文恐懼也震爲言爲笑故又有啞啞象啞啞笑聲匕以棘爲之出鼎牢而升俎者鬯秬釀鬱草爲酒以降神者互坎爲棘爲酒主鼎器者長子長子震也自虎通曰雷震百里諸侯之象故匕鬯歸之彖曰震亨震來虩虩恐致福也笑言啞啞後有則也震驚百里驚逺而懼邇也出可以守宗廟社稷以為祭主也當震之來而虩虩恐懼則恐懼可以致福后自笑言啞啞而不失其則矣夫震之來豈小也哉聲聞百里項氏𫝊曰千里不同風百里不共雷故雷震百里逺聞之而驚邇當之而懼乃能不䘮匕鬯則出而守宗廟社稷以爲祭主也不亦亨哉艮為宗廟震為稼有社稷象象曰洊雷震君子以恐懼修省洊者重也恐懼于心修省于事君子之震也初九震來虩虩後笑言啞啞吉象曰震來虩虩恐致福也笑言啞啞後有則也重震以内爲主而内震以初爻爲主居下能恐彖之震來虩虩而后啞啞者正指此爻也六二震來厲億䘮貝躋于九陵勿逐七日得象曰震來厲乘剛也六二下乘初剛爲龍雷之聲所懾故震來而危大䘮其貝億大也十萬曰億故六五象𫝊以大訓億變離為龜蚌貝象古以貝為貨且避而躋于九陵之上焉互艮為山陵也艮上為九四九陵也其不如初之後有笑言審矣然震得中正終亦无失所䘮之貝不必逐也爻至七日而復其位一爻當一日自得之耳六三震蘇蘇震行无眚象曰震蘇蘇位不當也六三以柔居剛位處不當故震而蘇蘇然程𫝊蘇蘇畏懼散失之貌然勿徒爾也震行則可无眚矣互坎為眚六居陽位故勉之九四震遂泥象曰震遂泥未光也九四與初九皆震之一陽也乃因重之而其義迥殊矣上下皆震動而不返本義曰遂者无返之意遂陷坎中如泥塗附坎水入坤中泥象其能光乎坎反離故未光六五震往來厲億无䘮有事象曰震往來厲危行也其事在中大无䘮也六五居重震之上一震往一震又來故往來皆厲然而大无䘮也以居中而有震動恪恭之事也説卦曰震動也動萬物者莫疾乎雷故曰震來震往來皆動意也雷震非往即來无留住者孔子以危訓厲以行訓往來可見與他卦往來之義不同不必株牽也上六震索索視矍矍征凶震不于其躬于其鄰无咎婚媾有言象曰震索索中未得也雖凶无咎畏隣戒也上六處震之極柔而多恐中未得故索索而氣盡目矍矍而四顧周章變離為目以是征行其凶必矣特是上卦震之剛為九四四之震不能及上之躬也僅于五之鄰耳于此而即戒畏之何咎但與四同體而剛柔爻當有婚媾之象焉戒畏而不能與之同震責言諒不免耳艮下艮上艮其背不獲其身行其庭不見其人无咎艮山也惟山故止但艮象山而亦象人仲氏易曰古人字作冂即艮形也故三統以乾屬天以坤屬地以艮屬人夏正建寅為人正其于易首艮名連山即是故也人身動者也釋名身伸也可屈伸也胸腹為身曲身為躬背不動者也艮止其背凝然如山則身亦止而不用矣是不獲其身也故艮為門闕兼則兩之兩門之間即庭也庭形見而三四人位互坎爲隠伏則行其庭不見其人也艮之時如此則无咎彖曰艮止也時止則止時行則行動静不失其時其道光明艮其止止其所也上下敵應不相與也是以不獲其身行其庭不見其人无咎也艮止也而與震反對即有行焉其惟以時乎時而當静則止時而當動則行動静不失其道光明三至上大離為光明若但以止論艮者其止也背其所也則以上下六爻敵應而不相與无可行者八純卦皆敵應獨言于艮者以訓止故用之他卦不必牽同也易不為典要如此故不獲其身不見其人我无所動物无可引咎過亦无自而至矣艮其背四語佛氏似可借口而孔子歸之于時時止時行其道光明與異端黑白分矣象曰兼山艮君子以思不出其位兩雷兩風兩水兩火兩澤皆可往來侵薄惟兩山疊峙无所移易止之象也思不出位則人而如山矣易重時位而艮辭皆及之初六艮其趾无咎利永貞象曰艮其趾未失正也初偶象趾行之具也乃能艮止焉尚有躁動失正之咎乎然恐其不永貞也故又戒之艮象人故由趾以達輔皆取人象六二艮其腓不拯其隨其心不快象曰不拯其隨未退聽也進于趾則腓矣六二得中守正能艮其腓豈爲不可顧以二隂從一陽則三陽二之所隨也今三止而不中不能退聽于二坎耳為聽二雖止而不救之拯救也而心有不快焉者本義然乃三不退聽之罪也如告子不歸孟子是也故二无吉凶淺義曰互坎為心病不快象九三艮其限列其夤厲熏心象曰艮其限危熏心也限虞翻曰腰帶處葢腰胯為上下之分限也夤馬融曰夾脊肉荀爽本作腎云互坎爲腎字彚曰夤腰絡也又夤進也縁連也世以干進爲夤縁是也葢腎之脉絡縁連于腰脊也三處人之中則限矣夤矣乃九三過剛不中强閉抑制艮止其限如道家丹田氣海守中之説也佛氏空寂亦艮其限也層層等列其夤如道家運氣之説也不知强制逆行徒為危厲適以薰灼其心而巳矣後世修煉之術闗隔躁暴而致危者非是耶淺義曰大離為火薫象六四艮其身无咎象曰艮其身止諸躬也限之上輔之下身也不獲其身即艮其身矣楊時曰爻言身𫝊言躬者伸為身屈為躬屈伸在我也六五艮其輔言有序悔亡象曰艮其輔以中正也此口容止也非中正其誰能之互震爲言上九敦艮吉象曰敦艮之吉以厚終也此艮背也爾雅丘再成曰敦敦者兼山之艮也以剛實而居艮之終則直以艮山與之仲氏易乃聖學之敦厚非異端之寂静也吉何如之雷震起于下故以初剛爲主艮山止于上故以上剛為主最爲吉爻艮下巽上漸女歸吉利貞彖曰漸之進也女歸吉也進得位往有功也進以正可以正邦也其位剛得中也止而巽動不窮也卦名漸者艮止巽入是其入也以止而入也漸次之進也六禮必備貞女乃行女歸待男行漸也吉矣葢論卦則艮巽爲夫婦論爻則隂陽爲夫婦以隂陽言二三四五隂陽各得其位則進往而有功也得位則進以正可正邦國所謂二南之化本于闗雎也然而諸爻得位以五爲尊其位則剛而得中也是利貞也以艮巽言艮止而巽入則動而相合必以其漸斷无躁動而窮者矣是吉也漢上易𫝊仲氏易俱以爲卦自否變三柔往四爲得位則下即接曰其位剛得中也何以解乎况漸進也明屬全卦之名義而必以一爻糺纒卦變何爲曰漸之進則與晉不同晉重進漸重進以漸象曰山上有木漸君子以居賢徳善俗巽木之髙㡬何今乃髙起而在山上非以漸而至能乎故君子之居賢徳善風俗皆以漸焉胡雲峰曰居徳象艮之止善俗象巽之入初六鴻漸于干小子厲有言无咎象曰小子之厲義无咎也艮爲黔喙加之互離飛鳥而集于互坎水窪之間此其象爲水鳥而水鳥之序飛而有漸者則鴻也故初爻以山足而在水旁干也干水涯也而鴻漸焉夫艮為少男而居初爲小子少年欲進而值坎在前則必常存危厲之心无敢放逸雖四不相應若有蜚語倒兑為言而義固无咎矣六二鴻漸于磐飲食衎衎吉象曰飲食衎衎不素飽也漸于水旁磐石之上艮爲石進矣于是飽坎之酒食為變兑之和説而飲食衎衎焉葢二隂得位待時而與五遇非徒飽者云胡不吉九三鴻漸于陸夫征不復婦孕不育凶利禦㓂象曰夫征不復離羣醜也婦孕不育失其道也利用禦冦順相保也艮爲山而乾畫平直是髙平之陸也鴻自磐而進不有陸乎即漸于此亦復何害然以夫婦觀之九三艮剛與六四巽隂以兩无應與迫比而爲夫婦程𫝊則非漸之女歸而貞者矣故長女少男義近蠱惑山風蠱正風山漸之對夫征求四則陷于坎窞坎六三曰坎窞附麗離麗也隂類醜類也坤爻為衆羣醜也而不能復婦比于三而坎實有孕則失漸進之道居艮止末爻而不能育能无凶乎惟是坎爲㓂若用禦㓂艮止坎險順以相保下艮互坎皆坤卦順象則利耳六四鴻漸于木或得其桷无咎象曰或得其桷順以巽也六四由陸而進有鴻漸于木之象焉巽為木杌􅑾甚矣鴻之棲也以蹠不以爪不能棲木然卦巽也坤爻順也若能順以巽而或得横平之枝如榱桷者漸之訂詁曰坎為宫且陽横亙畫于下有桷象乃无咎耳或者不敢必之辭九五鴻漸于陵婦三歲不孕終莫之勝吉象曰終莫之勝吉得所願也鴻由木而再進則漸于陵矣變艮為重山陵象雖髙而得位亦危而難居故六二正應吾之婦也而艮止難進歴盡三爻計為三嵗而適值中空三至五互離為中空未能有孕然九五剛而得中六二柔而得位遲遲女歸二五漸合以剛填柔吾知終獲孕育之願也誰能勝之哉上九鴻漸于陸其羽可用爲儀吉象曰其羽可用為儀吉不可亂也上九處漸之極故鴻復返而漸于陸焉知進知退巽為進退雍容甚都其羽用爲舞儀儀即鳳凰來儀之儀无有亂其度者矣有何不可有何勿吉九三亦全漸陸而不言吉三者以進為進將及于木故不吉上以退爲進不逺于磐故吉漸道然也兑下震上歸妹征凶无攸利彖曰歸妹天地之大義也天地不交而萬物不興歸妹人之終始也説以動所歸妹也征凶位不當也无攸利柔乘剛也男女居室乃天地隂陽相交之大義也天地不交則萬物不興男女不交則生生道絶前者有終而後者有始是人之終始也妹豈可不歸者然而曰征凶无攸利何也兑少女也少女稱妹程𫝊古有妹喜路史註妹者以妹姝目之言其少而皎好也卦以内外二體言則女悦男動正與漸反以一體言則少女情感而悦震動以從人所歸者兑悦之妹也非女歸之吉矣而况二三四五剛柔爻位皆失其當欲以征進豈不有凶兑之一柔震之二柔皆乘剛上則隂乘乎陽女制乎男亦有何利程𫝊曰咸恒夫婦之道也漸歸妹女歸之義也漢儒作震兄嫁兑妹則彖象之詞无之象曰澤上有雷歸妹君子以永終知敝雷震于上澤隨而動陽動于上隂悦而從歸妹象也程𫝊君子觀于此知夫婦之從一而終也故凡事永其終知夫婦之妄動有凶也故凡事知其敝而持之知敝則永終矣初九歸妹以娣跛能履征吉象曰歸妹以娣以恒也跛能履吉相承也歸者兑妹也初九居兑之下則爲妹之娣古禮娶女則娣從之是歸妹以娣也夫初爲足而值兑之毁折象跛能側行而不能正行娣之上征而承二也似之此恒禮也故吉九二𦕈能視利幽人之貞象曰利幽人之貞未變常也九二剛而居中則歸妹之夫也乃比初九之承初以跛承二而二居離下其目𦕈然即能視之似與六五之正室相逺而與初九之從娣相近者不變常道乎爲九二計以兑居人位爲幽人以齊内故曰幽人言幽獨不可不慎也必自持以貞不變常道乃利耳葢戒之也以上下卦觀之則兑爲女震爲夫以上下應爻觀之則又兑二爲夫震五爲女也六三歸妹以須反歸以娣象曰歸妹以須未當也六三以隂居陽位處不當而欲抗于二夫之上是從妹之賤女也以其徳賤也天官書須女四星爲賤女亦反歸焉而以娣可也娣之道跛也承也六三无應故有反歸象古嫁女亦有反歸禮昏禮嫁女畱其馬夫家三月成婦則反馬不成婦則乘以歸九四歸妹愆期遲歸有時象曰愆期之志有待而行也四爻震動則妹將歸矣但四與二五皆不得位則歸期有愆象纂言且坎爲月離爲日合日與月而為期四當坎陷中而踰于互離之外亦愆期象仲氏易此豈不欲歸哉以九四以剛處柔知妄征之凶故遲遲而歸以待其時也六五帝乙歸妹其君之袂不如其娣之袂良月㡬望吉象曰帝乙歸妹不如其娣之袂良也其位在中以貴行也君小君也五尊位故象帝乙歸妹仲氏易曰帝乙貴主何難盛飾然遜處在上主家輿服有不及娣姪而不為嫌者則其婦道終始如月之將望而未有巳何其吉也衣口爲袂乾爲衣兑爲口下卦本兑六五變始成兑是五君之袂不如初三兩娣之袂良也乃若坎月離日合璧在中上互坎下互離如合璧上震下兑東西相向震東方卦兑西方卦有如望然其曰㡬者以五位坎上于離光稍偏盖婦道不可盈也㡬盈則得中矣帝乙嫁少女必甚合禮故周公即所見與泰卦兩引之與箕子明夷王亨岐山等辭同上六女承筐无實士刲羊无血无攸利象曰上六无實承虚筐也上六隂虚于上則女歸祭行當承筐以實蘋藻采蘋之詩曰于以盛之維筐及筥今震爲筐虞氏説而隂虚无實是虚筐矣六三不應于下則娶婦助祭當刲羊以獻今兑爲羊離兵欲刲之而坎爲血卦離卦爲乾是无血矣上六以隂柔乘剛而居卦終震動无應故无利如此離下震上豐亨王假之勿憂宜日中彖曰豐大也明以動故豐王假之尚大也勿憂宜日中宜照天下也日中則昃月盈則食天地盈虚與時消息而况于人乎况于鬼神乎豐者大也不明以動事何由大内明外動則功業日以恢廓故大也然大者誰至之假至也天下莫大乎王出乎震嚮乎離皆王至而尚大也獨是大極必減卦中大坎得毋憂乎而勿憂也離日當中以照天下勿失此時正其宜也不然日月之光不免食昃天地之𢎞猶有盈虚而况于人安免生死而况鬼神安免聚散豐豈能常哉際豐之時勿失豐之道可耳仲氏易曰下卦離爲日中爻互兑爲西昃象自二至上坎爲月互兑爲毁蝕象玩辭曰消息者盈虚之漸象曰雷電皆至豐君子以折獄致刑雷電同時而至聲勢盛大豐象也折獄而致以刑既明且決亦有雷電皆至之象焉初九遇其配主雖旬无咎往有尚象曰雖旬无咎過旬災也豐以雷電皆至成卦謂明與動相資也故初九與九四雖不相應而以為配焉稱之曰配主者我往則彼爲主也二爻相合爲明之始動之始往而前進得尚于四雖窮天地之數至于旬日旬十日也十則天地之數盡矣不猶豐乎然不可過旬也過旬則日昃月食災矣六二豐其蔀日中見斗往得疑疾有孚𤼵若吉象曰有孚發若信以發志也六二居離中日中而豐也然天下惟豐難居山海之大必納汚疾人體胖溢多結痰涎故六二之豐非他也乃巽草之曖曃靡密巽為茅豐其蔀耳來易􅫟蔀艸名且以二爲日中而不知與上卦應震仰盂象斗纂言而離目巳見之夫斗星見而尚日中乎若于此而輕往則雜卦曰豐多故也此非彼過動得疑疾巽為不果坎為疾惟有其孚信以發六五之志共持豐滿則吉大坎志象信所以藥其疑也九三豐其沛日中見沬折其右肱无咎象曰豐其沛不可大事也折其右肱終不可用也三則日昃而入坎内值水草之交是豐其沛矣公羊𫝊曰草棘曰沛齊侯田于沛是也崔駟達㫖云蝱蚋之趨大沛日中未幾而更見沬矣九家易曰沬斗杓后小星此尚可往而圖大事哉變艮爲肱兑爲右爲折虞氏説其亦折其右肱以示不可用則无咎耳見沬昏夜矣正所應之上六蕭索閉藏之候矣故大事去而无用也九四豐其蔀日中見斗遇其夷主吉象曰豐其蔀位不當也日中見斗幽不明也遇其夷主吉行也六二之所謂豐其蔀謂互巽也日中見斗謂上震也九四居巽上而爲震主以陽居隂處位不當又互兑澤幽而不明正其象焉則惟遇初九之夷主借其明以行乃吉耳初往就四四行就初迭爲賓主故皆曰主自下就上曰配如后稷克配彼天是也自上就下曰夷如陵夷而至地是也此大臣下在下之賢明以濟豐也六五來章有慶譽吉象曰六五之吉有慶也六五居髙柔順來六二文章之臣離為文明持盈履豐有慶流譽吉矣成康之君是也自六二致君曰往自六五得賢曰來共保豐也上六豐其屋蔀其家闚其户閴其无人三歲不覿凶象曰豐其屋天際翔也闚其戸閴其无人自藏也上六則豐巳極而有凶矣故樓閣豐巍翺翔天際一望如蔀蓊鬱曖曃是其家也乃闚其户閒庭寂歴空无一人且候之三嵗而不見焉可歎哉揚子雲曰天收其聲地藏其熱髙明之家鬼瞰其室正謂此也炎炎隆隆豐屋之象左𫝊王子伯廖以此爻為豐之離離中虚有戸内不覿人象艮下離上旅小亨旅貞吉彖曰旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也旅之時義大矣哉旅者衆也周禮五卒爲旅則旅本以衆爲義而衆行者必客居因之以師旅陳行之目易之爲覊旅寄托之名仲氏易今卦六五之柔得中于外而順于上下之剛艮止而麗乎離明于外爲旅得中而順乎剛則不偏不觸止而麗乎明則自處者不昧其正是旅之象也是旅之所以必小乃亨而且貴于貞也小即柔夫旅之時義豈小哉聖人亦有旅焉孔子周流是也君王亦有旅焉晉重耳出亡唐徳宗幸奉天是也大可知矣象曰山上有火旅君子以明慎用刑而不留獄仲氏易曰艮爲居而火不留旅之象也體大坎爲刑律而離以明之艮止以慎之王畿曰旅皆逆境而莫甚于囚之在獄久淹豈可焉初六旅瑣瑣斯其所取災象曰旅瑣瑣志窮災也仲氏易曰此窮旅也旅人本猥屑而此當艮止下柔尤纖細之至者鄭康成曰瑣瑣猶小小艮小石之象虀鹽包裹瑣瑣然且寄居櫊牖所踞纔尺寸而與同行者較量彼此必至分析其處所而後巳此何如旅也夫居停借寓本巳偪仄所恃廣大自處與同行相親庶足慰藉而瑣瑣如是此豈能免患者其窮而致災必耳按説文以斯爲分爾雅以斯爲離毛詩斧以斯之是也所者行居之名故鄭詩獻于公所謂茇舎之所而漢制車駕所在曰行在所六二旅即次懐其資得僮僕貞象曰得僮僕貞終无尤也仲氏易曰二居艮門之中是就所宿也左𫝊凡師再宿為信過信為次夫旅既有宿將必有齎持以爲宿者聘禮問㡬月之齎即資也二以艮中當互巽之初則巳能懐其資巽為利而且艮為童為閽寺爲僕爲篤實又得童僕之貞者矣漸與骨肉逺轉于童僕親得貞何尤九三旅焚其次䘮其童僕貞厲象曰旅焚其次亦以傷矣以旅與下其義䘮也九三剛而无應比于火下有焚其即次之象焉且互兑爲毁折爲刑人是獨據艮上而下視艮之童僕如路人逆旅漠不闗念童僕之貞者尚肯從哉抑危矣九四旅于處得其資斧我心不快象曰旅于處未得位也得其資斧心未快也九四以剛處柔未得其位故不若二三之有其次也姑于處耳且得資又須得離兵以防之其心曷得安焉六五射雉一矢亡終以譽命象曰終以譽命上逮也離爲野雉旅人可射也伏坎為弓射象乃乾爻之直象矢今一爻中貫者見坤而不見乾是射雉而一矢亡也非旅之小損歟然六五柔小得中不惟順乎上九九四九三之剛也即六二多譽在下不恃我居上位而亦逮之則終以二之譽爲我之譽而命令及逺矣二多譽二四互巽爲命令此旅之能收拾人心者也此彖之所謂柔中而順乎剛者也上九鳥焚其巢旅人先笑後號咷䘮牛于易凶象曰以旅在上其義焚也䘮牛于易終莫之聞也仲氏易曰旅之覔宿猶夫鳥之覓棲也鳥鵲遶樹止求一枝乃以離之飛鳥巢離之科木翹然特出旅人矜髙衆方指目以爲非義而乃際炎上之火加巽風之揚三之焚次在離傍不過火之延燒耳而此之焚巢直當離上一若薪燭不戒並主人屋巢而盡焚之何罔罔乎夫旅人无親雜卦𫝊曰同人親也惟同人爲親故先號咷而終必笑又曰親寡旅也惟旅爲親寡故先或笑而後必號咷况離火易焚兑脱多䘮三之焚次而童僕亡此一焚巢即其所牽之離牛亦以變爲震動而䘮之酒誥肇牽車牛逺服賈坎耳在下終莫得聞其凶何如矣下三爻艮止也初六止而瑣屑者六二止而懐資順僕者九三上而焚次䘮僕者上三爻離明也九四明而不安于旅考六五明而旅徳及人者上九以髙明自恃而旅中致禍者旅若是之各象也巽下巽上巽小亨利有攸往利見大人彖曰重巽以申命剛巽乎中正而志行柔皆順乎剛是以小亨利有攸往利見大人巽入也徳之制也重卦上下皆巽巽爲風而相襲則風聲被物呼號丁寧是申命也且二五皆剛巽入乎中正而坎大坎離之志以行初四之柔皆上順于剛則以小隂通大陽而亨用退爲進而尚往巽爲進退利見二五之大人也非是之以而何以哉象曰隨風巽君子以申命行事前風起而後風隨之來易无物不入故君子申命行事吹嘘萬物以象巽焉初六進退利武人之貞象曰進退志疑也利武人之貞志治也巽爲進退初居巽下三思不巳其志進退而狐疑矣是惟變乾爲健則武人之貞矣以治吾志乃利耳九二巽在牀下用史巫紛若吉无咎象曰紛若之吉得中也巽爲木二陽在上一隂在下有牀象焉九二退入牀下似過卑矣然以人事神宜于在下史巫紛然並用兑為口舌為巫有史巫象周禮大史掌祭祀之禮書司巫掌袚除請禱之事以敬神明得中道矣吉又何咎初徳柔而位剛故利在志治此徳剛而位柔故吉在巽下九三頻巽吝象曰頻巽之吝志窮也九三以剛居剛而不中上下重巽相連屢入屢不入所謂其究爲躁卦也三居下卦之終是究也不志窮乎六四悔亡田𫉬三品象曰田𫉬三品有功也八卦正位巽在四彖所謂柔順乎剛者此爻當之故曰悔亡仲氏易曰四居上卦之隂坤隂爲田而互離以網罟戈兵合之爲田獵以纉武功承初而言巽固利倍而巽之主爻當巽之正位倍而又倍遂凖卦畫之數而全𫉬三品將初巽之雞二兑之羊三離之雉而皆𫉬之翟𤣥説其有功爲何如者九五貞吉悔亡无不利无初有終先庚三日後庚三日吉象曰九五之吉位正中也九二剛中居柔所善者敬謹耳尚未圖大而更新也非制事之至也至于九五剛徳而居剛位以濟巽入乃貞吉也悔无也无不利也誠剛巽乎中正而志行者哉故諦觀全卦巽初无剛是无初也巽終有剛則有終矣夫天下之无初有終者非變更之事乎二與四同功爲兑兑西方之卦庚也十幹戊巳居中以甲爲始至庚而變庚變更也乃以爻計之一爻爲一日四隂爲兑主爻數至二爲先庚三日未至于初是无初也數至上爲後庚三日巳有其終是有終也如是而申命行事則變從前之積習謂之无初有后此之觀成謂之有終大人正中之吉爲何如者上九巽在牀下䘮其資斧貞凶象曰巽在牀下上窮也䘮其資斧正乎凶也上九居上卦之終不中不正不能制命行事无所入矣窮矣窮則返下故六四亦有牀下之象而上入而在焉敵應九三巽有資離有斧以爲其資斧也乃兩窮而不相與盡䘮之矣以退巽爲正乎吾見其凶也兑下兑上兑亨利貞彖曰兑説也剛中而柔外説以利貞是以順乎天而應乎人説以先民民忘其勞説以犯難民忘其死説之大民勸矣哉水所鍾聚曰兑毛晃説説卦𫝊曰兑以説之謂兑澤能潤物而悦乎物也又曰兑正秋也萬物之所説也言物至兑秋而結實欣欣喜悦也則兑而説其亨必矣且觀其卦體二五以剛居中三上以柔居外三為下卦之外外和順而内嚴介是説以利貞也將見兑上則順乎天兑下則應乎人坎爲勞卦離爲兵難今大坎互離皆爲兑説民歡然自勸而忘其勞與死夫民勸之與勸民逺矣説何如其大耶淺義口巽兑皆柔徳巽曰剛巽乎中正而志行兑曰剛中而柔外可知巽兑只善用其剛而已象曰麗澤兑君子以朋友講習兩澤相麗互相滋益有朋友講習之象焉本義講以口習以身初九和兑吉象曰和兑之吉行未疑也初九无應于上不比于隂其説也夷然和平而巳矣坎爲疑初去坎逺故曰行未疑此居下而樂在中者九二孚兑吉悔亡象曰孚兑之吉信志也九二比三之隂柔宜有悔者然居中而有互離之志即行或渉疑而悦出于孚其志可信吉而悔亡矣此出其誠心以與衆悦者六三來兑凶象曰來兑之凶位不當也六三與上同爲兑口又居大坎之隂險而不實不中不正以兑口招人之説其凶必矣此面諛諂笑以求悦者九四商兑未寧介疾有喜象曰九四之喜有慶也商度也九四以陽居隂而上承九五商度所説未得寧一似介介有疾者大坎為加憂為疾然剛徳不輕悦人且出以憂心其獲喜慶豈倖焉此商其當悦而始悦者九五孚于剝有厲象曰孚于剝位正當也九五正當尊位謂天下當悦我也因上六之容説而遂孚之以爲孚于説哉實孚于剝也兑正秋也上六秋末隂盛故爲剥彼之隂剝陽者也亦有厲矣上六引兑象曰上六引兑未光也上六爲兑正位則兑悦之主爻也以其兑口引天下之悦而持以説五其心固未光明矣此王莽之流也豈可以其謙悦下士而信之艮爲止而止不可過過止則爲釋羽故于艮三正位著列夤之妄兑爲悦而悦不可過過悦則爲奸佞故于兑上正位昭引兑之惡爲世道慮逺矣坎下巽上渙亨王假有廟利渉大川利貞彖曰渙亨剛來而不窮柔得位乎外而上同王假有廟王乃在中也利渉大川乘木有功也雜卦𫝊曰渙離也風行水上則水散披渙之象也凡物欲其聚渙則不聚矣然下坎爲險難又欲其散渙則散矣卦二之剛自乾來而爲坎則通而不窮坎為通四之柔自坤往得位乎外卦則上承貴王而與五相同盧氏景裕説故互艮爲宗廟而陳坎豕以薦之正九五之王在中聚渙之事而且大坎爲大川乘巽木以渉之風檣雨檝坎又為雨一往而利出險之功又如是非行之以貞其能然哉象曰風行水上渙先王以享于帝立廟享帝立廟皆所以聚渙也初六用拯馬壯吉象曰初六之吉順也初六居渙散之始猶可拯救于此順其勢而轉移之用亟心之壯馬則吉耳葢挽渙之力不宜弱故以壯而又不可躁而滋擾故以順也隂爻屬坤為順九二渙奔其机悔亡象曰渙奔其机得願也二則入于渙散之險矣吾身性命先求苟全是必得如机者奔之以為據則得所願而悔亡矣震足有奔象横一陽于缺隂之上而艮肱慿之艮為手適互于二上有机象仲氏易曰机几也周禮五几通作机左𫝊設机而不倚六三渙其躬无悔象曰渙其躬志在外也外卦巽風能散下之坎險者也六三與外卦之五同功往以濟渙東西南北若分散其躬者然此奔奏禦侮之臣也乃其志也何悔或曰中庸以成巳為内成物為外志在外者斯人吾與也六四渙其羣元吉渙有丘匪夷所思象曰渙其羣元吉光大也此彖之所謂柔得位乎外而上同者也坤畫爲衆羣也渙散之時螘封蛙聚實繁有徒六四爲九五腹心運籌帷幄出大離之光推亡取亂以渙其羣豈不大吉夫羣之相視亦自飛揚而能渙之者獨峙如丘山三五互艮為山有土有民是豈井底醜夷思擬所到者哉夷即羣也九五渙汗其大號渙王居无咎象曰王居无咎正位也九五正位以巽風分散于坎水之上而渙汗其大號焉坎水有汗象汗出不返如號令然巽風為大號天下環拱王乃在中三塗九術千廬八衛是渙也歟哉是王居也尚有何咎上九渙其血去逖出无咎象曰渙其血逺害也此爻則渙而逺去者也爻變爲坎上下加憂賊殺流血坎爲寇為血尚可久居此乎故宜渙之渙而去去而逺出逖逺也害乃不及古之賢者避世或功成而身退者皆體此意也然他爻无應尚圖濟渙此爻有應反以去渙者葢濟渙欲得位欲不窮上九失位而窮固宜去也兑下坎上節亨苦節不可貞彖曰節亨剛柔分而剛得中苦節不可貞其道窮也説以行險當位以節中正以通天地節而四時成節以制度不傷財不害民坎水兑澤秋冬斂藏之卦也斂藏則有節矣而况坎水汎濫瀦之以兑澤如節縮然仲氏易是節也其卦兑分坤之一柔坎分乾之一剛剛分而上柔分而下而剛居上卦之五正得其中所以亨也若節之過而如上六之苦節其道窮矣雖正而不可矣焉能亨哉故兑説以行坎險五當中位不過其節既中且正得坎之通則天地如之君道如之寒暑有節而四時成節以制度而財不傷民不害皆節道也象曰澤上有水節君子以制數度議徳行仲氏易曰數者備數如十百千萬類度者審度如分寸尺丈類徳行則中庸之喜怒哀樂中節也初九不出戸庭无咎象曰不出戸庭知通塞也初九在澤之底而爲二陽所蔽故知通在于塞而不出户庭焉无咎之道也按戸庭者戸外之庭門庭者門内之庭古室有戸戸外爲堂堂下爲庭庭外乃門也互艮爲門闕初二二陽在内故不出九二不出門庭凶象曰不出門庭凶失時極也初九知塞而并許其知通者以其知時也時即節也一年四時八節二十四氣七十二候若九二居澤中而上无蔽塞偶開如門六三隂偶時可出矣乃以剛居柔過于退伏處門内之庭而不出豈不失時之至乎極至也欲辭凶而凶至矣六三不節若則嗟若无咎象曰不節之嗟又誰咎也六三則兑口矣平而鍾在此盈而溢亦在此苟不節若則震言嗟若若如也形容之辭善補過者也誰其咎之六四安節亨象曰安節之亨承上道也六四居坎下承九五剛中之波而順入于澤坤爻為順安而中節者也故曰承上道九五甘節吉往有尚象曰甘節之吉居位中也至于九五正所謂當位以節中正以通者也坎卦本坤稼穡作甘其節也甘美而不矯拂以此而往可嘉尚巳上六苦節貞凶悔亡象曰苦節貞凶其道窮也惟是上六之節水下流而上竭如陳仲子之三日不食則其道窮雖貞凶矣然而苦節之士往往蹈阨禍而无怨悔不可效也亦可欽也兑下巽上中孚豚魚吉利渉大川利貞彖曰中孚柔在内而剛得中悦而巽孚乃化邦也豚魚吉信及豚魚也利渉大川乘木舟虚也中孚以利貞乃應乎天也巽兑兩形相向彼此均等上下相觀有若合符合符曰信是風澤相合而信生其中中孚也故二柔在内則内虚二五兩剛得中則中實内説而外巽則无忤皆孚象也以之化邦不亦可乎内二坤畫邦象且所謂孚非淺焉巳也必其信如豚魚之乗風拜浪見必向風風静即滅者來註仲氏易郝敬劉濓皆如此解豚魚江猪也生于澤而向風故上巽下兑象之斯吉耳行見以巽木之舟渉兑澤之上而大離中虚虚舟何觸其渉利矣然而孚信之事尤貴正而固五之中正貞也二之中亦貞也大壯九二聖人以中訓貞可見其一登天位而合天一在人位而格天乃其宜哉象曰澤上有風中孚君子以議獄緩死澤上有風波濤立見風之信也春秋魯莊公曰小大之獄雖不能察必以情曹劌以爲忠然則議獄緩死非中孚曷以哉來易曰兑爲説議之象巽爲不果緩之象初九虞吉有他不燕象曰初九虞吉志未變也初九爲卦之始其中孚也赤子之志未變者也故安之則吉若有他擾則將失其孚矣何以安焉虞燕皆安也九二鳴鶴在隂其子和之我有好爵吾與爾靡之象曰其子和之中心願也二與五則剛之得中而相孚者也上巽爲號互艮爲黔喙之屬大離爲鶴而居隂卦巽離兑皆隂卦是鳴鶴在隂也夫二陽與五陽尊卑相孚有父子之象焉猶晉六二與六五二隂敵應稱六五為王母小過六二稱六五為妣也蠱卦亦以爻之尊卑稱父子巽口向下而鳴兑口即向上而鳴是鶴鳴而其子和之出于中心之願矣然而鳴者何也乾爻為好大離爲爵見虞氏易五之鳴若曰我有好爵剛中以五為尊故稱我與爾指二共靡此二之所以中心願和也靡通縻即五爻之所謂攣也六三得敵或皷或罷或泣或歌象曰或皷或罷位不當也六三與六四兩隂相敵艮敵應之敵舊指上九上九豈敵哉宜相孚矣然位處不當震動離燥或震而皷或艮而罷或離而忽泣忽歌以此相孚感亦淺矣六四月㡬望馬匹亡无咎象曰馬匹亡絶𩔖上也六三以六四爲敵則六四以六三為𩔖𩔖即坤卦乃與𩔖行之𩔖同𩔖而有不孚者乎然天下亦有絶𩔖而孚乃善者日爲陽月為隂則隂爻月也六四以隂爻而居中近上以受離日之上光月幾望矣幾望則隂得陽光與三隂仝爲震馬而今亡其匹匹𩔖也馬曰匹矣此絶隂𩔖而上進于陽以求孚也何咎焉中孚有上下對合之象故初與上對二與五對三與四對而四又不願與三𩔖所謂參伍以變也九五有孚攣如无咎象曰有孚攣如位正當也若九五則正當剛中尊位其有是二之孚也孚即中心願也葢固結而攣如矣巽為繩艮爲手有攣象上九翰音登于天貞凶象曰翰音登于天何可長也上九孚之終而不能孚矣自信之極遂以巽雞之音雞曰翰音勉爲呌號欲上登于天此豈可長者哉雖正而凶矣京房以新進見元帝即指斥石顯及外出又屢上封事卒以殺身其此之謂乎艮下震上小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉彖曰小過小者過而亨也過以利貞與時行也柔得中是以小事吉也剛失位而不中是以不可大事也有飛鳥之象焉飛鳥遺之音不宜上宜下大吉上逆而下順也上下四隂内祗二陽隂過而陽不及小者過也而其象爲大坎坎爲通亦有亨義焉時至小過更宜以正行之則利貞焉但柔居二五得中也剛失二五之位不中也故小事則宜而大事則不宜舊以小訓細小小訓隂小作二解者實一意也且其象兩陽居中有似腹背而四隂分張有似翼飛非飛鳥之象而何宋衷説然鳥飛而聞震鳴又有飛鳥遺之音之象焉而其音則不宜上宜下以上則難聞下則可遺也小過不上而蹈逆而下而安順則大吉陽尊宜上隂卑宜下故小過以上為逆以下為順象曰山上有雷小過君子以行過乎恭䘮過乎哀用過乎儉隂小在上陽大在下鬱而不得出則奮而爲雷艮山陽現于上矣而其上乃更有震二隂蔽一陽薄擊成雷是小者過矣君子通其意爲細小謹小之過故行過恭䘮過哀用過儉焉初六飛鳥以凶象曰飛鳥以凶不可如何也四隂皆鳥翼而初與上則翼之翰也訂詁曰翰者翼之鋭也翼之强在翰翰舉而身即從之此以臣制君以小加大之象凶象也仲氏易然初六自以之能如之何哉初六居下宜處矣乃與震應而飛故自取凶六二過其祖遇其妣不及其君遇其臣无咎象曰不及其君臣不可過也六二居巽之始中而且正小過之下而順者也故以六之隂爻爲女耶則三四陽爻其祖也乾為君為父祖大父也六五敵應居上其妣也坤為臣為母則歴過其祖不敢與近而惟遇其妣以隂爻爲臣耶則三四陽爻其君也不敢及之而下比初六遇其屬僚以臣原不可過君不過則不及矣所謂宜下宜小事也九三弗過句防之從或戕之凶象曰從或戕之凶如何也隂過陽則陽弗過隂矣既弗過則九三當艮止以防之若縱而不防從同縱爻變成豫有縱象則或且戕之凶可量耶舊以從為從隂則與九四往意相犯且爻以剛位剛无從隂意九四无咎弗過遇之往厲必戒勿用永貞象曰弗過遇之位不當也往厲必戒終不可長也九四剛居于柔則位不當其弗過乎隂與九三同而三防下此乃遇上矣震主上進而與六五比故遇上九四于此得毋以爲我既遇隂即往而就隂乎夫薫蘨不合自古而然强爲彌縫終難長久徒得危耳戒之哉其勿用往惟永守其貞則无咎矣六五宻雲不雨自我西郊公弋取彼在穴象曰宻雲不雨已上也小過宜下不宜上至六五則巳上矣故大坎為雲屯以坎為雲亦甚濃宻而隂不下降何能即雨徒見雲之自我西郊而巳互兑為西郊我者周公之辭然而卦象飛鳥初則飛而五將窮坎隂爲窞有穴象焉則鳥在穴矣公往弋乎三四陽剛為公巽繩繫坎弓有弋象亦取彼于穴耳取之則可雨矣不執言田獵而曰取亦小事吉也上六弗遇過之飛鳥離之凶是謂災眚象曰弗遇過之巳亢也上六更上而亢矣其意並不屑與陽遇而悍然過之方謂迅羽可以髙飛而不知爻變為離巳麗網中如鴻則離之之離天災人眚奚逃焉坎為多眚離下坎上既濟亨小利貞初吉終亂彖曰既濟亨小者亨也利貞剛柔正而位當也初吉柔得中也終止則亂其道窮也水火者相反而實相需者也相反則如火澤睽焉已耳澤火革焉巳耳而至于相需則不然火上水下則炎上者欲其下潤下者欲其上指之曰未濟言後有濟時也而苟其坎上而離下則炎上者上而煖水潤下者下而潤火水火互入炎潤交契指之曰既濟言巳調濟无偏也然而調濟之義即具濟渡之形兩卦皆有兩坎須煩利濟而離上坎下則以内之正坎接三五之坎而阻于上九而濟不至于盡坎上離下則以二四之坎而接外之正坎而濟至于盡既盡也雖同此濟而未濟既濟分于其間夫濟之力以剛而濟之用在柔柔則小矣小則戒矣戒則通矣是小者亨也而柔之亨更利在貞如卦三剛踞剛位則三柔亦踞柔位剛柔正而位當乃曰既濟是利貞也然其間有初終焉初之吉以柔居二得中也若終則不可以柔也終柔必偷而止終歸于亂此既濟之所以不可恃而終之以未濟也仲氏易象曰水在火上既濟君子以思患而豫防之防其終止則亂也初九曵其輪濡其尾无咎象曰曵其輪義无咎也初九濟水者也曳其輪乾爻為圜有輪象濡其尾初為尾皆義之當然何咎六二婦䘮其茀勿逐七日得象曰七日得以中道也六二離為中女婦也茀車蔽也衛風翟茀以朝是也互坎爲盗䘮其茀者有之䘮茀則難于行而二處之得中不事捕逐但緩以俟之至于七日爻歴七則復其位而自得矣此中有風波而无傷于濟者九三髙宗伐鬼方三年克之小人勿用象曰三年克之憊也九三居互坎之中而濟者也髙宗商中興賢君能濟難者故象之其伐鬼方也訂詁曰鬼方西北國也夏曰獯鬻殷曰鬼方周曰獫狁後漢書西羌𫝊曰殷室中衰諸侯皆叛髙宗征西戎鬼方三年乃克來易坎居北方為隠伏故曰鬼方葢歴三年之勞憊坎為勞卦三爻為三年而後克之濟之難如此若爻變互艮為小子爲僮僕是小人也豈可用之以勝任哉六四繻有衣袽終日戒象曰終日戒有所疑也六四在互坎之上正坎之初正濟時矣而隂虚中漏互離中虚非袽莫塞坤爻爲帛説文繻繒采也變乾爲衣變兑毁折爲袽虞翻曰袽敗衣也是繻有衣袽也然而敢恃哉釁舟用臭絮一釁再三顧終日戒懼坎之善疑固如是離日象九五東鄰殺牛不如西鄰之禴祭實受其福象曰東鄰殺牛不如西鄰之時也實受其福吉大來也至于九五居尊則既濟矣故以五視上六上其隣也而爻變爲巽巽在東方東隣也然五以上爲隣則上亦以五爲隣五爻變爲坤坤在西方西隣也而諦觀之則東隣髙處既濟之上椎坤爻之牛陳饋豐盛而西隣則乾惕以修禴禮離主夏故修夏祭之禮較之東隣似備物不及焉者然東隣盛滿已過焉如西隣之九五居中而得其時哉吾知禴祭而神明鑒之以陽大之福來而五實受之矣上六濡其首厲象曰濡其首厲何可久也所謂終止則亂者也上六隂柔處濟之盡乃自足自玩不覺沉溺坎窞而濡其首矣上為首欲久可得耶初九濟之始也六二濟有所䘮而自得也九三力濟者也六四濟而戒懼者也九五既濟矣上六則以濟而惰止遂成終亂既濟之不可苟安也坎下離上未濟亨小狐汔濟濡其尾无攸利彖曰未濟亨柔得中也小狐汔濟未出中也濡其尾无攸利不續終也雖不當位剛柔應也必有未濟而後有既濟故既濟二柔正居兩剛下卦之中則既濟而亨未濟五柔正居兩剛上卦之中則未濟者可濟而亦亨但坎爲狐三五互坎則體未全而爲小狐二互體以四當六故未全小狐至五幾于濟矣汔幾也而離之外剛障之則柔之得中者未能即出夫出水則尾不濡今尚見尾濡互坎之初為尾下有正坎故尾濡是始濟而終不濟不續其終矣何所利乎然而未濟者終可濟也何者爻雖剛柔皆不當位而上下相應終焉允臧惟在能續者續者无間也茍日新日日新又日新續終也象曰火在水上未濟君子以慎辨物居方火炎上水潤下物不同也火居南水居北方不同也來易君子慎辨物𩔖各居其方即物各得其所也則未濟而濟矣卦下坎上離未濟之物方也互下離上坎又既濟之物方也初六濡其尾吝象曰濡其尾亦不知極也既濟之初以濟而濡其尾此則未濟而先濡其尾故不曰曵輪但曰濡尾以爲水弱可玩而不知茫茫洪波莫得其極極爾雅四極之極盡也不亦吝乎九二曵其輪貞吉象曰九二貞吉中以行正也此則求濟而曵其輪矣剛中行正亦吉矣六三未濟征凶利渉大川象曰未濟征凶位不當也二雖曵輪而三尚坎窞且在習坎之間淼淼大川實未濟也六三以柔處剛若不知其不當以為位既剛壯一往征進不其凶乎惟變巽為木為風因風揚㠶乃利耳九四貞吉悔亡震用伐鬼方三年有賞于大國象曰貞吉悔亡志行也九四則居互坎之中將濟矣貞則吉也悔可无也爻變爲震是震動以伐鬼方之象也未濟之九四即既濟之九三故象頗似三年征進不憚其勞自有賞賚于大國大國天子之國也坎坤卦為國求濟之志何弗行焉六爻皆不當位而曰貞者四之貞以陽也五之貞以中也二之貞以陽且中也震用方伐也賞非事定論賞乃三年之間賞勞師旅也悔亡悔可亡也无悔自无悔也六五貞吉无悔君子之光有孚吉象曰君子之光其暉吉也至于六五則所謂柔得中者矣故曰貞吉更曰无悔而且觀其位則君子也五陽位觀其徳則離有暉而發之光也訂詁曰暉及物為光斂光在體為暉又管輅曰日中為光朝日為暉有孚及下相應共濟豈不吉焉坎離皆有孚象上九有孚于飲酒无咎濡其首有孚失是象曰飲酒濡首亦不知節也此終濟時也而狃以為濟仍未濟也夫剛柔相應者孚也五有孚則上亦有孚即有孚于飲酒坎為酒大斗相勞共拯坎陷亦自无咎乃上九飲之太過而至濡其首焉夫不欲水之濡首而酒已濡其首乎亦不知節矣其有孚也不大失乎是哉是與非對求濟者其戒之初六未濟而自濡九二曵輪求濟六三未濟而渉九四震動以濟六五濟而有孚乃上九有孚失是終未濟矣是則六十四卦之終實不可終而必反之重乾之始自强不息羣龍无首乃為續終也周易𫝊註卷四
