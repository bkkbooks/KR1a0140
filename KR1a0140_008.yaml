body:
  text: 周易筮考通州學正李塨撰莊公二十二年陳厲公生敬仲其少也周史有以周易見陳侯者陳侯使筮之遇觀之否曰是謂觀國之光利用賓于王此其代陳有國乎不在此其在異國非此其身在其子孫光逺而自他有耀者也坤土也巽風也乾天也風為天于土上山也有山之材而照之以天光于是乎居土上故曰觀國之光利用賓于王庭實旅百奉之以玉帛天地之美具焉故曰利用賓于王猶有觀焉故曰其在後乎風行而著于土故曰其在異國乎若在異國必姜姓也姜太嶽之後也山嶽則配天物莫能兩大陳衰此其昌乎左傳杜氏註曰觀國之光觀之六四爻辭也易之為書六爻皆有變象又有互體聖人隨其義而論之巽變為乾故曰風為天自二至四有艮象艮為山山則材之所生上有乾下有坤故言居土上照之以天光正義曰有山材之富而被天光之照又復居冇土地是為國君之象四為諸侯變而之乾有國朝王之象艮為門庭乾為金玉坤為布帛諸侯朝王陳贄幣之象旅陳也百言物備姜姓之先為堯四嶽本卦之卦皆互艮故知當興于太嶽之後有配天之功正義曰乾在上艮在下亦山嶽配天之象閔公元年初畢萬筮仕于晉遇屯之比辛廖占之曰吉屯固比入吉孰大焉其必蕃昌震為土車從馬足居之兄長之母覆之衆歸之六體不易合而能固安而能殺公侯之卦也公侯之子孫必復其始杜氏註曰震為土震變為坤也震為車坤為馬震為足為長男坤為母為衆震為土六句六體也比合屯固坤安震殺仲氏易曰此豈啓蒙變占所謂僅占本辭者觀此可悟矣魯閔公二年成季之將生也桓公筮之遇大有之乾曰同復于父敬如君所左傳孔頴達正義曰此雖六五爻變不取周易之文筮者推演卦意自為其辭也離是乾子還變為乾故曰同復于父言其尊與父同也國人敬之其敬如君之處所言其貴與君同也說卦乾為君父僖公十五年秦伯伐晉卜徒父筮之吉渉河侯車敗詰之卜對曰乃大吉也三敗必𫉬晉君其卦遇蠱曰千乗三去三去之餘𫉬其雄狐夫狐蠱必其君也蠱之貞風也其悔山也歲云秋矣我落其實而取其材所以克也實落材亡不敗何待三敗及韓晉侯車敗𫉬之以歸按蠱彖有利渉大川故曰渉河且卦初至四大坎河也坤為大輿乾剛往上為艮則車止矣下大坎見兌故毁折而止于濘三去三敗者先甲三日後甲三日震動而前有三爻則我三去而彼三敗矣互震而上正值上九是雄狐也而𫉬之艮為狐狼虞氏易艮之陽爻故曰雄狐雄狐而據于上為蠱之主非其君而何是時秦與晉戰為九月夏之七月秋也故曰取艮山之材而落其實也此與啓䝉六爻不變專看卦之彖辭者不同則啓䝉筮法不可據矣初晉獻公筮嫁伯姬于秦遇歸妹之睽史蘇占之曰不吉其繇曰士刲羊亦無􅎺也女承筐亦無貺也西隣責言不可償也歸妹之睽猶無相也震之離亦離之震為雷為火為嬴敗姬車說其輹火焚其旗不利行師敗于宗丘歸妹睽孤寇張之弧姪其從姑六年其逋逃歸其國而棄其家明年其死于髙梁之墟杜氏註曰士刲羊二句歸妹上六爻辭也􅎺血也將嫁女于西隣而遇不吉之卦故知有責言嬴秦姓姬周姓震為雷離為火火動熾而害其母火炎則物焚也女嫁反害其家之象故曰為嬴敗姬震為車離為火上六爻在震則无應故車脫輹在離則失位故火焚旗毛與三曰十五年秦伯伐晉敗晉于韓原此不利行師敗于宗丘也夫離為戈兵為甲胄此行師者也以我之震柔變而為彼之戈兵甲胄是利在彼不利在我則我敗矣且夫震我也之離客也我之主震倒艮山而為之丘是主丘也宗主也主丘者韓原晉地也而乃變客之離剛而敗之𫉬晉侯十一月歸晉侯此歸妹睽孤寇張之弧也夫歸妹之所之者睽孤也之彼為敵則睽孤者寇也然而其詞曰先張之弧後脫之弧夫猶是弧也而寇張之寇忽脫之則猶是晉侯而秦𫉬之秦又歸之焉十六年晉太子圉質秦秦妻之二十二年子圉逃歸二十三年惠公卒子圉立是為懐公三十四年秦穆公納公子重耳懐公奔髙梁重耳殺之此六年其逋歸國棄家而終死于髙梁者也史不曰震之離亦離之震乎自上之初閱六爻而上又變則逋矣上本離而仍變震則歸國而棄其家矣男以女為家棄家者棄所妻也然而離一變而離剛已亡夫離剛之上横者髙梁也變之震而剛已亡則變于是死亦于是焉按東方震為木離為火木變為火女嫁反䘮母家之象也遇卦震為兄兌為妹今震變而生離隂是兄有所生則兌之姪矣乃兌女有歸其位不動而兄之所生者從于上是姪其從姑猶懐公之從伯姬于秦也十六年質秦妻懐嬴二十二年棄懐嬴逃歸正六年又按惠公在秦曰先君若從史蘇之言吾不及此韓簡侍曰龜象也筮數也物生而後有象象而後有滋滋而後有數先君之敗徳及可數乎史蘇是占勿從何益故文仲子曰汾隂侯生善卜先人事而後說卦此卜筮之大要不可不知也晉公子重耳親筮之曰尚有晉國得貞屯悔豫皆八也筮史占之皆曰不吉閉而不通爻无為也司空季子曰吉是在易皆利建侯不有晉國以輔王室安能建侯我命筮曰尚有晉國筮告我曰利建侯得國之務也吉孰大焉震車也坎水也坤土也屯厚也豫樂也車班内外順以訓之泉原以資之土厚而樂其實不有晉國何以當之震雷也車也坎勞也水也衆也主雷與車而尚水與衆車有震武也衆而順文也文武具厚之至也故曰屯其繇曰元亨利貞勿用有攸往利建侯主震雷長也故曰元衆而順嘉也故曰亨内有震雷故利貞車上水下必覇小事不濟壅也故曰勿用有攸往一夫之行也衆順而有武威故曰利建侯坤母也震長男也母老子彊故曰豫其繇曰利建侯行師居樂出威之謂也是二者得國之卦也國語韋昭註曰内卦曰貞外卦曰悔得此兩卦震在屯為貞在豫為悔八謂震兩隂爻在貞在悔皆不動故曰皆八謂爻无為也易坤為大車震為動為雷今云車者車動聲象雷也班徧也車班外内者謂屯之内有震豫之外亦有震也屯三至五豫二至四皆有艮象豫三至五有坎象艮山坎水水在山上為泉源流而不竭也屯豫皆有坤象重坤故厚豫為樂易以坤為衆坎為水水亦衆之𩔖主雷與車以震在内尚水與衆以坎在外震威故武坤順為文震車動而上威也坎水動而下順也有威而衆從故必伯也小事小人之事震動而遇坎險故壅意謂一夫之行則壅建侯不然也居樂坤母在内也出威震子在外也居樂故利建侯出威故利行師二者謂屯豫二卦也僖公二十五年晉侯謀納王筮之遇大有之睽曰吉遇公用享于天子之卦戰克而王饗吉孰大焉且是卦也天為澤以當日天子降心以逆公不亦可乎大有去睽而復亦其所也杜氏註曰公用享于天子大有九三爻辭也三為三公而得位變而為兌兌為說得位而說故能為王所宴饗乾為天兌為澤乾變為兌而上當離離為日日之在天垂曜在澤天子在上說心在下是降心逆公之象即去睽卦還論大有亦有天子降心之象乾尊離卑降尊下卑亦其義也成公十六年晉楚遇于鄢陵晉侯筮之史曰吉其卦遇復曰南國䠞射其元王中厥目國䠞王傷不敗何待公從之及戰吕錡射共王中目杜氏註曰復陽長之卦陽氣起子南行推隂故曰南國䠞也南國勢䠞則離受其咎離為諸侯正義曰日君象也離為日故為諸侯又為目陽氣激南飛矢之象仲氏易曰本卦兩體内我外敵東方之震我也即晉地在西而春秋戰國以秦為西陲楚為南服而燕齊晉鄭皆稱為東方之國西南之坤敵也楚正南國而偏近于西然總稱南國夫復一陽之来𫝑甚銳今一陽乍復而即已掀入全坤不南國蹙乎何氏訂詁曰就兩體言貞我悔彼初九元吉在我上六迷復凶至災眚大敗以其國君皆屬之彼且以震木入坤土射之義也以災眚而致大敗眚為目疾即中厥目之象也襄公九年穆姜薨于東宫始往而筮之遇艮之八史曰是謂艮之隨隨其出也君必速出姜曰亡是于周易曰隨元亨利貞无咎元體之長也亨嘉之㑹也利義之和也貞事之幹也體仁足以長人嘉徳足以合禮利物足以和義貞固足以幹事然故不可誣也是以雖隨无咎今我婦人而與于亂固在下位而有不仁不可謂元不靖國家不可謂亨作而害身不可謂利棄位而姣不可謂貞有四徳者隨而无咎我皆无之豈隨也哉我則取惡能无咎乎必死于此弗得出矣杜氏註曰周禮大卜掌三易連山歸藏皆以七八為占故言遇艮之八史疑遇八為不利故更以周易占變爻得隨卦而論之而姜亦指周易以折之也孔氏正義曰周易之爻惟有九六此筮遇八謂艮之第二爻不變者是八也用夏商二易也按艮止也他爻皆變惟二不變五君也二小君也艮為門闕小君止于是而不變薨于東宫之象也故史以為不利而别用周易占變得隨以欺穆姜耳穆姜謂隨必元亨利貞乃無咎否則有咎固古正解也襄公二十五年崔抒欲取棠姜筮之遇困之大過史皆曰吉阿也示陳文子文子曰夫從風風隕妻不可娶也且其繇曰困于石據於蒺藜入于其宫不見其妻凶困于石徃不濟也據于蒺藜所恃傷也入其宫不見其妻凶无所歸也杜氏註曰坎為中男故曰夫變而為巽故曰從風風能隕落物者故妻不可娶昭公五年初穆子之生也莊叔以周易筮之遇明夷之謙以示卜楚丘曰是將行而歸為子祀以讒人入其名曰牛卒以餒死明夷日也日之數十故有十時亦當十位自王以下其二為公其三為卿日上其中食日為二旦日為三明夷之謙明而未融其當旦乎故曰為子祀日之謙當鳥故曰明夷于飛明之未融故曰垂其翼象日之動故曰君子于行當三在旦故曰三日不食離火也艮山也離為火火焚山山敗于人為言敗言為讒故曰有攸徃主人有言言必讒也純離為牛世亂讒勝勝將適離故曰其名曰牛謙不足飛不翔垂不峻翼不廣故曰其為子後乎吾子亞卿也抑少不終其後叔孫穆子避僑如之難及庚宗地名遇婦人宿焉及召歸立為卿庚宗婦人攜其子獻雉問所生曰能奉雉矣召見號曰牛寵之使為政乃以讒殺長子孟又譖而逐仲後穆子疾不食而死杜氏註曰日之數十甲至癸也日中當王食時當公平旦為卿鷄鳴為士夜半為皁人定為輿黃昏為𨽻日入為僚晡時為僕日昳為臺隅中日出晡食也謂日西食時也日昳謂蹉跌而下也隅謂東南隅也過隅未中故謂隅中也疏云闕不在第王公曠其位明夷日在地下又變謙卑故曰明而未融其當旦乎旦卿位也莊叔卿也卜穆子亦為卿故知為子祀離為日為鳥離變為謙日光不足故當鳥鳥飛行故曰于飛明夷初九得位有應君子象也在明傷之世居謙下之位故將辟難而行離艮合體故火焚山艮為言為離所焚故言敗離焚山山焚則離獨存故知名牛謙道冲退故飛不逺翔是去不逺故曰為子後莊叔亞卿故不終旦日正卿之位毛與三曰于行辟難而奔也之謙而有終謙亨君子有終則歸嗣也夫庚宗之婦固下離之中女也離者别也而初變為艮而少男生焉彼豎牛者繼孟仲之嫡而為庶子非少男乎顧變艮而猶本乎離則將奉離雉離為雉號離牛焉離為牝牛乃離上為震震有言也變艮而艮亦有震閽寺之為言艮為閽寺則讒言也夫離為腹腹下敗則餒矣謂无下一爻去離日而就鬼門則餒死矣按此一爻變者本爻辭未嘗不重但不專看之以盡斷法耳昭公七年衛襄公生孟縶足不良弱行又生子名之曰元以前孔成子夢康叔謂已立元史朝亦夢恊故名之也孔成子以周易筮之曰元尚享衛國主其社稷遇屯又曰余尚立縶尚克嘉之遇屯之比以示史朝史朝曰元亨又何疑焉成子曰非長之謂乎言屯之元亨謂年長非謂名元對曰康叔名之可謂長矣孟非人也將不列于宗足跛非全人不可列為宗主不可謂長且其繇曰利建侯嗣吉何建建非嗣也二卦皆云謂再得屯卦文同子其建之康叔命之二卦告之筮襲于夢武王所用也大誓曰朕夢恊朕卜襲于休祥弗從何為弱足者居侯主社稷臨祭祀奉民人事鬼神從㑹朝又焉得居各以所利不亦可乎按此與畢萬之筮遇卦同而斷辭不同各隨其事也此筮法也昭公十二年南蒯將叛季氏枚筮之遇坤之比曰黃裳元吉以為大吉也示子服惠伯曰即欲有事何如惠伯曰吾嘗學此矣忠信之事則可不然必敗外强内温忠也和以率貞信也故曰黃裳元吉黃中之色也裳下之飾也元善之長也中不忠不得其色下不共不得其飾事不善不得其極外内倡和為忠率事以信為共供養三徳為善非此三者弗當且夫易不可以占險將何事也且可飾乎中美為黃上美為元下美則裳參成可筮猶有闕也筮雖吉未也杜氏註曰枚筮不指其事汎卜吉凶也坎險故强坤順故温水和而土安貞三徳正直剛克柔克也孔子筮得賁愀然有不平之色子張進曰師聞卜者得賁吉而子有不平之色何也曰以其離耶在周易山下有火賁非正色之謂也夫質也黑白宜正焉今得賁非吾兆也按孔子之占盖欲行道于天下也乃不遇見龍等卦而得賁則以文飾身及人斤斤然小利有攸往故不快此道不行而詩書傳後之象也哀公九年宋公伐鄭晉趙鞅卜救鄭陽虎以周易筮之遇泰之需曰宋方吉不可與也微子啓帝乙之元子也宋鄭甥舅也祉禄也若帝乙之元子歸妹而有吉禄我安得吉焉乃止杜氏註曰泰六五曰帝乙歸妹以祉元吉帝乙微子之父為天子嫁妹而有吉禄宋微子之後與鄭為甥舅吉在宋則伐之為不吉漢武帝伐匈奴筮之得大過之九五太卜因謂匈奴不久當破占用何可久也一語乃遣貳師伐匈奴後巫蠱事發貳師降武帝咎卦兆反謬仲氏易曰當時既失周史之占如春秋傳所記而後儒籠統論理則又謂占者有徳則吉在我占者无徳則吉在彼如此則但修徳可已用五用二筮人太卜一切可廢今按春秋傳占法則象辭觀玩休咎瞭然大過為大坎而五當重乾之末進承坤上龍戰𤣥黃正在此際幸乾坎二位皆居北方我以南向北則我南為凱彼北為敗所以能破匈奴兵乗勝追北至范夫人城者此也奈身在坎中尚未出險而兌為口舌又為毁折非因令誤當以間敗乃咀呪事發而脫身降矣兌者脫也夫枯楊之華不入寒地身為士夫敵醜非偶乃既降單于則身已為人所得而單于又妻之以女此正匹配反常一若老婦之得士夫者亦可謂竒驗矣按乾與大坎皆北方乾為健坎為弓輪北伐之象乾為君居中為中國之帝四陽中實故北伐而勝但終之以兌缺則收局敗耳晉史元帝為晉王時使郭璞筮興復事遇豫之睽璞曰㑹稽當出鐘以告成功上有勒銘應在人家井泥中得之所謂先王以作樂崇徳殷薦之上帝是也及帝即位太興初㑹稽剡縣果于井中得一鐘長七寸二分口徑四寸半上有古文竒書十八字人莫能識仲氏易曰此事第有案斷而无占驗似乎狡獪然以易推之則瞭若指掌非畸事也豫上震下坤震為龍為首出之子而下連坤土此奮而出地之象也悔為睽上離下兌嚮明而治而金以宣之體離互亦離此重明重光中興之象也震為鳴為聲故先王以作樂崇徳而合睽之兌金以升于睽之離火是坐明堂向南離而考擊鐘鏞以作樂之象也祗兩卦皆有坎水以陷之則尚在陷中未經出土而豫坎互坤則當在水土之間况豫之震為東方睽之離為南方㑹稽者東南郡也豫有互艮萬物之所以成終者也非告成功乎若曰鐘有勒銘有古文則睽離為文兌為言以文為言非勒銘乎按兌金不見于經離兌本乾卦當為金耳晉元帝初鎮建鄴王導使郭璞筮之遇咸之井璞曰東北郡縣有武名者當出鐸以著受命之符西南郡縣有陽名者其井當沸後晉陵武進人于田中得銅鐸六枚歴陽縣中井沸經日乃止仲氏易曰此事載晉書郭璞傳然世莫解嘗詢仲氏仲氏曰此易知者銅鐸之出以貞咸也井之沸以悔井也咸内為艮艮東北之卦也其名武者以上兌在右武位也其出鐸者兌為金與互乾金合而乾數六九宫西北六數故得六鐸然且互乾為天互巽為命此天命也故曰此受命之符也若夫井則三四互兌三五互離離兌為西南郡縣而南為陽方故宜有陽名乃以下巽與互兌為金木之交上坎與互離為水火之際木間金得火而上承以水此非薪在釜下得火而水乃沸乎且四正相纒乾麗坤域非中興受命何以得此按乾為金而變離離于乾坤之索卦居六位故得六鐸不必用後人九宫之說也晉渡江後宣城太守殷祐以郭璞為參軍㑹有物如牛足卑類象大力而遲行到城下祐將伏取之而令璞作卦遇遯之蠱其辭曰艮體連乾其物壯巨山潛之畜非兕非虎身與鬼并精見二午法當為禽兩翼不許遂被一創還其本墅按卦名之是為驢鼠卜竟伏者以㦸刺之深尺餘遂去不見郡綱紀上祠巫云廟神不悅曰此䢼亭驢山君鼠也偶詣荆山暫来過我何容觸之仲氏易曰遯下艮上乾故曰連乾坤為兕虎蠱二陽間之故曰非乾鑿度以艮為鬼㝠門貞悔兩見故曰身與鬼并離五月卦建午蠱三至上為大離是倍午也離為雉巽為雞故為禽遯四陽傷其一為一創然祗傷乾一畫而艮山如故故蠱上之山可還遯之本墅按遯下體為山二至四互體為巽伏于山上山潛之畜也為禽而兩翼不許者遯之巽雞蠱之離雉其身之外當為翼而俱艮止是無翼也乾為馬艮為鼠今變卦艮鼠依然而乾馬初爻變為隂小則似驢矣合為一體可名為驢鼠東海世子母病郭璞筮得明夷之既濟曰不宜封國坤為國坎折之唐李綱在隋仕宦不進筮之得鼎曰君當為卿輔然俟易姓乃如志仕不知退折足為敗綱後顯于唐數稱疾辭位去唐天寳十四年王諸入解筮遇乾之觀謂已及賔王而大人未見以乾五未動也遂遇禄山變而返唐長慶中成徳兵變殺節度使田宏正而擁立部將王庭湊先有筮者得乾之坤謂坤土也地也大位當臨節旄不逺兼有土地河山之分石敬瑭以太原拒命唐廢帝遣兵圍之勢甚急命馬重績筮之遇同人重績曰乾健而離明健者君之徳明者南面而嚮之所以治天下也同人者人所同此其時將必有同我者焉易曰戰乎乾乾西北也又曰相見乎離離南方也其同我者自北而南乎乾九十月卦也乾西北卦位在九十月戰而勝在九十月之交乎是歲九月契丹果助晉擊敗唐軍晉遂有天下宋政和末平江入解者筮之得噬嗑之二爻曰離為戈兵艮為門闕又以艮東北之卦而介乎南離必東北敵人南寇犯闕且將不利乎君矣鼻者君祖也後徽宗果北狩宋時金主完顏亮入寇筮蠱之隨占者曰我有震威震為出威見國語而外當毁折兌為毁折敵敗之象也内我外敵且兩互為漸三五互為巽二四互為艮合之為風山漸漸之辭曰夫征不復其何能返後果驗此之所斷亦與啓蒙六爻俱變占之卦彖辭者不同明土木之變南冢宰魏驥集同官上監國疏㑹錢唐客陸時至善易請筮之得恒之解恒三爻變驥曰帝出之不恒而承之羞固也乃變而負乗寇將復至如之何客曰既已負帝且乗矣再至何害所慮者貞之則吝惟恐徒守反咎耳驥曰善乃易疏去次日客過驥驥曰昨筮无大凶乎曰大吉曰何謂曰夫恒為大坎而三當坎中所以陷也然而恒互為乾三以一乾而嵬然居三乾之間若无往而不為君者乃一變為解則已解矣且解之辭彖辭曰利西南西南者所狩地也又曰其来復則還復也夫恒者久也日月得天而久照恒彖傳今解之互體則正當兩坎互離之間坎月離日非日月幽而復明乎此用姜維語大明吾國號非返國乎祗解有兩坎兩離而上離未全尚有待耳後寇果再至以戰得勝而英宗返國復辟如所占明正徳間都御史張嵿敕廵撫保定兼提督紫荆諸關筮之得屯之六三曰行无虞官何以即鹿吾入林而已時提學李夢陽在坐曰不然三關古鉅鹿地也急即之无虞者不疑也惟入林中恐為彬所中耳後武宗西狩江彬索璧馬婦女不應駕言三關迎駕軍不至罷職毛河右先生少年出亡筮之遇節之需曰節者止也需者有待也節與需皆坎險在前然而節三爻當互震之柔而變為乾剛震則動動而得剛可以出險經云剛健而不陷是也顧亦惟剛健故不陷否則需矣致寇至矣乃急行而躡者果至因匿海陵越一月曰可出險矣經曰利渉大川大川淮也因過淮主山陽令朱君所朱君集名士歌燕先生念需象有飲食宴樂語憬然㑹吾幸已出險且宴樂矣過此失位于是舎之去按遇卦之卦皆有水火既濟之象節二至五大離需三至五互離是險可濟也兌缺變乾其身甚健文明在體節三爻在大離中需三爻為互離初則後之舉博學鴻辭與高年著述傳世皆見焉丁丑之歲郭子堅招予南行子固且為予謀南中置側生子因筮之遇大畜之中孚當時亦意為吉卦然未知占法未瞭然也後學易擬為繇曰是謂不家食吉利渉大川也兌之口舌食于宫闕故曰不家食乗木而風順以行澤上故曰利渉大川以此南往有孚而吉焉且是往也所畜至大老陽變動遂之少女是置下妻乎其屬為豕辭有豚魚包魚者置妻也長男生芽杭人謂小兒為小芽我震而進主艮而止男之生也遂以寅歲吕下妻猪相長子習仁虎相壬午為三弟培占科舉遇井之謙繇曰井食以隣冽矣寒泉文明將動山伏而謙盖補廩而非中舉也已而果然且廩文舊有書吏陋規乃發黃崑圃言于學院楊賔實即發出所謂以隣也周易筮考
