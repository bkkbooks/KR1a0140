body:
  text: 周易傳註卷六通州學正李􅷊撰繫辭下傳八卦成列象在其中矣因而重之爻在其中矣剛柔相推變在其中矣繫辭焉而命之動在其中矣吉凶悔吝者生乎動者也剛柔者立本者也變通者趣時者也吉凶者貞勝者也天地之道貞觀者也日月之道貞明者也天下之動貞夫一者也夫乾確然示人易矣夫坤隤然示人簡矣爻也者效此者也象也者像此者也爻象動乎内吉凶見乎外功業見乎變聖人之情見乎辭天地之大徳曰生聖人之大寳曰位何以守位曰仁何以聚人曰財理財正辭禁民為非曰義此言卦爻著于變而歸于一也八純卦各三畫自成列也乾與坤震與巽坎與離艮與兌對成列也因重則本末中爻備故曰爻在其中正義曰剛柔即隂陽也論其氣謂之隂陽語其體謂之剛柔命如命令之命定吉凶以示人也聖人見天下之動賾而繫辭故動在其中剛柔立爻之本而時之動不可拘自變通以趣之故曰惟其時物然而變歸于一者何也吉凶雖殊而皆以正揆之貞者正而固也貞則勝而吉否則凶是貞勝者也天地之道亦以貞觀日月之道亦以貞明而况天下之動非貞夫一而何哉一者即乾易也坤簡也爻不過效此易簡而已象不過像此易簡而已是易簡之徳在天地大生廣生則曰生在聖人仁民愛物則曰仁一徳也大寳之位行仁之具也聚人之財行仁之事也為農桑為珍貨劃然有理䘮祭賓師正其用財名目之辭親義序别禁其有財逸居之非以義輔仁而仁行矣與天地合徳矣生生之謂易易道盡於此矣孟子曰使民菽粟如水火民无不仁王道盡於此矣此之謂天下之動貞夫一天垂象地呈形故曰觀虞氏曰隤安也爻象者卦所自具故曰内吉凶者得失之報故曰外聖人之情即吉凶與民同患之情也古者包犧氏之王天下也仰則觀象于天俯則觀法于地觀鳥獸之文與地之宜近取諸身逺取諸物于是始作八卦以通神明之徳以𩔖萬物之情地之宜如禹貢兖之漆青之檿徐之桐之𩔖近取諸身如為首為腹類逺取諸物如為牛為馬類八卦作而神明之徳不閉塞矣萬物之情皆𩔖引矣作結繩而為網罟以佃以漁盖取諸離即以制器尚象者言之離有兩目而中爻牽以巽繩網罟象也包犧氏没神農氏作斲木為耜揉木為耒耒耜之利以教天下盖取諸益斲木使銳以入土揉木使曲以附手仲氏易曰巽木入坤土而上動以艮手下動以震足是耕象也日中為市致天下之民聚天下之貨交易而退各得其所盖取諸噬嗑翟𤣥曰市中交易飲食之道仲氏易曰上離下震日中而動也合沙鄭氏曰十三卦始離次益次噬嗑食貨也故洪範八政一食二貨神農氏没黄帝堯舜氏作通其變使民不倦神而化之使民宜之易窮則變變則通通則久是以自天祐之吉无不利黄帝堯舜垂衣裳而天下治盖取諸乾坤不尊古者妄也執古者愚也烏足以知易之窮變通久哉烏足以知聖人之通變神化哉五帝趣而文明世道之一變也故特提而言之九家易曰衣取象乾居上覆物裳取象坤在下含物刳木為舟剡木為楫舟楫之利以濟不通致逺以利天下盖取諸渙刳鑿空也剡銳也九家易曰木在水上流行若風舟楫之象服牛乘馬引重致逺以利天下盖取諸隨震為馬一至四大離為牛而兌悅以服乘之重門擊柝以待暴客盖取諸豫九家易曰下有艮象從外視震復為倒艮兩艮對合重門也艮為手為小木為上持震為足坤為夜坎為盜手持柝木夜行擊門備盜之象斷木為杵掘地為臼臼杵之利萬民以濟盖取諸小過虞氏曰艮止于下臼象震動而上杵象震出巽入艮手持杵出入臼中舂象弦木為弧剡木為矢弧矢之利以威天下盖取諸睽虞氏曰互坎為弧離為矢而坎木堅離木稿兌為毁折有弦木剡木以為弧矢之象上古穴居而野處後世聖人易之以宮室上棟下宇以待風雨盖取諸大壯雷動兌澤風雨之象四陽相比壯而健棟宇之象故大過四陽相比亦言棟棟屋脊檁也宇櫩也如考工記之言車盖上尊宇卑則吐水疾而霤逺也古之塟者厚衣之以薪塟之中野不封不樹䘮期无數後世聖人易之以棺槨盖取諸大過四陽聚中而隂包之人去而棺槨之象上古結繩而治後世聖人易之以書契百官以治萬民以察盖取諸夬仲氏易曰結繩而治者相事大小結繩以為約大事大其繩小事小其繩各執一端以相考信見史記與鄭氏九家易說後易以書契書者以刀筆畫木簡為文字以識也契者刻木為一二三四之畫而中分之各執其一以為約契也其取之夬者六爻比列而刻斷其上有似乎契畫然者已上諸卦興利除害養生送死皆理財之事而終之以書契則正辭禁民為非亦具焉是故易者象也象也者像也彖者材也爻也者效天下之動者也是故吉凶生而悔吝著也觀于制器尚象之故而知易皆象也如人之有像也材也效天下之動也皆象也效倣效也吉凶悔吝本生乎動故爻動而即生且著焉陽卦多隂隂卦多陽其故何也陽卦竒隂卦偶其徳行何也陽一君而二民君子之道也隂二君而一民小人之道也震坎艮陽卦也乃一陽二隂巽離兌隂卦也乃一隂二陽其故何哉卦之主一而已陽卦以竒為主一竒而二耦故多隂隂卦以耦為主一耦而二竒故多陽然而徳行不同矣卦徳藴于内卦行見于外主者君象也多者民象也竒者一也偶者二也一竒為君而二耦為民則陽得位為君子之道二偶為君而一竒為民則隂擅權為小人之道註疏天下之生久矣一治一亂易曰憧憧往來朋從爾思子曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮日徃則月來月徃則日來日月相推而明生焉寒徃則暑來暑徃則寒來寒暑相推而嵗成焉往者屈也來者信也屈信相感而利生焉尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也利用安身以崇徳也過此以往未之或知也窮神知化徳之盛也而疑君子一君之道與小人二君之道卦爻繫辭有明徵也咸之九四曰憧憧往来朋從爾思夫天下之道何庸憧擾哉同歸而塗自殊一致而慮自百致極也何庸憧擾且不觀天下之往來自然者乎日月往來推而生明寒暑往來推而成嵗往屈来信信同伸天地相感萬物利生其塗殊其慮百而其歸實同其致實一也况屈正以為信并非二事尺蠖歩屈蟲龍蛇可見矣君子知之致知明善精守經達權之義以入于神明所以推之實用也利禮樂射御書數之用使吾身晬面盎背而安所以崇高其徳也若過此以往尚可知哉窮極神明造化因心則徳盛之至同歸而殊塗一致而百慮上達自然之能而豈思慮所可至哉易曰困于石據于蒺藜入于其宫不見其妻凶子曰非所困而困焉名必辱非所據而據焉身必危既辱且危死期將至妻其可得見耶齊桓覇主困于床笫非所困而困也有窮后羿起據夏位非所據而據也易曰公用射隼于高墉之上𫉬之无不利子曰隼者禽也弓矢者器也射之者人也君子藏器于身待時而動何不利之有動而不括是以出而有𫉬語成器而動者也君子患无器有器矣患不藏以待時括矢受弦處也書曰往省括于度則釋動而不括謂動而不輕納于括也正待時也子曰小人不耻不仁不畏不義不見利不勸不威不懲小懲而大誡此小人之福也易曰履校滅趾无咎此之謂也不耻夫不仁不畏乎不義故以利勸之以威懲之此小人之尚可轉者善不積不足以成名惡不積不足以滅身小人以小善為无益而弗為也以小惡為无傷而弗去也故惡積而不可掩罪大而不可解易曰何校滅耳凶善貴積惡畏積積小則累大此小人之怙終者子曰危者安其位者也亡者保其存者也亂者有其治者也是故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也易曰其亡其亡繫于苞桑傾危者乃安樂其位者也孔疏下仿此保自謂无失也子曰徳薄而位尊知小而謀大力小而任重鮮不及矣易曰鼎折足覆公餗其形渥凶言不勝其任也未嘗無徳无知无力然小矣薄矣是微小之人也何以圖大如明之齊泰黄子澄是也子曰知幾其神乎君子上交不諂下交不瀆其知幾乎幾者動之微吉之先見者也君子見幾而作不俟終日易曰介于石不終日貞吉介如石焉寧用終日斷可識矣君子知微知彰知柔知剛萬夫之望幾者動之微萌可以先見其吉者也上交不至于諂下交不至于瀆則知幾而吉矣故君子知微亦知彰知柔亦知剛神乎神乎動于幾先作動也然曰介如石者何也幾先之明惟有介守者能斷之脂韋狥人未有幾先能斷者也子曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也易曰不逺復无祗悔元吉此克已復禮之君子也天地絪緼萬物化醇男女搆精萬物化生易曰三人行則損一人一人行則得其友言致一也以上分言君子小人之道亦彰彰矣然陽之一君非徒君也二民即從之不見損之六三三陽行則損其一一陽行則得其友乎天交乎地纒綿鬱宻萬物化醇男交乎女和合精凝萬物化生王者宰世與國人交必世後仁是一人行則得其友也盖天下一致而百慮故不可以不致一醇如醇酒之醇子曰君子安其身而後動易其心而後語定其交而後求君子修此三者故全也危以動則民不與也懼以語則民不應也无交而求則民不與也莫之與則傷之者至矣易曰莫益之或擊之立心勿恒凶所謂致一者恒而已而恒之道有三焉動必先安其身語必先易其心欲求諸人必先定其交則民與之應之矣茍反是而儌倖以行是身不安而危以動也心知非理不覺惶恐而强人從令是心不易而懼以語也恩信未素結而驟有所取攜是交不定而求也若此者皆立心勿恒也欲民之與豈不殆哉而君子小人統可見矣易平也子曰乾坤其易之門耶乾陽物也坤隂物也隂陽合徳而剛柔有體以體天地之撰以通神明之徳其稱名也雜而不越于稽其𩔖其衰世之意耶夫易彰往而察来而微顯闡句幽開句而當名辨物正言斷辭則備矣其稱名也小其取𩔖也大其㫖逺其辭文其言曲而中其事肆而𨼆因貳以濟民行以明失得之報前言乾坤為易之緼以六十四卦藏于乾坤也此言乾坤為易之門以六十四卦出于乾坤也乾為陽物坤為隂物乾坤之徳相交而合而剛柔之體以爻而分天地之具可見者也而于以體之神明之徳不可測者也而于以通之其六十四卦所稱名龎雜繁賾而不越于隂陽但考其名𩔖如孚號有厲往見惡人等豈太古所有殆衰世防患欲周就災以小之意耶故夫剛柔之易故曰四營而成易知以藏往而彰往神以知来而察来卦爻之徳微也顯也皆于此而闡其中有神焉幽也亦于此而開當其名如一為初六為上𩔖辨其物如陽為君子隂為小人𩔖乾則元亨利貞坤則元亨利而别以牝馬之貞各正其言吉凶悔吝立斷其辭易之道殆備矣故其稱名也藉用白茅飛鳥下音何小也而取𩔖也白茅取𩔖潔慎下音取𩔖恭儉何大也窮高極深其㫖逺呈材託象其辭文其言隨物屈曲而中理其事肆陳當前而難窺因民之貳貳疑也而卜筮以決之以濟民行明失得之報皆易也皆乾坤所出也易之興也其于中古乎作易者其有憂患乎是故履徳之基也謙徳之柄也復徳之本也恒徳之固也損徳之修也益徳之裕也困徳之辨也井徳之地也巽徳之制也履和而至謙尊而光復小而辨于物恒雜而不厭損先難而後易益長裕而不設困窮而通井居其所而遷巽稱而𨼆履以和行謙以制禮復以自知恒以一徳損以逺害益以興利困以寡怨井以辨義巽以行權伏羲畫卦時淳事樸觀象而已文周以憂患而繫辭而易興焉見孔疏如下九卦可以處憂患矣履者禮也為徳之基持之以謙故為徳柄天心来復故曰徳本恒久不已徳乃孔固修其忿欲其徳為損改過遷善徳則日裕能困而亨乃辨君子井以養人徳之所處重巽而入徳以有制且禮以和行而无往不至矣謙尊且光矣復則於動之微而即辨其陽物隂物不逺復矣恒則衆物雜揉而恒久不厭矣損欲則先難而後易矣益善者全其天性也長裕而无事造作矣困窮而道亨矣井養不窮則居其所而挹彼注兹矣巽以申命故有稱說而能伏入則不輕洩盡露矣而且履用之以調和其行謙用之以遜出乎禮不逺復則自知能有恒則徳一損物欲則遠害益學徳則興利困苦既經視如尋常則寡怨往来井井如經界然則辨義以至巽入觀變則行權无方矣行權亦有制也得九卦而用之憂患其有弭乎易之為書也不可逺為道也屢遷變動不居周流六虚上下无常剛柔相易不可為典要惟變所適易之繫辭書也載道者也而道則屢遷焉惟變所適正屢遷也六虚六位也以剛柔之爻變動周流不居于一故曰六虚重卦有上下而无常或乾上坤下或坤上乾下也畫卦有剛柔而相易如乾初爻易柔為巽坤初爻易剛為震也豈可為典要哉典如册之有典要如衣之有要其出入以度外内使知懼又明于憂患與故无有師保如臨父母初率其辭而揆其方既有典常茍非其人道不虚行然不可為典要者亦有典要焉其出往外卦入來内卦每卦因重為八一卦之六十三卦皆以法度如王章之不可紊外内皆使人悚然知懼又明于世之憂患與事之故雖卦爻中无師保在前乎而乾父坤母如臨其上焉敢不欽惟始也循其所繫之辭而揆卦爻所向之方趨吉避凶則終有典常變易之中有不易者在矣然非神而明之之人執則固動則亂道豈虚行哉易之為書也原始要終以為質也六爻相雜惟其時物也其初難知其上易知本末也初辭擬之卒成之終若夫雜物撰徳辨是與非則非其中爻不備噫亦要存亡吉凶則居可知矣知者觀其彖辭則思過半矣二與四同功而異位其善不同二多譽四多懼近也柔之為道不利逺者其要无咎其用柔中也三與五同功而異位三多凶五多功貴賤之等也其柔危其剛勝耶主于觀爻之法不可不講也易之繫辭統六爻以為材質而剛柔之物相雜惟趣于時其初之時物難知其上之時物易知何者初本也其辭未有屬也故擬議之卒末也即本以成其終而已如乾初擬以潛龍至上自為亢龍矣然而雜陳其物撰集其徳以辨其時物之是非則非其中之四爻不備如屯外雲内雷二物也中爻艮山坤地又成二物是雜物也坎陷震動二徳也中爻艮止坤順又成二徳是撰徳也乃嘆美之曰六爻之藴如此何待觀爻變哉亦要其存亡吉凶則辭之居而不變者亦可知矣如彖辭不變者也知者未觀爻辭先觀彖辭則思過半矣如屯初為侯䝉二為師師二為將比五為君觀彖而爻可想矣然則中爻可覆釋也二與四互為一卦同功也而位異則善異二多譽四多懼以四近五君也夫柔本當依上不利于逺而二乃要歸无咎者以二柔得中也三與五互為一卦同功也而位亦異三視五賤則多凶五視三貴則多功至多凶之中遇柔爻則益危若剛爻居剛位或較勝耳仲氏易占孔子曰爻言乎變以周易變也而辭即有變者如訟之渝安貞隨之官有渝小畜之既雨泰之城復于隍否之傾否是也又曰則居可知如復姤𩔖上下爻變則非復姤故爻辭皆不言變則知爻辭之不言變者多也后人一概不言變及每爻論變皆非也孔子曰觀彖則思過半后人看彖與爻二或執彖與爻一亦皆非也易之為書也廣大悉備有天道焉有人道焉有地道焉兼三才而兩之故六六者非他也三才之道也道有變動故曰爻爻有等故曰物物相雜故曰文文不當故吉凶生焉且觀爻者又當知其兼備三才初二地道一剛而一柔也三四人道一仁而一義也五上天道一陽而一隂也是兼三才而兩之也三才之道變動不居剛柔相易故曰爻爻有貴賤逺近大小之等是物之不齊物之情也故曰物隂陽之物相雜如𤣥黄相間故曰文文不當其位則位欲其正也而不當而凶亦時取相濟也而不當而吉如萃九四𩔖于是吉凶生焉易之興也其當殷之末世周之盛徳耶當文王與紂之事耶是故其辭危危者使平易者使傾其道甚大百物不廢懼以終始其要无咎此之謂易之道也前所謂易興于中古者則殷之末世周之盛徳之時也所謂作易有憂患者則文王與紂之事也是故繫辭告人每多危語如惕中履虎尾之𩔖是也言文王則周公在内非專指彖辭也危者辭使之平如震卦初九震來虩虩後笑言啞啞之屬易者辭使之傾如明夷上六初登于天後入于地之屬陸績說危易平傾所包至大百物皆不能廢惟人悚懼不息慎終如始則歸于无咎易道如此夫乾天下之至健也徳行恒易以知險夫坤天下之至順也徳行恒簡以知阻能說諸心能硏諸侯之慮定天下之吉凶成天下之亹亹者是故變化云為吉事有祥象事知器占事知来天地設位聖人成能人謀鬼謀百姓與能八卦以象告爻彖以情言剛柔雜居而吉凶可見矣變動以利言吉凶以情遷是故愛惡相攻而吉凶生逺近相取而悔吝生情偽相感而利害生凡易之情近而不相得則凶或害之悔且吝將叛者其辭慙中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭游失其守者其辭屈此結言乾坤之道本于易簡而極于賾動也徳行即指乾坤言猶陽卦隂卦之言徳行也易不險也而天下之險皆知之簡不阻也而天下之阻皆知之險阻即下文之愛惡相攻逺近相取情偽相感也乾坤卦爻皆具其象即知險知阻也諸衆也能悅諸心言彖爻告人有以厭衆人之心也侯時也周官春官肆師侯禳侯同候時也獨得解亦解作候能硏諸侯之慮言變通趣時有以硏窮諸凡隨時之慮也自能悅諸心以至亹亹者為一句言乾坤有此能事也上傳乾言知坤言能此皆有知能者乾坤分言之二徳合言之一徳也是故氣運變化人事云為云即言也吉事將興有開必先觀其象事則知制器觀其占事則知未來皆乾坤之能也天地者乾坤之大法象也設位上下矣聖人者徳備易簡者也致用立器神物前民有以成乾坤之能矣由是謀及卿士而人謀謀及龜筮而鬼謀天視自民天聴自民百姓皆可與能八卦成列則以象告爻彖繫辭則以情言六位虚之剛柔雜居而吉凶可見是之謂知險知阻矣夫雜居者變動也變而通之以盡利皆以利言也而乃有吉有凶者則以情有不同故遷移也是故以爻之動言或愛與愛相攻或惡與惡相攻或以愛而攻其惡或以惡而攻其愛攻專致也擊也如屯六二與初九匪寇昏媾同人九五與六二大師克相遇九三九四妒之伏莾乘墉之𩔖是也而吉凶生焉以爻之位言或逺相取或近相取或由近以及逺或舎近而之逺或取逺而就近或遺逺而取近如姤九五上九逺取初六遯九三近係初二隨初九交六二以達四解九四舍六三而取初蹇三取九五而先反而就二屯二遺九五而反退而昏初之𩔖而或遂其取或不遂其取而悔吝生焉以爻之徳言或皆以情相感或皆以偽相感或此情感而彼偽感或此偽感而彼情感如中孚九二以情感五䝉六三以偽感二豫九四之合六三以情六三之盱九四以偽之𩔖而利害生焉盖凡易之情攻也取也感也皆相近也與上逺近以位言不同如近而不相得則凶不則或害之不則悔且吝此皆天下之險阻也然而天下人之行必見于言背恩叛本其辭慙佛道言報親恩是也中心疑者辭枝後儒之解經談理是也吉人辭寡周孔是也躁人辭多蘇張是也誣善為惡其辭游莊周是也失守之人其辭屈漢高分羮之𩔖是也孔子曰不知言无以知人孟子曰我知言而知險知阻在乾坤即在聖賢矣周易傳註卷六
